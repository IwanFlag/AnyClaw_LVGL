<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 800" width="1450" height="800">
  <defs>
    <linearGradient id="userBubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE8D6"/>
      <stop offset="100%" stop-color="#FFD6BE"/>
    </linearGradient>
    <linearGradient id="sendBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF7F50"/>
      <stop offset="100%" stop-color="#FF6B8A"/>
    </linearGradient>
    <linearGradient id="btnSheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#FFFFFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ===== Window Frame ===== -->
  <rect width="1450" height="800" rx="0" fill="#FFF8F3"/>

  <!-- ===== Title Bar (48px) ===== -->
  <rect width="1450" height="48" fill="#FFF8F3"/>
  <rect x="0" y="47" width="1450" height="1" fill="#F5E6D8"/>

  <!-- Brand -->
  <circle cx="28" cy="24" r="14" fill="#FF7F50" opacity="0.12"/>
  <text x="28" y="29" text-anchor="middle" font-size="16">🧄</text>
  <text x="50" y="29" font-family="Nunito, sans-serif" font-size="15" font-weight="700" fill="#2D1B14">AnyClaw</text>

  <!-- Mode Switcher -->
  <rect x="220" y="10" width="150" height="28" rx="14" fill="#FFE8D6"/>
  <rect x="224" y="12" width="70" height="24" rx="12" fill="#FF7F50"/>
  <text x="259" y="28" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">Chat</text>
  <text x="339" y="28" text-anchor="middle" font-family="Nunito, sans-serif" font-size="12" fill="#8B7355">Work</text>

  <!-- Window Controls -->
  <text x="1373" y="30" text-anchor="middle" font-size="14" fill="#8B7355">⚙</text>
  <text x="1419" y="30" text-anchor="middle" font-size="14" fill="#8B7355">—</text>
  <text x="1465" y="30" text-anchor="middle" font-size="14" fill="#8B7355">□</text>
  <text x="1423" y="30" text-anchor="middle" font-size="14" fill="#8B7355">✕</text>

  <!-- ===== Left Panel (240px) ===== -->
  <rect x="0" y="48" width="240" height="752" fill="#FFF1E8"/>

  <!-- Gateway Status Card -->
  <rect x="12" y="58" width="216" height="44" rx="12" fill="#FFFFFF"/>
  <circle cx="28" cy="80" r="5" fill="#7ECFB3"/>
  <rect x="26" y="78" width="4" height="4" rx="2" fill="#7ECFB3">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="40" y="77" font-family="Nunito, sans-serif" font-size="10" fill="#7ECFB3" font-weight="700">READY</text>
  <text x="40" y="90" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B7355">Gateway</text>

  <!-- Workspace Name -->
  <rect x="12" y="110" width="216" height="32" rx="12" fill="#FFFFFF"/>
  <text x="24" y="131" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#2D1B14">📁 桃气工作坊</text>

  <!-- Sessions Header -->
  <text x="16" y="168" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#B8A089" letter-spacing="1">SESSIONS</text>
  <rect x="210" y="156" width="20" height="20" rx="10" fill="#FFE8D6"/>
  <text x="220" y="170" text-anchor="middle" font-size="12" fill="#FF7F50">+</text>

  <!-- Session: Chat (active) -->
  <rect x="12" y="178" width="216" height="32" rx="12" fill="#FF7F50" opacity="0.1"/>
  <rect x="12" y="178" width="3" height="32" rx="1.5" fill="#FF7F50"/>
  <text x="22" y="199" font-size="12" fill="#2D1B14">🍑 Chat</text>
  <circle cx="210" cy="194" r="4" fill="#7ECFB3">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="199" font-family="Nunito, sans-serif" font-size="9" fill="#FF7F50" font-weight="700">ACTIVE</text>

  <!-- Session: Work (idle) -->
  <rect x="12" y="216" width="216" height="32" rx="12" fill="transparent"/>
  <text x="22" y="237" font-size="12" fill="#8B7355">⚡ Work</text>
  <circle cx="210" cy="232" r="4" fill="#D6CFC4" opacity="0.3"/>

  <!-- Cron Header -->
  <rect x="12" y="264" width="216" height="1" fill="#F5E6D8"/>
  <text x="16" y="286" font-family="Nunito, sans-serif" font-size="10" font-weight="700" fill="#B8A089" letter-spacing="1">CRON TASKS</text>
  <rect x="210" y="274" width="20" height="20" rx="10" fill="#FFE8D6"/>
  <text x="220" y="288" text-anchor="middle" font-size="12" fill="#FF7F50">+</text>

  <!-- ===== Splitter ===== -->
  <rect x="240" y="48" width="6" height="752" fill="#FFF1E8"/>

  <!-- ===== Chat Content Area ===== -->
  <rect x="246" y="48" width="1204" height="604" fill="#FFF8F3"/>

  <!-- System Message -->
  <g transform="translate(280, 70)">
    <circle cx="14" cy="14" r="12" fill="#FFFFFF"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="380" height="52" rx="20" fill="#FFFFFF"/>
    <rect x="34" y="4" width="2" height="44" rx="1" fill="#FF7F50"/>
    <text x="44" y="18" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#2D1B14">龙虾要吃蒜蓉的 🧄🦞</text>
    <text x="44" y="36" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B7355">你的AI助手已就位！ 🍑</text>
    <text x="380" y="44" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#B8A089">12:00</text>
  </g>

  <!-- User Bubble 1 (right) -->
  <g transform="translate(810, 140)">
    <rect x="0" y="0" width="340" height="48" rx="22" fill="url(#userBubble)"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#2D1B14">帮我查一下今天的天气和待办事项 🧡</text>
    <text x="296" y="40" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#8B7355" opacity="0.6">12:01</text>
  </g>

  <!-- AI Bubble 2 (left) -->
  <g transform="translate(280, 210)">
    <circle cx="14" cy="14" r="12" fill="#FFFFFF"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="420" height="100" rx="20" fill="#FFFFFF" filter="url(#shadow)"/>
    <rect x="34" y="4" width="2" height="92" rx="1" fill="#FF7F50"/>
    <text x="46" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#2D1B14">北京今天晴，22°C，微风 ☀️</text>
    <text x="46" y="44" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#2D1B14">待办事项：</text>
    <text x="46" y="66" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B7355">· 14:00 团队周会 📅</text>
    <text x="46" y="84" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B7355">· 16:30 提交PRD文档 ✏️</text>
    <text x="386" y="92" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#B8A089">12:02</text>
  </g>

  <!-- User Bubble 3 (right) -->
  <g transform="translate(850, 330)">
    <rect x="0" y="0" width="300" height="48" rx="22" fill="url(#userBubble)"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#2D1B14">帮我设置16:25的提前提醒 💫</text>
    <text x="256" y="40" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#8B7355" opacity="0.6">12:03</text>
  </g>

  <!-- AI Streaming Indicator -->
  <g transform="translate(280, 400)">
    <circle cx="14" cy="10" r="12" fill="#FFFFFF"/>
    <text x="14" y="14" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="-4" width="90" height="28" rx="14" fill="#FFFFFF"/>
    <circle cx="52" cy="10" r="3" fill="#FF7F50">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="10" r="3" fill="#FFB347">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="10" r="3" fill="#FF6B8A">
      <animate attributeName="opacity" values="0.3;0.3;1" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>

  <!-- ===== Input Area ===== -->
  <rect x="246" y="652" width="1204" height="148" fill="#FFF1E8"/>
  <rect x="246" y="652" width="1204" height="1" fill="#F5E6D8"/>

  <!-- Input Box -->
  <rect x="306" y="668" width="1024" height="96" rx="16" fill="#FFFFFF" stroke="#F0E0D0" stroke-width="1"/>
  <text x="324" y="720" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#B8A089">输入消息... (Shift+Enter 换行) 🍑</text>

  <!-- Attachment Icon -->
  <text x="328" y="792" text-anchor="middle" font-size="14" fill="#8B7355">📎</text>

  <!-- Voice Icon -->
  <text x="362" y="792" text-anchor="middle" font-size="14" fill="#8B7355">🎤</text>

  <!-- Char Count -->
  <text x="1280" y="792" text-anchor="end" font-family="Nunito, sans-serif" font-size="10" fill="#B8A089">0/4096</text>

  <!-- Send Button (circle 40px, gradient) -->
  <circle cx="1330" cy="788" r="20" fill="url(#sendBtn)"/>
  <!-- Sheen effect on send button -->
  <circle cx="1330" cy="788" r="20" fill="url(#btnSheen)" opacity="0.3"/>
  <text x="1330" y="794" text-anchor="middle" font-size="16" fill="#FFFFFF">▶</text>

  <!-- ===== Theme Label ===== -->
  <text x="1430" y="795" text-anchor="end" font-family="Nunito, sans-serif" font-size="9" fill="#B8A089" opacity="0.4">Peachy v2 · Chat Mode</text>
</svg>
