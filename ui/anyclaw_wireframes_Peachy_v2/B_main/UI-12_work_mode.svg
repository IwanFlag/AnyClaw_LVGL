<rect x="12" y="230" width="226" height="44" rx="12" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><rect x="24" y="242" width="8" height="8" rx="4" fill="#FFB347"/><text x="40" y="242" text-anchor="start" class="l" font-size="12">⚡ Work task</text>
