<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}.a{fill:#FF7F50}.g{fill:#7ECFB3}.w{fill:#FFF}.dim{fill:#C4A882}</style><defs>
  <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/></filter>
  <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter>
  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
  <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/></linearGradient>
  <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/></linearGradient>
  <linearGradient id="pk" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="620" fill="#FFF8F3"/>
<!-- 标题栏 -->
<rect x="0" y="0" width="900" height="52" rx="0" fill="#FFF1E8"/>
<circle cx="26" cy="26" r="14" fill="url(#ag)"/><text x="20" y="32" text-anchor="14" class="start">🧄</text>
<text x="50" y="34" text-anchor="start" class="t2" font-size="16">AnyClaw</text>
<!-- 模式切换 -->
<rect x="280" y="12" width="160" height="28" rx="14" fill="#FFF8F3"/>
<rect x="282" y="14" width="78" height="24" rx="12" fill="url(#ag)"/> <text x="321" y="32" text-anchor="middle" class="w" font-size="11">Chat</text>
<text x="398" y="32" text-anchor="middle" class="dim" font-size="11">Work</text>
<text x="850" y="34" text-anchor="end" class="s" font-size="14">⚙  ─  □  ✕</text>

<!-- 左侧面板 -->
<rect x="0" y="52" width="250" height="568" rx="0" fill="#FFF1E8"/>
<!-- Gateway 状态 -->
<rect x="12" y="62" width="226" height="48" rx="14" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<circle cx="30" cy="86" r="7" fill="#7ECFB3"/><text x="44" y="90" text-anchor="start" class="t2" font-size="12">Gateway Ready</text>
<text x="44" y="106" text-anchor="start" class="s2">端口 18789 · 1 会话</text>

<!-- 工作区 -->
<rect x="12" y="118" width="226" height="32" rx="10" fill="#FFF8F3"/><text x="26" y="140" text-anchor="start" class="l" font-size="12">📁 个人助手</text>

<!-- Sessions -->
<text x="16" y="168" text-anchor="start" class="s2">SESSIONS</text>
<rect x="12" y="178" width="226" height="52" rx="12" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<rect x="24" y="190" width="8" height="8" rx="4" fill="#7ECFB3"/><text x="40" y="198" text-anchor="start" class="l" font-size="12">🦞 Chat</text>
<text x="40" y="215" text-anchor="start" class="s2">2 分钟前 · ~1.2k tokens</text>
<rect x="170" y="186" width="55" height="22" rx="11" fill="#7ECFB3"/><text x="197.5" y="201.0" text-anchor="middle" fill="#FFF" font-size="11">ACTIVE</text>

<rect x="12" y="238" width="226" height="52" rx="12" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<rect x="24" y="250" width="8" height="8" rx="4" fill="#FFB347"/><text x="40" y="258" text-anchor="start" class="l" font-size="12">⚡ Work</text>
<text x="40" y="275" text-anchor="start" class="s2">运行中...</text>
<rect x="170" y="246" width="50" height="22" rx="11" fill="#FFB347"/><text x="195.0" y="261.0" text-anchor="middle" fill="#FFF" font-size="11">BUSY</text>

<!-- 分隔条 -->
<rect x="250" y="52" width="6" height="568" fill="#FFF8F3"/>

<!-- 右侧聊天区 -->
<!-- 用户消息 -->
<text x="780" y="85" text-anchor="end" class="s">12:30</text>
<rect x="520" y="92" width="310" height="48" rx="20" fill="url(#ag)"/>
<text x="538" y="122" text-anchor="start" class="w" font-size="13">帮我查看一下系统状态</text>
<circle cx="840" cy="116" r="16" fill="rgba(255,255,255,0.3)"/>

<!-- AI 回复 -->
<rect x="275" y="155" width="40" height="40" rx="20" fill="url(#pk)"/>
<text x="288" y="182" text-anchor="18" class="start">🦞</text>
<text x="325" y="170" text-anchor="start" class="s">12:30</text>
<rect x="325" y="180" width="420" height="110" rx="20" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<!-- accent 竖条 -->
<rect x="325" y="198" width="4" height="74" rx="2" fill="#FF7F50"/>
<text x="345" y="205" text-anchor="start" class="t2" font-size="14">系统状态良好 😊</text>
<text x="345" y="230" text-anchor="start" class="l" font-size="13">· Gateway 运行中</text>
<text x="345" y="255" text-anchor="start" class="l" font-size="13">· 内存使用 45%</text>
<text x="345" y="280" text-anchor="start" class="l" font-size="13">· 磁盘充足 85GB</text>

<!-- AI 正在输入 -->
<rect x="275" y="310" width="40" height="40" rx="20" fill="url(#pk)"/>
<text x="288" y="337" text-anchor="18" class="start">🦞</text>
<rect x="325" y="315" width="140" height="36" rx="18" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<circle cx="355" cy="333" r="5" fill="#FF7F50"><animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"/></circle>
<circle cx="375" cy="333" r="5" fill="#FFB347"><animate attributeName="opacity" values="0.2;1;0.2" dur="1s" begin="0.2s" repeatCount="indefinite"/></circle>
<circle cx="395" cy="333" r="5" fill="#FF6B8A"><animate attributeName="opacity" values="0.2;1;0.2" dur="1s" begin="0.4s" repeatCount="indefinite"/></circle>

<!-- 输入区 -->
<rect x="265" y="530" width="580" height="60" rx="20" fill="#FFFFFF" stroke="#F0E0D0" stroke-width="1"/>
<text x="285" y="565" text-anchor="start" class="dim" font-size="13">输入消息... ✨</text>
<text x="290" y="565" text-anchor="16" class="start">📎</text><text x="315" y="565" text-anchor="16" class="start">🎤</text>
<rect x="800" y="540" width="40" height="40" rx="20" fill="url(#ag)"/>
<text x="815" y="567" text-anchor="middle" class="w" font-size="14">▶</text>
</svg>