<text x="100" y="80" text-anchor="start" class="t" font-size="18">Toast 通知</text><rect x="500" y="120" width="320" height="44" rx="12" fill="#FFFFFF" stroke="#7ECFB3" stroke-width="2"/><text x="520" y="148" text-anchor="start" class="l" font-size="13">✅ Gateway 已启动</text><rect x="450" y="175" width="370" height="44" rx="12" fill="#FFFFFF" stroke="#FFB347" stroke-width="2"/><text x="470" y="203" text-anchor="start" class="l" font-size="13">⚠️ 磁盘空间不足</text><rect x="480" y="230" width="340" height="44" rx="12" fill="#FFFFFF" stroke="#FF5C5C" stroke-width="2"/><text x="500" y="258" text-anchor="start" class="l" font-size="13">❌ 模型连接失败</text><text x="100" y="310" text-anchor="start" class="s">· 位置: 右下角, 向上堆叠</text><text x="100" y="335" text-anchor="start" class="s">· 自动消失: 3 秒 · 最多 3 条</text></svg>