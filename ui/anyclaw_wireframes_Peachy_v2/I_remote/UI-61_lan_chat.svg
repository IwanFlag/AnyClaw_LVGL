</defs><rect width="900" height="500" fill="#FFF8F3"/>
<text x="40" y="60" text-anchor="start" class="t" font-size="18">📡 LAN Chat</text><text x="40" y="95" text-anchor="start" class="l">模式:</text><rect x="100" y="82" width="80" height="30" rx="15" fill="#FF7F50"/><text x="140" y="101" text-anchor="middle" fill="#FFF" font-size="11">■ Host</text><rect x="190" y="82" width="80" height="30" rx="15" fill="#FFF1E8"/><text x="230" y="101" text-anchor="middle" class="#8B7355" font-size="11">□ Client</text><text x="40" y="130" text-anchor="start" class="s">监听端口: 9876</text><rect x="40" y="145" width="200" height="120" rx="14" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><text x="60" y="172" text-anchor="start" class="g" font-size="12">🟢 用户A (本机)</text><text x="60" y="197" text-anchor="start" class="g" font-size="12">🟢 用户B 192.168.1.102</text><text x="60" y="222" text-anchor="start" class="g" font-size="12">🟢 用户C 192.168.1.105</text><rect x="260" y="145" width="400" height="240" rx="14" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><text x="280" y="175" text-anchor="start" class="l2" font-size="12">[12:30] 用户A: 大家好！</text><text x="280" y="200" text-anchor="start" class="l2" font-size="12">[12:31] 用户B: 你好</text><text x="280" y="225" text-anchor="start" class="l2" font-size="12">[12:32] 用户A: 来传个文件</text><text x="280" y="250" text-anchor="start" class="l2" font-size="12">[12:33] 用户C: 收到 ✅</text><rect x="270" y="355" width="340" height="36" rx="18" fill="#FFF1E8" stroke="#F0E0D0" stroke-width="1"/><text x="285" y="379" text-anchor="start" class="dim" font-size="12">输入消息...</text><rect x="570" y="358" width="50" height="32" rx="13" fill="url(#ag)"/><text x="595" y="379" text-anchor="middle" class="w" font-size="13">发</text></svg>