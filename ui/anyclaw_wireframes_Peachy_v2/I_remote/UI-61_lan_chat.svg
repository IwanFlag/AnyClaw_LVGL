<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}
.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}
