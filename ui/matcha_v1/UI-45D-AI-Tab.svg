<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <title>UI-45C AI Tab</title>
  <desc>Settings AI Tab: 模型配置 / Agent运行时</desc>

  <defs>
    <style>
      .bg           { fill: #13161B; }
      .panel        { fill: #1E2128; }
      .surface      { fill: #252930; }
      .accent       { fill: #3DD68C; }
      .accent-sub   { fill: #3DD68C; opacity: 0.12; }
      .text         { fill: #E8E9E9; }
      .text-dim     { fill: #8B9099; }
      .text-hint    { fill: #6B7280; }
      .divider      { fill: #2D333D; }
      .badge-ok     { fill: #3DD68C; }
      .tab-active   { fill: #3DD68C; font-size: 14px; font-weight: 600; }
      .tab-inactive { fill: #8B9099; font-size: 14px; }
      .section-lbl  { fill: #3DD68C; font-size: 12px; font-weight: 500; }
      .key-label    { fill: #8B9099; font-size: 13px; }
      .hint         { fill: #6B7280; font-size: 11px; }
    </style>
  </defs>

  <!-- ===== WINDOW ===== -->
  <rect width="1280" height="800" class="bg"/>

  <!-- ===== TITLE BAR (y=0, h=48) ===== -->
  <rect x="0" y="0" width="1280" height="48" class="panel"/>
  <text x="24" y="29" class="text" font-size="15" font-weight="600">Settings</text>
  <rect x="1176" y="10" width="80" height="28" rx="6" fill="#3D4452"/>
  <text x="1216" y="29" text-anchor="middle" class="text" font-size="12">Close</text>

  <!-- ===== TAB BAR (y=48, h=42) ===== -->
  <rect x="0" y="48" width="1280" height="42" class="surface"/>
  <line x1="0" y1="90" x2="1280" y2="90" stroke="#2D333D" stroke-width="1"/>
  <!-- 通用 inactive -->
  <text x="40" y="72" class="tab-inactive">通用</text>
  <!-- 用户 inactive -->
  <text x="130" y="72" class="tab-inactive">用户</text>
  <!-- AI active -->
  <text x="220" y="72" class="tab-active">AI</text>
  <line x1="200" y="86" x2="238" y2="86" stroke="#3DD68C" stroke-width="2"/>
  <!-- 其它 inactive -->
  <text x="300" y="72" class="tab-inactive">其它</text>

  <!-- ===== LEFT COLUMN (x=16, y=104, w=580) ===== -->

  <!-- === SECTION: 模型配置 === -->
  <text x="16" y="130" class="section-lbl">MODEL CONFIGURATION</text>

  <!-- Current Model -->
  <text x="16" y="154" class="key-label">Current Model</text>
  <text x="130" y="154" fill="#3DD68C" font-size="13" font-weight="500">MiniMax-M2.7-highspeed</text>

  <!-- Divider -->
  <rect x="16" y="168" width="580" height="1" class="divider"/>

  <!-- Select Model label -->
  <text x="16" y="192" class="section-lbl">选择模型</text>

  <!-- Model search -->
  <rect x="16" y="204" width="580" height="34" rx="6" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="32" y="226" class="hint">搜索模型...</text>

  <!-- Model dropdown row -->
  <rect x="16" y="248" width="400" height="30" rx="6" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="32" y="268" class="text" font-size="12">openrouter/auto</text>
  <text x="398" y="268" fill="#8B9099" font-size="10">▼</text>

  <!-- Add button -->
  <rect x="424" y="248" width="48" height="30" rx="6" fill="#3DD68C"/>
  <text x="448" y="268" text-anchor="middle" fill="#13161B" font-size="16" font-weight="600">+</text>

  <!-- Divider -->
  <rect x="16" y="296" width="580" height="1" class="divider"/>

  <!-- API Key section -->
  <text x="16" y="320" class="section-lbl">API KEY</text>

  <!-- API Key textarea -->
  <rect x="16" y="332" width="580" height="64" rx="6" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="32" y="354" class="hint">Enter API Key...</text>

  <!-- Action buttons -->
  <rect x="16" y="412" width="140" height="34" rx="6" fill="#3D4452"/>
  <text x="86" y="433" text-anchor="middle" fill="#8B9099" font-size="12">Test Connection</text>

  <rect x="456" y="412" width="140" height="34" rx="6" fill="#3DD68C"/>
  <text x="526" y="433" text-anchor="middle" fill="#13161B" font-size="12" font-weight="600">Save Model</text>

  <!-- Divider -->
  <rect x="16" y="464" width="580" height="1" class="divider"/>

  <!-- Failover section -->
  <text x="16" y="488" class="section-lbl">FAILOVER</text>
  <rect x="16" y="500" width="580" height="64" rx="6" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="32" y="522" class="hint">Fallback model when primary is unavailable...</text>

  <!-- Save Failover -->
  <rect x="456" y="580" width="140" height="34" rx="6" fill="#3D4452"/>
  <text x="526" y="601" text-anchor="middle" fill="#8B9099" font-size="12">Save Failover</text>

  <!-- ===== RIGHT COLUMN (x=648) ===== -->
  <rect x="632" y="104" width="1" height="620" class="divider"/>

  <!-- === SECTION: Agent 运行时 === -->
  <text x="664" y="130" class="section-lbl">AGENT RUNTIME</text>

  <!-- Active Runtime -->
  <text x="664" y="154" class="key-label">Active Runtime</text>
  <rect x="800" y="146" width="180" height="28" rx="4" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="812" y="165" class="text" font-size="12">Hermes</text>
  <text x="962" y="165" fill="#8B9099" font-size="10">▼</text>

  <!-- Runtime Status -->
  <text x="664" y="192" class="key-label">Runtime Status</text>
  <text x="800" y="192" class="hint">运行时状态: 检查中...</text>

  <!-- Runtime Effect -->
  <text x="664" y="220" class="hint">仅新会话生效，当前会话保持不变</text>

  <!-- Divider -->
  <rect x="664" y="240" width="580" height="1" class="divider"/>

  <!-- Leader Mode -->
  <text x="664" y="264" class="key-label">Leader Mode</text>
  <text x="800" y="264" class="hint">Enable multi-agent coordination</text>
  <!-- Switch OFF -->
  <rect x="1150" y="256" width="40" height="20" rx="10" fill="#3D4452"/>
  <circle cx="1162" cy="266" r="8" fill="#8B9099"/>

  <!-- Hermes Enabled -->
  <text x="664" y="300" class="key-label">Hermes Enabled</text>
  <text x="800" y="300" class="hint">Use Hermes as AI backend</text>
  <!-- Switch ON -->
  <rect x="1150" y="292" width="40" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="1182" cy="302" r="8" fill="white"/>

  <!-- Claude Path -->
  <text x="664" y="336" class="key-label">Claude Path</text>
  <rect x="800" y="328" width="320" height="28" rx="4" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="812" y="346" class="hint">C:\Users\...\AppData\Roaming\npm\claude.cmd</text>

  <!-- Divider -->
  <rect x="664" y="376" width="580" height="1" class="divider"/>

  <!-- === SECTION: 运行时信息 === -->
  <text x="664" y="400" class="section-lbl">RUNTIME INFO</text>

  <!-- Hermes status -->
  <rect x="664" y="416" width="580" height="56" rx="8" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="684" y="442" class="text" font-size="13">🤖 Hermes Agent</text>
  <circle cx="740" cy="438" r="5" fill="#3DD68C"/>
  <text x="752" y="442" fill="#3DD68C" font-size="11" font-weight="500">Connected</text>
  <text x="684" y="462" class="hint" font-size="11">WebSocket: Connected | Session: active</text>

  <!-- Claude CLI status -->
  <rect x="664" y="480" width="580" height="56" rx="8" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="684" y="506" class="text" font-size="13">🔧 Claude CLI</text>
  <circle cx="752" cy="502" r="5" fill="#6B7280"/>
  <text x="764" y="506" fill="#6B7280" font-size="11" font-weight="500">Not found</text>
  <text x="684" y="526" class="hint" font-size="11">Path: C:\Users\...\claude.cmd</text>

  <!-- OpenClaw status -->
  <rect x="664" y="544" width="580" height="56" rx="8" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="684" y="570" class="text" font-size="13">🌐 OpenClaw</text>
  <circle cx="756" cy="566" r="5" fill="#3DD68C"/>
  <text x="768" y="570" fill="#3DD68C" font-size="11" font-weight="500">Healthy</text>
  <text x="684" y="590" class="hint" font-size="11">Gateway: Running | Port: 18789</text>

  <!-- Save Agent Config button -->
  <rect x="1104" y="700" width="140" height="36" rx="6" fill="#3DD68C"/>
  <text x="1174" y="721" text-anchor="middle" fill="#13161B" font-size="12" font-weight="600">Save Agent Config</text>

</svg>
