<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <defs>
    <style>
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
    <linearGradient id="accentBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB872"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="800" fill="#0F1117"/>

  <!-- ===== Header (h=41) ===== -->
  <rect x="0" y="0" width="1280" height="41" rx="0" fill="#0A0C10"/>
  <!-- Logo green worm (cy=21, 与标题栏41px对齐) -->
  <circle cx="23" cy="21" r="9" fill="#3DD68C"/>
  <line x1="16" y1="13" x2="13" y2="8" stroke="#3DD68C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="13" x2="33" y2="8" stroke="#3DD68C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="13" cy="8" r="2.5" fill="#3DD68C"/>
  <circle cx="33" cy="8" r="2.5" fill="#3DD68C"/>
  <ellipse cx="20" cy="19" rx="2.5" ry="3" fill="#0F1117"/>
  <ellipse cx="26" cy="19" rx="2.5" ry="3" fill="#0F1117"/>
  <circle cx="21" cy="18" r="1" fill="#FFFFFF"/>
  <circle cx="27" cy="18" r="1" fill="#FFFFFF"/>
  <ellipse cx="17" cy="23" rx="3" ry="1.5" fill="#FF9EB5" opacity="0.7"/>
  <ellipse cx="29" cy="23" rx="3" ry="1.5" fill="#FF9EB5" opacity="0.7"/>
  <path d="M 21 25 Q 23 28 26 25" stroke="#0F1117" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <text x="48" y="26" font-family="sans-serif" font-size="13" fill="#E8ECF4">AnyClaw Setup</text>
  <!-- Window controls -->
  <text x="1166" y="25" text-anchor="middle" font-size="11" fill="#6B7280">─</text>
  <rect x="1187" y="10" width="30" height="21" rx="4" fill="#252A38"/>
  <text x="1202" y="25" text-anchor="middle" font-size="10" fill="#6B7280">□</text>
  <rect x="1223" y="10" width="30" height="21" rx="4" fill="#3DD68C" fill-opacity="0.15"/>
  <text x="1238" y="25" text-anchor="middle" font-size="11" fill="#3DD68C">✕</text>

  <!-- ===== StepBar (y=41, h=48) ===== -->
  <rect x="0" y="41" width="1280" height="48" rx="0" fill="#0F1117"/>
  <line x1="0" y1="89" x2="1280" y2="89" stroke="#252A38" stroke-width="1"/>
  <!-- Step 0 (current) -->
  <circle cx="448" cy="65" r="6" fill="#3DD68C"/>
  <text x="448" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#3DD68C">语言</text>
  <!-- Step 0→1 line (active) -->
  <line x1="454" y1="65" x2="574" y2="65" stroke="#3DD68C" stroke-width="1.5"/>
  <!-- Step 1 (future) -->
  <circle cx="580" cy="65" r="6" fill="transparent" stroke="#3DD68C" stroke-width="1.5"/>
  <text x="580" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">环境</text>
  <!-- Step 1→2 line (future) -->
  <line x1="586" y1="65" x2="706" y2="65" stroke="#252A38" stroke-width="1.5"/>
  <!-- Step 2 (future) -->
  <circle cx="712" cy="65" r="6" fill="transparent" stroke="#3DD68C" stroke-width="1.5"/>
  <text x="712" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">模型</text>
  <!-- Step 2→3 line (future) -->
  <line x1="718" y1="65" x2="838" y2="65" stroke="#252A38" stroke-width="1.5"/>
  <!-- Step 3 (future) -->
  <circle cx="844" cy="65" r="6" fill="transparent" stroke="#3DD68C" stroke-width="1.5"/>
  <text x="844" y="85" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#6B7280">完成</text>

  <!-- ===== Content (y=89, h=572) ===== -->
  <rect x="0" y="89" width="1280" height="572" fill="#0F1117"/>

  <!-- Title -->
  <text x="640" y="145" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#E8ECF4" font-weight="bold">请选择你的语言</text>
  <text x="640" y="169" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B92A8">Please select your language</text>

  <!-- Language Cards -->
  <!-- 中文 Card (selected) -->
  <rect x="340" y="200" width="220" height="150" rx="12" fill="#1A1D27" stroke="#3DD68C" stroke-width="2"/>
  <!-- Selected check -->
  <circle cx="535" cy="218" r="10" fill="#3DD68C"/>
  <text x="535" y="223" text-anchor="middle" font-size="11" fill="#0F1117" font-weight="bold">✓</text>
  <text x="450" y="268" text-anchor="middle" font-family="sans-serif" font-size="30">🇨🇳</text>
  <text x="450" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#E8ECF4" font-weight="bold">中文</text>
  <text x="450" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B92A8">简体中文</text>

  <!-- English Card -->
  <rect x="720" y="200" width="220" height="150" rx="12" fill="#1A1D27" stroke="#3DD68C" stroke-opacity="0.15" stroke-width="1"/>
  <text x="830" y="268" text-anchor="middle" font-family="sans-serif" font-size="30">🇺🇸</text>
  <text x="830" y="300" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#E8ECF4" font-weight="bold">English</text>
  <text x="830" y="320" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#8B92A8">English</text>

  <!-- Hint -->
  <circle cx="603" y="380" r="5" fill="#3DD68C"/>
  <text x="613" y="384" font-family="sans-serif" font-size="13" fill="#3DD68C">已选择: 中文</text>

  <!-- ===== Footer (y=661, h=100) ===== -->
  <rect x="0" y="700" width="1280" height="100" rx="0" fill="#0A0C10"/>
  <line x1="0" y1="700" x2="1280" y2="700" stroke="#3DD68C" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Exit -->
  <rect x="83" y="724" width="90" height="40" rx="8" fill="#252A38"/>
  <text x="128" y="747" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#E8ECF4">退出向导</text>
  <!-- Prev (disabled in Step0) -->
  <rect x="1083" y="724" width="80" height="40" rx="8" fill="#252A38" fill-opacity="0.5"/>
  <text x="1123" y="747" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#4B5268">上一步</text>
  <!-- Next (accent, enabled) -->
  <rect x="1173" y="724" width="90" height="40" rx="8" fill="#3DD68C"/>
  <text x="1218" y="747" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F1117" font-weight="bold">下一步</text>
</svg>
