<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <title>UI-45 C1 General + Model Tab</title>
  <desc>C1 General + Model Tab in Settings Panel, based on ui_settings.cpp build_general_tab + build_model_tab</desc>

  <defs>
    <style>
      .bg           { fill: #13161B; }
      .panel        { fill: #1E2128; }
      .surface      { fill: #252930; }
      .accent       { fill: #3DD68C; }
      .accent-sub   { fill: #3DD68C; opacity: 0.15; }
      .text         { fill: #E8E9E9; font-size: 13px; }
      .text-dim     { fill: #8B9099; font-size: 13px; }
      .text-sm      { fill: #8B9099; font-size: 12px; }
      .text-hint    { fill: #6B7280; font-size: 12px; }
      .divider      { fill: #2D333D; }
      .badge-ok     { fill: #3DD68C; font-size: 11px; font-weight: 600; }
      .tab-active   { fill: #3DD68C; font-size: 14px; font-weight: 600; }
      .tab-inactive { fill: #8B9099; font-size: 14px; }
      .section-lbl  { fill: #3DD68C; font-size: 12px; font-weight: 500; }
      .btn-accent   { fill: #3DD68C; }
      .btn-outline  { fill: #252930; stroke: #3DD68C; stroke-width: 1; }
      .btn-sec       { fill: #3D4452; }
    </style>
  </defs>

  <!-- ===== WINDOW ===== -->
  <rect width="1280" height="800" class="bg"/>

  <!-- ===== TITLE BAR (y=0, h=48) ===== -->
  <rect x="0" y="0" width="1280" height="48" class="panel"/>
  <text x="24" y="29" class="text" font-weight="600">Settings</text>
  <rect x="1186" y="8" width="84" height="32" rx="6" class="btn-sec"/>
  <text x="1228" y="29" text-anchor="middle" class="text" font-size="12">Close</text>

  <!-- ===== TAB BAR (y=48, h=44) ===== -->
  <rect x="0" y="48" width="1280" height="44" class="surface"/>
  <line x1="0" y1="91" x2="1280" y2="91" stroke="#2D333D" stroke-width="1"/>
  <!-- C1 active -->
  <text x="40" y="73" class="tab-active">C1 开始使用</text>
  <line x1="20" y1="87" x2="140" y2="87" stroke="#3DD68C" stroke-width="2"/>
  <!-- C2 inactive -->
  <text x="180" y="73" class="tab-inactive">C2 对话与任务</text>
  <!-- C3 inactive -->
  <text x="360" y="73" class="tab-inactive">C3 Agent</text>
  <!-- C4 inactive -->
  <text x="490" y="73" class="tab-inactive">C4 系统诊断</text>

  <!-- ===== CONTENT AREA (tabview: x=20, y=54, w=1240, h=734-12) ===== -->
  <!-- C1 General Section Label -->
  <text x="36" y="130" class="text-dim" font-size="11" letter-spacing="1">GENERAL</text>

  <!-- === INFO ROWS === -->
  <!-- Gateway Status -->
  <text x="36" y="156" class="text-dim">Gateway Status</text>
  <circle cx="190" cy="152" r="5" fill="#3DD68C"/>
  <text x="202" y="156" class="badge-ok">Ready</text>

  <!-- Install Path -->
  <text x="36" y="186" class="text-dim">Install Path</text>
  <text x="160" y="186" class="text-sm">C:\Users\...\AppData\Roaming\npm\node_modules\openclaw</text>

  <!-- Workspace -->
  <text x="36" y="216" class="text-dim">Workspace</text>
  <text x="160" y="216" class="text-sm">D:\workspace\AnyClaw</text>

  <!-- Divider -->
  <rect x="36" y="232" width="1208" height="1" class="divider"/>

  <!-- === WORKSPACE MANAGER === -->
  <text x="36" y="256" class="text-dim" font-size="11" letter-spacing="1">WORKSPACE</text>

  <!-- Workspace List dropdown -->
  <text x="36" y="282" class="text-dim">Workspace List</text>
  <rect x="180" y="270" width="280" height="28" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="192" y="288" class="text-sm">D:\workspace\AnyClaw</text>
  <text x="442" y="288" class="text-dim" font-size="10">▼</text>

  <!-- Workspace Input -->
  <text x="36" y="318" class="text-dim">Workspace Input</text>
  <rect x="180" y="306" width="280" height="28" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="192" y="324" class="text-hint">D:\workspace\MyProject</text>

  <!-- Apply / Save buttons -->
  <rect x="180" y="344" width="130" height="32" rx="6" class="btn-accent"/>
  <text x="245" y="365" text-anchor="middle" fill="#13161B" font-size="12" font-weight="600">Apply Workspace</text>
  <rect x="318" y="344" width="120" height="32" rx="6" class="btn-outline"/>
  <text x="378" y="365" text-anchor="middle" class="accent" font-size="12">Save Candidate</text>

  <!-- Workspace Status -->
  <text x="36" y="396" class="text-dim">Workspace Status</text>
  <text x="180" y="396" class="text-hint">Workspace manager ready</text>

  <!-- Divider -->
  <rect x="36" y="412" width="1208" height="1" class="divider"/>

  <!-- === APPLICATION AUTHORIZATION === -->
  <text x="36" y="436" class="section-lbl">Application Authorization</text>

  <!-- Outlook card -->
  <rect x="36" y="450" width="560" height="72" rx="8" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="56" y="474" class="text">📧 Outlook</text>
  <text x="56" y="494" class="text-sm">推荐交互方式: CLI</text>
  <rect x="420" y="468" width="68" height="26" rx="5" class="btn-accent"/>
  <text x="454" y="485" text-anchor="middle" fill="#13161B" font-size="11" font-weight="600">授权</text>
  <rect x="496" y="468" width="68" height="26" rx="5" class="btn-sec"/>
  <text x="530" y="485" text-anchor="middle" class="text-dim" font-size="11">拒绝</text>

  <!-- Calendar card -->
  <rect x="36" y="530" width="560" height="72" rx="8" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="56" y="554" class="text">📅 Calendar</text>
  <text x="56" y="574" class="text-sm">推荐交互方式: MCP</text>
  <rect x="420" y="548" width="68" height="26" rx="5" class="btn-accent"/>
  <text x="454" y="565" text-anchor="middle" fill="#13161B" font-size="11" font-weight="600">授权</text>
  <rect x="496" y="548" width="68" height="26" rx="5" class="btn-sec"/>
  <text x="530" y="565" text-anchor="middle" class="text-dim" font-size="11">拒绝</text>

  <!-- Email / Calendar access switches (inline row) -->
  <text x="36" y="628" class="text-dim">Email Access</text>
  <rect x="160" y="620" width="40" height="20" rx="10" class="btn-accent"/>
  <circle cx="192" cy="630" r="8" fill="#FFFFFF"/>

  <text x="240" y="628" class="text-dim">Calendar Access</text>
  <rect x="368" y="620" width="40" height="20" rx="10" class="btn-accent"/>
  <circle cx="400" cy="630" r="8" fill="#FFFFFF"/>

  <!-- Scan Installed Apps -->
  <text x="36" y="668" class="text-dim">Scan Installed Apps</text>
  <rect x="200" y="660" width="200" height="32" rx="6" class="btn-accent"/>
  <text x="300" y="681" text-anchor="middle" fill="#13161B" font-size="12" font-weight="600">Scan Installed Apps</text>

  <!-- Scan result textarea -->
  <rect x="36" y="694" width="560" height="80" rx="6" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="52" y="716" class="text-hint">Scan result will be shown here...</text>

  <!-- Divider -->
  <rect x="36" y="788" width="1208" height="1" class="divider"/>

  <!-- === BOOT & EXIT (right column, y=120) === -->
  <!-- Boot Start -->
  <text x="660" y="156" class="text-dim">Boot Start</text>
  <text x="800" y="156" class="text-sm">Start on boot</text>
  <rect x="1100" y="148" width="40" height="20" rx="10" class="btn-accent"/>
  <circle cx="1132" cy="158" r="8" fill="#FFFFFF"/>

  <!-- Auto Start -->
  <text x="660" y="196" class="text-dim">Auto Start</text>
  <text x="800" y="196" class="text-sm">Restart on crash</text>
  <rect x="1100" y="188" width="40" height="20" rx="10" class="btn-accent"/>
  <circle cx="1132" cy="198" r="8" fill="#FFFFFF"/>

  <!-- Close OpenClaw on exit -->
  <text x="660" y="236" class="text-dim">Close OpenClaw on exit</text>
  <text x="880" y="236" class="text-sm">Stop Gateway when quitting</text>
  <rect x="1100" y="228" width="40" height="20" rx="10" class="btn-accent"/>
  <circle cx="1132" cy="238" r="8" fill="#FFFFFF"/>

  <!-- Language -->
  <text x="660" y="276" class="text-dim">Language</text>
  <rect x="800" y="268" width="140" height="28" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="812" y="286" class="text-sm">中文</text>
  <text x="922" y="286" class="text-dim" font-size="10">▼</text>

  <!-- Refresh -->
  <text x="660" y="316" class="text-dim">Refresh</text>
  <rect x="800" y="308" width="140" height="28" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="812" y="326" class="text-sm">15s</text>
  <text x="922" y="326" class="text-dim" font-size="10">▼</text>

  <!-- Theme label -->
  <text x="660" y="356" class="text-dim">Theme</text>

  <!-- Theme buttons -->
  <rect x="800" y="348" width="80" height="28" rx="5" class="btn-accent"/>
  <text x="840" y="365" text-anchor="middle" fill="#13161B" font-size="11" font-weight="600">■ Matcha</text>
  <rect x="888" y="348" width="72" height="28" rx="5" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="924" y="365" text-anchor="middle" class="text-dim" font-size="11">□ Peachy</text>
  <rect x="968" y="348" width="72" height="28" rx="5" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="1004" y="365" text-anchor="middle" class="text-dim" font-size="11">□ Mochi</text>

  <!-- Security -->
  <text x="660" y="396" class="text-dim">Security</text>
  <circle cx="750" cy="392" r="5" fill="#3DD68C"/>
  <text x="762" y="396" class="badge-ok">OK</text>

  <!-- Security detail -->
  <text x="660" y="426" class="text-hint" font-size="11">API Key: Checking | Port: -- | Config: Checking</text>

  <!-- Divider (right column) -->
  <rect x="620" y="444" width="1" height="360" class="divider"/>

  <!-- Reconfigure Wizard -->
  <rect x="660" y="468" width="580" height="40" rx="8" class="accent-sub" stroke="#3DD68C" stroke-width="1"/>
  <text x="950" y="492" text-anchor="middle" class="accent" font-size="13" font-weight="600">🔧 Reconfigure Wizard</text>

  <!-- Divider after wizard -->
  <rect x="620" y="524" width="1" height="280" class="divider"/>

  <!-- === MODEL SECTION (right column, below wizard divider) === -->
  <text x="660" y="548" class="text-dim" font-size="11" letter-spacing="1">MODEL</text>

  <!-- Current Model -->
  <text x="660" y="574" class="text-dim">Current Model</text>
  <text x="800" y="574" class="badge-ok">MiniMax-M2.7</text>

  <!-- Select Model section -->
  <text x="660" y="608" class="section-lbl">选择模型</text>

  <!-- Model search -->
  <rect x="660" y="618" width="580" height="36" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="676" y="640" class="text-hint">搜索模型...</text>

  <!-- Model dropdown row -->
  <text x="660" y="676" class="text-dim">Select Model</text>
  <rect x="800" y="668" width="380" height="28" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="812" y="686" class="text-sm">openrouter/auto</text>
  <text x="1162" y="686" class="text-dim" font-size="10">▼</text>
  <!-- Add button -->
  <rect x="1188" y="668" width="52" height="28" rx="4" class="btn-accent"/>
  <text x="1214" y="686" text-anchor="middle" fill="#13161B" font-size="16" font-weight="600">+</text>

  <!-- API Key section -->
  <text x="660" y="718" class="section-lbl">API Key</text>
  <rect x="660" y="730" width="580" height="56" rx="4" class="surface" stroke="#2D333D" stroke-width="1"/>
  <text x="676" y="750" class="text-hint">Enter API Key...</text>

  <!-- Test Connection + Save buttons -->
  <rect x="660" y="796" width="140" height="36" rx="6" class="btn-sec"/>
  <text x="730" y="817" text-anchor="middle" class="text-dim" font-size="12">Test Connection</text>

  <rect x="1100" y="796" width="140" height="36" rx="6" class="btn-accent"/>
  <text x="1170" y="817" text-anchor="middle" fill="#13161B" font-size="12" font-weight="600">Save Model</text>

</svg>
