<svg viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <title>UI-45B 通用 Tab</title>
  <desc>Settings 通用 Tab: Gateway状态/安装路径/工作区/启动偏好/界面偏好/日志/Reconfigure Wizard</desc>

  <defs>
    <style>
      .bg           { fill: #13161B; }
      .panel        { fill: #1E2128; }
      .surface      { fill: #252930; }
      .accent       { fill: #3DD68C; }
      .accent-sub   { fill: #3DD68C; opacity: 0.12; }
      .text         { fill: #E8E9E9; }
      .text-dim     { fill: #8B9099; }
      .text-hint    { fill: #6B7280; }
      .divider      { fill: #2D333D; }
      .badge-ok     { fill: #3DD68C; }
      .tab-active   { fill: #3DD68C; font-size: 14px; font-weight: 600; }
      .tab-inactive { fill: #8B9099; font-size: 14px; }
      .section-lbl  { fill: #3DD68C; font-size: 12px; font-weight: 500; }
      .key-label    { fill: #8B9099; font-size: 13px; }
      .hint         { fill: #6B7280; font-size: 11px; }
    </style>
  </defs>

  <!-- ===== WINDOW ===== -->
  <rect width="1280" height="800" class="bg"/>

  <!-- ===== TITLE BAR (y=0, h=48) ===== -->
  <rect x="0" y="0" width="1280" height="48" class="panel"/>
  <text x="24" y="29" class="text" font-size="15" font-weight="600">Settings</text>
  <rect x="1176" y="10" width="80" height="28" rx="6" fill="#3D4452"/>
  <text x="1216" y="29" text-anchor="middle" class="text" font-size="12">Close</text>

  <!-- ===== TAB BAR (y=48, h=42) ===== -->
  <rect x="0" y="48" width="1280" height="42" class="surface"/>
  <line x1="0" y1="90" x2="1280" y2="90" stroke="#2D333D" stroke-width="1"/>
  <!-- 通用 active -->
  <text x="40" y="72" class="tab-active">通用</text>
  <line x1="20" y1="86" x2="80" y2="86" stroke="#3DD68C" stroke-width="2"/>
  <!-- 用户 inactive -->
  <text x="130" y="72" class="tab-inactive">用户</text>
  <!-- AI inactive -->
  <text x="220" y="72" class="tab-inactive">AI</text>
  <!-- 其它 inactive -->
  <text x="300" y="72" class="tab-inactive">其它</text>

  <!-- ===== CONTENT (x=16, y=104, w=1248, h=680) ===== -->
  <!-- pad_all=16, flex gap=8 -->

  <!-- === SECTION: 信息 === -->
  <text x="16" y="130" class="section-lbl">SYSTEM</text>

  <!-- Gateway Status -->
  <rect x="16" y="144" width="600" height="28" fill="none"/>
  <text x="16" y="163" class="key-label">Gateway Status</text>
  <circle cx="160" cy="159" r="5" fill="#3DD68C"/>
  <text x="172" y="163" class="badge-ok" font-size="12" font-weight="600">Ready</text>

  <!-- Install Path -->
  <text x="16" y="192" class="key-label">Install Path</text>
  <text x="120" y="192" class="text-hint" font-size="12">C:\Users\...\AppData\Roaming\npm\node_modules\openclaw</text>

  <!-- Workspace -->
  <text x="16" y="220" class="key-label">Workspace</text>
  <text x="120" y="220" class="text-hint" font-size="12">D:\workspace\AnyClaw</text>

  <!-- Divider -->
  <rect x="16" y="240" width="1208" height="1" class="divider"/>

  <!-- === SECTION: 启动偏好 === -->
  <text x="16" y="264" class="section-lbl">STARTUP</text>

  <!-- Boot Start -->
  <text x="16" y="288" class="key-label">Boot Start</text>
  <text x="140" y="288" class="hint">Start on boot</text>
  <!-- Switch ON -->
  <rect x="580" y="280" width="40" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="612" cy="290" r="8" fill="white"/>

  <!-- Auto Start -->
  <text x="16" y="324" class="key-label">Auto Start</text>
  <text x="140" y="324" class="hint">Restart on crash</text>
  <!-- Switch OFF -->
  <rect x="580" y="316" width="40" height="20" rx="10" fill="#3D4452"/>
  <circle cx="592" cy="326" r="8" fill="#8B9099"/>

  <!-- 退出关闭 Gateway -->
  <text x="16" y="360" class="key-label">Close OpenClaw on exit</text>
  <text x="210" y="360" class="hint">Stop Gateway when quitting</text>
  <!-- Switch ON -->
  <rect x="580" y="352" width="40" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="612" cy="362" r="8" fill="white"/>

  <!-- Divider -->
  <rect x="16" y="384" width="1208" height="1" class="divider"/>

  <!-- === SECTION: 界面偏好 === -->
  <text x="16" y="408" class="section-lbl">PREFERENCES</text>

  <!-- Language -->
  <text x="16" y="432" class="key-label">Language</text>
  <rect x="140" y="424" width="140" height="26" rx="4" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="152" y="442" fill="#E8E9E9" font-size="12">中文</text>
  <text x="266" y="442" fill="#8B9099" font-size="10">▼</text>

  <!-- Refresh -->
  <text x="16" y="468" class="key-label">Refresh</text>
  <rect x="140" y="460" width="140" height="26" rx="4" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="152" y="478" fill="#E8E9E9" font-size="12">15s</text>
  <text x="266" y="478" fill="#8B9099" font-size="10">▼</text>

  <!-- Theme -->
  <text x="16" y="504" class="key-label">Theme</text>
  <!-- Matcha active -->
  <rect x="140" y="496" width="76" height="26" rx="5" fill="#3DD68C"/>
  <text x="178" y="513" text-anchor="middle" fill="#13161B" font-size="11" font-weight="600">■ Matcha</text>
  <!-- Peachy inactive -->
  <rect x="224" y="496" width="68" height="26" rx="5" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="258" y="513" text-anchor="middle" fill="#8B9099" font-size="11">□ Peachy</text>
  <!-- Mochi inactive -->
  <rect x="300" y="496" width="68" height="26" rx="5" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="334" y="513" text-anchor="middle" fill="#8B9099" font-size="11">□ Mochi</text>

  <!-- Divider -->
  <rect x="16" y="536" width="1208" height="1" class="divider"/>

  <!-- === SECTION: 日志 === -->
  <text x="16" y="560" class="section-lbl">LOGGING</text>

  <!-- Log System -->
  <text x="16" y="584" class="key-label">Log System</text>
  <text x="160" y="584" class="hint">Write to logs\anyclaw_app.log</text>
  <!-- Switch ON -->
  <rect x="580" y="576" width="40" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="612" cy="586" r="8" fill="white"/>

  <!-- Log Level -->
  <text x="16" y="620" class="key-label">Log Level</text>
  <rect x="140" y="612" width="140" height="26" rx="4" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="152" y="630" fill="#E8E9E9" font-size="12">Debug</text>
  <text x="266" y="630" fill="#8B9099" font-size="10">▼</text>

  <!-- Divider -->
  <rect x="16" y="656" width="1208" height="1" class="divider"/>

  <!-- === Reconfigure Wizard === -->
  <rect x="16" y="672" width="600" height="40" rx="8" fill="#3DD68C" opacity="0.12" stroke="#3DD68C" stroke-width="1"/>
  <text x="316" y="697" text-anchor="middle" fill="#3DD68C" font-size="13" font-weight="600">🔧 Reconfigure Wizard</text>

  <!-- ===== RIGHT COLUMN (x=648) ===== -->
  <!-- Vertical divider -->
  <rect x="632" y="104" width="1" height="624" class="divider"/>

  <!-- === SECTION: 信息 (right) === -->
  <text x="664" y="130" class="section-lbl">STATUS</text>

  <!-- Gateway Status card -->
  <rect x="664" y="144" width="580" height="60" rx="8" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="684" y="170" class="key-label">Gateway Status</text>
  <circle cx="740" cy="166" r="5" fill="#3DD68C"/>
  <text x="752" y="170" class="badge-ok" font-size="12" font-weight="600">Ready</text>
  <text x="684" y="190" class="hint" font-size="11">Port 18789 — OpenClaw gateway running</text>

  <!-- Security card -->
  <rect x="664" y="216" width="580" height="72" rx="8" fill="#252930" stroke="#2D333D" stroke-width="1"/>
  <text x="684" y="242" class="key-label">Security</text>
  <circle cx="756" cy="238" r="5" fill="#3DD68C"/>
  <text x="768" y="242" class="badge-ok" font-size="12" font-weight="600">OK</text>
  <text x="684" y="264" class="hint" font-size="11">API Key: Checking | Port: -- | Config: Checking</text>

  <!-- === SECTION: 运行时信息 === -->
  <text x="664" y="320" class="section-lbl">RUNTIME</text>

  <!-- Node.js -->
  <text x="664" y="344" class="key-label">Node.js</text>
  <text x="760" y="344" fill="#3DD68C" font-size="12">v22.14.0</text>

  <!-- npm -->
  <text x="664" y="372" class="key-label">npm</text>
  <text x="760" y="372" fill="#3DD68C" font-size="12">10.9.0</text>

  <!-- OpenClaw -->
  <text x="664" y="400" class="key-label">OpenClaw</text>
  <text x="760" y="400" fill="#3DD68C" font-size="12">v1.2.3</text>

  <!-- Hermes Agent -->
  <text x="664" y="428" class="key-label">Hermes Agent</text>
  <text x="760" y="428" fill="#6B7280" font-size="12">Not connected</text>

  <!-- Disk Space -->
  <text x="664" y="456" class="key-label">Disk Space</text>
  <text x="760" y="456" fill="#3DD68C" font-size="12">2048 MB free</text>

  <!-- Network -->
  <text x="664" y="484" class="key-label">Network</text>
  <text x="760" y="484" fill="#3DD68C" font-size="12">OK</text>

  <!-- Divider -->
  <rect x="664" y="508" width="580" height="1" class="divider"/>

  <!-- === SECTION: 配置路径 === -->
  <text x="664" y="532" class="section-lbl">PATHS</text>

  <!-- Config Dir -->
  <text x="664" y="556" class="key-label">Config Dir</text>
  <text x="760" y="556" fill="#6B7280" font-size="11">C:\Users\...\AnyClaw_LVGL</text>

  <!-- Log Dir -->
  <text x="664" y="580" class="key-label">Log Dir</text>
  <text x="760" y="580" fill="#6B7280" font-size="11">C:\Users\...\AnyClaw_LVGL\logs</text>

  <!-- Workspace Root -->
  <text x="664" y="604" class="key-label">Workspace Root</text>
  <text x="760" y="604" fill="#6B7280" font-size="11">D:\workspace</text>

</svg>
