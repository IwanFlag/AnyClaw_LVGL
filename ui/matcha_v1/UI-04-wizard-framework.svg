  <!-- 日志内容（终端风格） -->
  <text x="644" y="220" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; 正在检测 Node.js...</text>
  <text x="644" y="240" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; Node.js v22.14.0 已就绪 ✓</text>
  <text x="644" y="260" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; 正在检测 npm...</text>
  <text x="644" y="280" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; npm v10.8.0 已就绪 ✓</text>
  <text x="644" y="300" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; 正在检测网络连通性...</text>
  <text x="644" y="320" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; 网络 OK ✓</text>
  <text x="644" y="340" font-family="Consolas, monospace" font-size="11" fill="#FFBE3D">&gt; 未检测到 OpenClaw</text>
  <text x="644" y="360" font-family="Consolas, monospace" font-size="11" fill="#FFBE3D">&gt; 未检测到 Hermes</text>
  <text x="644" y="380" font-family="Consolas, monospace" font-size="11" fill="#FFBE3D">&gt; 未检测到 Claude Code CLI</text>
  <text x="644" y="400" font-family="Consolas, monospace" font-size="11" fill="#3DD68C">&gt; 磁盘空间充足 ✓</text>
  <text x="644" y="420" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">&gt; 请选择安装方式...</text>

  <!-- 光标闪烁效果 -->
  <rect x="644" y="438" width="8" height="14" rx="2" fill="#3DD68C" opacity="0.8"/>

  <!-- ===== 安装选项按钮（OpenClaw/Hermes/Claude 均未安装时显示） ===== -->
  <!-- 三按钮水平居中，总宽=180+16+140+16+130=482，起始x=(1280-482)/2=399 -->
  <rect x="399" y="522" width="180" height="40" rx="11" fill="#3DD68C"/>
  <text x="489" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0F1117" font-weight="600">从网络下载安装（推荐）</text>

  <rect x="595" y="522" width="140" height="40" rx="11" fill="#252A38"/>
  <text x="665" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B92A8">使用本地离线包</text>

  <rect x="751" y="522" width="130" height="40" rx="11" fill="#252A38"/>
  <text x="816" y="546" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">稍后手动处理</text>

  <!-- ===== Footer 100px（12.5%） ===== -->
  <rect x="0" y="655" width="1280" height="100" fill="#0A0C10"/>
  <line x1="0" y1="655" x2="1280" y2="655" stroke="#3DD68C" stroke-opacity="0.06" stroke-width="1"/>

  <!-- 底部按钮（Exit 左对齐，上一步/下一步 右对齐） -->
  <rect x="90" y="679" width="120" height="36" rx="11" fill="#252A38"/>
  <text x="150" y="701" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B92A8">退出向导</text>

  <rect x="1000" y="679" width="120" height="36" rx="11" fill="#252A38"/>
  <text x="1060" y="701" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8B92A8">上一步</text>

  <rect x="1140" y="679" width="120" height="36" rx="11" fill="#3DD68C"/>
  <text x="1200" y="701" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0F1117" font-weight="600">下一步 ▶</text>
</svg>