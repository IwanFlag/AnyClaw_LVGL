  <!-- 列1: x=122(名称140px) | 列2: x=262(值156px) | 列3: x=418(80px) -->
  <!-- 行高=24px，gap=12px，起始y=220 -->
  <!-- 行n中心y = 220 + (n-1)*36 -->

  <!-- 行1: Node.js ✅ -->
  <circle cx="122" cy="220" r="4" fill="#3DD68C"/>
  <text x="134" y="224" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Node.js</text>
  <text x="262" y="224" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">v22.14.0</text>
  <rect x="418" y="210" width="80" height="20" rx="10" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="430" cy="220" r="3.5" fill="#3DD68C"/>
  <text x="440" y="224" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- 行2: npm ✅ -->
  <circle cx="122" cy="256" r="4" fill="#3DD68C"/>
  <text x="134" y="260" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">npm</text>
  <text x="262" y="260" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">v10.8.0</text>
  <rect x="418" y="246" width="80" height="20" rx="10" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="430" cy="256" r="3.5" fill="#3DD68C"/>
  <text x="440" y="260" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- 行3: Network ✅ -->
  <circle cx="122" cy="292" r="4" fill="#3DD68C"/>
  <text x="134" y="296" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Network</text>
  <text x="262" y="296" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">google.com</text>
  <rect x="418" y="282" width="80" height="20" rx="10" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="430" cy="292" r="3.5" fill="#3DD68C"/>
  <text x="440" y="296" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

