  <!-- 左面板: x=90, w=480px(37.5%), 右面板: x=610, w=580px(45.3%), 间距=40px -->

  <!-- 左面板背景 -->
  <rect x="90" y="164" width="480" height="340" rx="10" fill="#13151E" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>
  <text x="114" y="190" font-family="system-ui, sans-serif" font-size="12" fill="#E8ECF4">检测结果</text>

