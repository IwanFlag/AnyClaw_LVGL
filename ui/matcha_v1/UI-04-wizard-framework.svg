  <text x="134" y="332" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">OpenClaw</text>
  <text x="262" y="332" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">未安装</text>
