  <circle cx="430" cy="328" r="3.5" fill="#FFBE3D"/>
  <text x="440" y="332" font-family="system-ui, sans-serif" font-size="9" fill="#FFBE3D">Warn</text>

  <!-- 行5: Hermes ⚠ 未安装 -->
  <circle cx="122" cy="364" r="4" fill="#FFBE3D"/>
  <text x="134" y="368" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Hermes</text>
  <text x="262" y="368" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">未安装</text>
  <rect x="418" y="354" width="80" height="20" rx="10" fill="#FEF3C7"/>
  <circle cx="430" cy="364" r="3.5" fill="#FFBE3D"/>
  <text x="440" y="368" font-family="system-ui, sans-serif" font-size="9" fill="#FFBE3D">Warn</text>

