<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800">
  <!-- viewBox=1280×800（主窗口逻辑像素），所有坐标基于此比例 -->
  <!-- 比例说明：Header=41(5.1%), StepBar=48(6%), Content=466(58.3%), Footer=100(12.5%), 面板区=340 -->

  <!-- ===== 背景 ===== -->
  <rect width="1280" height="800" fill="#0F1117"/>

  <!-- ===== Header 41px（5.1%） ===== -->
  <rect x="0" y="0" width="1280" height="41" rx="0" fill="#0A0C10"/>
  <line x1="0" y1="41" x2="1280" y2="41" stroke="#3DD68C" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Logo 大青虫子 SVG（中心 x=30, y=20） -->
  <circle cx="30" cy="20" r="10" fill="#3DD68C"/>
  <line x1="23" y1="9" x2="20" y2="4" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="37" y1="9" x2="40" y2="4" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="20" cy="4" r="3.5" fill="#3DD68C"/>
  <circle cx="40" cy="4" r="3.5" fill="#3DD68C"/>
  <ellipse cx="25" cy="17" rx="3.5" ry="4.5" fill="#0F1117"/>
  <ellipse cx="35" cy="17" rx="3.5" ry="4.5" fill="#0F1117"/>
  <circle cx="26" cy="15" r="1.5" fill="#FFFFFF"/>
  <circle cx="36" cy="15" r="1.5" fill="#FFFFFF"/>
  <ellipse cx="20" cy="28" rx="5" ry="2.5" fill="#FF9EB5" opacity="0.7"/>
  <ellipse cx="40" cy="28" rx="5" ry="2.5" fill="#FF9EB5" opacity="0.7"/>
  <path d="M 26 31 Q 30 35 34 31" stroke="#0F1117" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Header 标题 -->
  <text x="58" y="26" font-family="system-ui, sans-serif" font-size="13" fill="#E8ECF4">AnyClaw Setup</text>

  <!-- 窗口控制按钮（右对齐，总宽=32+30+32=94，右边距=20） -->
  <text x="1152" y="25" text-anchor="middle" font-size="12" fill="#6B7280">─</text>
  <rect x="1178" y="13" width="32" height="17" rx="4" fill="#252A38"/>
  <text x="1194" y="25" text-anchor="middle" font-size="10" fill="#6B7280">□</text>
  <rect x="1214" y="13" width="32" height="17" rx="4" fill="#3DD68C" fill-opacity="0.2"/>
  <text x="1230" y="25" text-anchor="middle" font-size="10" fill="#3DD68C">✕</text>

  <!-- ===== StepBar 48px（6%） ===== -->
  <rect x="0" y="41" width="1280" height="48" fill="#13151E"/>

  <!-- 连接线（y=65，圆心距=200px） -->
  <line x1="259" y1="65" x2="443" y2="65" stroke="#3DD68C" stroke-width="2" stroke-opacity="0.5"/>
  <line x1="459" y1="65" x2="643" y2="65" stroke="#3DD68C" stroke-width="2" stroke-opacity="0.2"/>
  <line x1="659" y1="65" x2="843" y2="65" stroke="#3DD68C" stroke-width="2" stroke-opacity="0.1"/>

  <!-- 圆点1: 语言 (已完成●) -->
  <circle cx="251" cy="65" r="8" fill="#3DD68C"/>
  <text x="251" y="70" text-anchor="middle" font-size="10" fill="#0F1117">✓</text>

  <!-- 圆点2: 环境 (当前● glow) -->
  <circle cx="451" cy="65" r="8" fill="#3DD68C"/>
  <circle cx="451" cy="65" r="12" fill="none" stroke="#3DD68C" stroke-width="1.5" stroke-opacity="0.35"/>
  <circle cx="451" cy="65" r="16" fill="none" stroke="#3DD68C" stroke-width="1" stroke-opacity="0.18"/>

  <!-- 圆点3: 模型 (未到○) -->
  <circle cx="651" cy="65" r="8" fill="none" stroke="#3DD68C" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 圆点4: 完成 (未到○) -->
  <circle cx="851" cy="65" r="8" fill="none" stroke="#3DD68C" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- 步骤标签 -->
  <text x="251" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3DD68C">语言</text>
  <text x="451" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#3DD68C">环境</text>
  <text x="651" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">模型</text>
  <text x="851" y="86" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">完成</text>

  <!-- ===== Content（y=89~655） ===== -->

