  <text x="134" y="404" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Claude Code CLI</text>
  <text x="262" y="404" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">未安装</text>
  <rect x="418" y="390" width="80" height="20" rx="10" fill="#FEF3C7"/>
  <circle cx="430" cy="400" r="3.5" fill="#FFBE3D"/>
  <text x="440" y="404" font-family="system-ui, sans-serif" font-size="9" fill="#FFBE3D">Warn</text>

  <!-- 行7: Disk Space ✅ -->
  <circle cx="122" cy="436" r="4" fill="#3DD68C"/>
  <text x="134" y="440" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Disk Space</text>
  <text x="262" y="440" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">85 GB free</text>
  <rect x="418" y="426" width="80" height="20" rx="10" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="430" cy="436" r="3.5" fill="#3DD68C"/>
  <text x="440" y="440" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- 右面板：检测与安装日志（x=610, w=580） -->
  <rect x="610" y="164" width="580" height="340" rx="10" fill="#0D0F14" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>
