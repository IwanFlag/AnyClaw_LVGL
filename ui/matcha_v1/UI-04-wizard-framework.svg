  <text x="640" y="116" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#E8ECF4" font-weight="600">🔧 检测与安装</text>
  <text x="640" y="138" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#8B92A8">运行环境检测 / OpenClaw · Hermes · Claude Code 安装</text>

  <!-- 分隔线 -->
  <line x1="90" y1="152" x2="1190" y2="152" stroke="#3DD68C" stroke-opacity="0.05" stroke-width="1"/>

