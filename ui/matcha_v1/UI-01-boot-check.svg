  <circle cx="115" cy="484" r="5" fill="#3DD68C"/>
  <text x="127" y="489" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">SDL2.dll</text>
  <text x="339" y="489" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">found</text>
  <rect x="847" y="473" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="484" r="4" fill="#3DD68C"/>
  <text x="871" y="488" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行10: API 联通性 === -->
  <circle cx="115" cy="528" r="5" fill="#3DD68C"/>
  <text x="127" y="533" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">API 联通性</text>
  <text x="339" y="533" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">MiniMax-M2.7</text>
  <rect x="847" y="517" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="528" r="4" fill="#3DD68C"/>
  <text x="871" y="532" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- 说明文字 -->
  <text x="107" y="564" font-family="system-ui, sans-serif" font-size="10" fill="#6B7280">● = Pass(绿) / ● Fail(红) / ● Unknown(灰) / ◐ = 检测中</text>

  <!-- ===== Footer（y=590，h=56） ===== -->
  <rect x="0" y="590" width="1190" height="56" fill="#0A0C10"/>
  <line x1="0" y1="590" x2="1190" y2="590" stroke="#3DD68C" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Footer按钮：左撑到panel左边缘x=83，右撑到panel右边缘x=1107 -->
  <rect x="83" y="602" width="120" height="36" rx="11" fill="#252A38"/>
  <text x="143" y="624" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3DD68C">向导修复</text>

  <rect x="987" y="602" width="120" height="36" rx="11" fill="#3DD68C"/>
  <text x="1047" y="624" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#0F1117" font-weight="600">进入界面</text>
</svg>
