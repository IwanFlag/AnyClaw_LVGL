<svg xmlns="http://www.w3.org/2000/svg" width="1190" height="646" viewBox="0 0 1190 646">
  <defs>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- ===== 背景 ===== -->
  <rect width="1190" height="646" fill="#0F1117"/>

  <!-- ===== Header 41px（Matcha v1规格） ===== -->
  <rect x="0" y="0" width="1190" height="41" rx="0" fill="#0A0C10"/>
  <line x1="0" y1="41" x2="1190" y2="41" stroke="#3DD68C" stroke-opacity="0.06" stroke-width="1"/>

  <!-- Logo 大青虫子 SVG（v1大尺寸） -->
  <circle cx="20" cy="20" r="10" fill="#3DD68C"/>
  <line x1="13" y1="9" x2="10" y2="4" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="27" y1="9" x2="30" y2="4" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="10" cy="4" r="3.5" fill="#3DD68C"/>
  <circle cx="30" cy="4" r="3.5" fill="#3DD68C"/>
  <ellipse cx="15" cy="17" rx="3.5" ry="4.5" fill="#0F1117"/>
  <ellipse cx="25" cy="17" rx="3.5" ry="4.5" fill="#0F1117"/>
  <circle cx="16" cy="15" r="1.5" fill="#FFFFFF"/>
  <circle cx="26" cy="15" r="1.5" fill="#FFFFFF"/>
  <ellipse cx="10" cy="28" rx="5" ry="2.5" fill="#FF9EB5" opacity="0.7"/>
  <ellipse cx="30" cy="28" rx="5" ry="2.5" fill="#FF9EB5" opacity="0.7"/>
  <path d="M 16 31 Q 20 35 24 31" stroke="#0F1117" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Header 文字 -->
  <text x="48" y="26" font-family="system-ui, sans-serif" font-size="13" fill="#E8ECF4">AnyClaw</text>
  <text x="106" y="26" font-family="system-ui, sans-serif" font-size="13" fill="#8B92A8">Boot Check</text>

  <!-- 窗口控制按钮（h=41顶部栏） -->
  <text x="1085" y="25" text-anchor="middle" font-size="12" fill="#6B7280">─</text>
  <rect x="1106" y="13" width="30" height="17" rx="4" fill="#252A38"/>
  <text x="1121" y="25" text-anchor="middle" font-size="10" fill="#6B7280">□</text>
  <rect x="1142" y="13" width="30" height="17" rx="4" fill="#3DD68C" fill-opacity="0.2"/>
  <text x="1157" y="25" text-anchor="middle" font-size="10" fill="#3DD68C">✕</text>

  <!-- ===== CONTENT（y=41~590，h=549） ===== -->

  <!-- 面板：w=LV_PCT(86%)=1023px≈1024px，h=500px，x=83居中 -->
  <!-- 10行×40px + 9gap×4px = 436px内容 + 24px上 + 24px下 = 484px -->
  <rect x="83" y="50" width="1024" height="500" rx="12" fill="#13151E" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>

  <!-- 面板内标题 -->
  <text x="107" y="78" font-family="system-ui, sans-serif" font-size="12" fill="#E8ECF4">检测项</text>
  <text x="155" y="78" font-family="system-ui, sans-serif" font-size="11" fill="#6B7280">10 项</text>

  <!-- 分隔线 -->
  <line x1="83" y1="88" x2="1107" y2="88" stroke="#3DD68C" stroke-opacity="0.04" stroke-width="1"/>

  <!-- ========== 检查项列表（10行，Design.md规格）========== -->
  <!-- 列布局（3列）：列1=232px(107~339) | 列2=268px(339~607) | 列3=80px(847~927) -->
  <!-- 行高=40px，gap=4px，Badge=22×22(84px宽) -->
  <!-- Panel内容区：y=88+24=112起始，第1行y=112，第10行y=112+9*44=508 -->
  <!-- Badge中心y = 112 + 20 = 132 + (n-1)*44 = 132, 176, 220, 264, 308, 352, 396, 440, 484, 528 -->

  <!-- === 行1: Node.js === -->
  <circle cx="115" cy="132" r="5" fill="#3DD68C"/>
  <text x="127" y="137" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Node.js</text>
  <text x="339" y="137" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">v22.14.0</text>
  <rect x="847" y="121" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="132" r="4" fill="#3DD68C"/>
  <text x="871" y="136" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行2: npm === -->
  <circle cx="115" cy="176" r="5" fill="#3DD68C"/>
  <text x="127" y="181" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">npm</text>
  <text x="339" y="181" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">v10.8.0</text>
  <rect x="847" y="165" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="176" r="4" fill="#3DD68C"/>
  <text x="871" y="180" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行3: Network === -->
  <circle cx="115" cy="220" r="5" fill="#3DD68C"/>
  <text x="127" y="225" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Network</text>
  <text x="339" y="225" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">google.com</text>
  <rect x="847" y="209" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="220" r="4" fill="#3DD68C"/>
  <text x="871" y="224" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行4: OpenClaw === -->
  <circle cx="115" cy="264" r="5" fill="#3DD68C"/>
  <text x="127" y="269" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">OpenClaw</text>
  <text x="339" y="269" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">v2.1.0</text>
  <rect x="847" y="253" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="264" r="4" fill="#3DD68C"/>
  <text x="871" y="268" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行5: Hermes === -->
  <circle cx="115" cy="308" r="5" fill="#3DD68C"/>
  <text x="127" y="313" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Hermes</text>
  <text x="339" y="313" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">running</text>
  <rect x="847" y="297" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="308" r="4" fill="#3DD68C"/>
  <text x="871" y="312" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行6: Claude Code CLI === -->
  <circle cx="115" cy="352" r="5" fill="#3DD68C"/>
  <text x="127" y="357" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Claude Code CLI</text>
  <text x="339" y="357" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">found</text>
  <rect x="847" y="341" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="352" r="4" fill="#3DD68C"/>
  <text x="871" y="356" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行7: Disk Space === -->
  <circle cx="115" cy="396" r="5" fill="#3DD68C"/>
  <text x="127" y="401" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Disk Space</text>
  <text x="339" y="401" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">85 GB free</text>
  <rect x="847" y="385" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="396" r="4" fill="#3DD68C"/>
  <text x="871" y="400" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

  <!-- === 行8: Port 18789 === -->
  <circle cx="115" cy="440" r="5" fill="#3DD68C"/>
  <text x="127" y="445" font-family="system-ui, sans-serif" font-size="11" fill="#E8ECF4">Port 18789</text>
  <text x="339" y="445" font-family="Consolas, monospace" font-size="11" fill="#8B92A8">available</text>
  <rect x="847" y="429" width="80" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <circle cx="859" cy="440" r="4" fill="#3DD68C"/>
  <text x="871" y="444" font-family="system-ui, sans-serif" font-size="9" fill="#3DD68C">Pass</text>

