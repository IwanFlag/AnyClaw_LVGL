  <!-- 大青虫子 SVG (36x36) -->
  <circle cx="27" cy="17" r="8" fill="#3DD68C"/>
  <line x1="21" y1="9" x2="19" y2="5" stroke="#3DD68C" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="9" x2="35" y2="5" stroke="#3DD68C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="19" cy="5" r="2.5" fill="#3DD68C"/>
  <circle cx="35" cy="5" r="2.5" fill="#3DD68C"/>
