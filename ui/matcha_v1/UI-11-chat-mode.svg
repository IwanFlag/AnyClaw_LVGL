<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 800" width="1450" height="800">
  <defs>
    <linearGradient id="userBubble" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2B5C3E"/>
      <stop offset="100%" stop-color="#1F4A30"/>
    </linearGradient>
    <linearGradient id="sendBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#3DD68C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3DD68C" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- ===== Window Frame ===== -->
  <rect width="1450" height="800" rx="0" fill="#0F1117"/>

  <!-- ===== Title Bar (48px) ===== -->
  <rect width="1450" height="48" fill="#0F1117"/>
  <rect x="0" y="47" width="1450" height="1" fill="#3DD68C" opacity="0.04"/>

  <!-- Brand: garlic icon + AnyClaw -->
  <circle cx="28" cy="24" r="14" fill="#3DD68C" opacity="0.15"/>
  <text x="28" y="29" text-anchor="middle" font-size="16">🧄</text>
  <text x="50" y="29" font-family="Plus Jakarta Sans, sans-serif" font-size="15" font-weight="700" fill="#E8ECF4">AnyClaw</text>

  <!-- Mode Switcher -->
  <rect x="220" y="10" width="150" height="28" rx="14" fill="#1A1D27"/>
  <rect x="224" y="12" width="70" height="24" rx="12" fill="#3DD68C"/>
  <text x="259" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="600" fill="#0F1117">Chat</text>
  <text x="339" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#8B92A8">Work</text>

  <!-- Window Controls -->
  <g opacity="0.6">
    <rect x="1350" y="0" width="46" height="48" fill="transparent"/>
    <text x="1373" y="30" text-anchor="middle" font-size="14" fill="#8B92A8">⚙</text>
  </g>
  <g opacity="0.6">
    <rect x="1396" y="0" width="46" height="48" fill="transparent"/>
    <text x="1419" y="30" text-anchor="middle" font-size="14" fill="#8B92A8">—</text>
  </g>
  <g opacity="0.6">
    <rect x="1442" y="0" width="46" height="48" fill="transparent"/>
    <text x="1465" y="30" text-anchor="middle" font-size="14" fill="#8B92A8">□</text>
  </g>
  <g>
    <rect x="1396" y="0" width="54" height="48" rx="0" fill="transparent"/>
    <text x="1423" y="30" text-anchor="middle" font-size="14" fill="#8B92A8">✕</text>
  </g>

  <!-- ===== Left Panel (240px) ===== -->
  <rect x="0" y="48" width="240" height="752" fill="#13151E"/>

  <!-- Gateway Status Card -->
  <rect x="12" y="58" width="216" height="44" rx="8" fill="#1A1D27"/>
  <circle cx="28" cy="80" r="5" fill="#3DD68C"/>
  <rect x="26" y="78" width="4" height="4" rx="2" fill="#3DD68C">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="40" y="77" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#3DD68C" font-weight="600">READY</text>
  <text x="40" y="90" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B92A8">Gateway</text>

  <!-- Workspace Name -->
  <rect x="12" y="110" width="216" height="32" rx="6" fill="#1A1D27"/>
  <text x="24" y="131" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#E8ECF4">📁 个人助手</text>

  <!-- Sessions Header -->
  <text x="16" y="168" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="1">SESSIONS</text>
  <rect x="210" y="156" width="20" height="20" rx="10" fill="#1A1D27"/>
  <text x="220" y="170" text-anchor="middle" font-size="12" fill="#8B92A8">+</text>

  <!-- Session: Chat (active) -->
  <rect x="12" y="178" width="216" height="32" rx="6" fill="#3DD68C" opacity="0.1"/>
  <rect x="12" y="178" width="3" height="32" rx="1.5" fill="#3DD68C"/>
  <text x="22" y="199" font-size="12" fill="#E8ECF4">🦞 Chat</text>
  <circle cx="210" cy="194" r="4" fill="#3DD68C">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="199" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#3DD68C" font-weight="500">ACTIVE</text>

  <!-- Session: Work (idle) -->
  <rect x="12" y="216" width="216" height="32" rx="6" fill="transparent"/>
  <text x="22" y="237" font-size="12" fill="#8B92A8">⚡ Work</text>
  <circle cx="210" cy="232" r="4" fill="#6B7280" opacity="0.3"/>

  <!-- Cron Header -->
  <rect x="12" y="264" width="216" height="1" fill="#3DD68C" opacity="0.04"/>
  <text x="16" y="286" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="1">CRON TASKS</text>
  <rect x="210" y="274" width="20" height="20" rx="10" fill="#1A1D27"/>
  <text x="220" y="288" text-anchor="middle" font-size="12" fill="#8B92A8">+</text>

  <!-- ===== Splitter ===== -->
  <rect x="240" y="48" width="6" height="752" fill="#13151E"/>

  <!-- ===== Chat Content Area ===== -->
  <rect x="246" y="48" width="1204" height="604" fill="#0F1117"/>

  <!-- System Message -->
  <g transform="translate(280, 70)">
    <circle cx="14" cy="14" r="12" fill="#1E2230"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="380" height="52" rx="8" fill="#1E2230"/>
    <rect x="34" y="4" width="2" height="44" rx="1" fill="#3DD68C"/>
    <text x="44" y="18" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#E8ECF4">龙虾要吃蒜蓉的 🧄🦞</text>
    <text x="44" y="36" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B92A8">你的AI助手已就位！</text>
    <text x="380" y="44" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#6B7280">12:00</text>
  </g>

  <!-- User Bubble 1 (right) -->
  <g transform="translate(810, 140)">
    <rect x="0" y="0" width="340" height="48" rx="16" fill="url(#userBubble)"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#FFFFFF">帮我查一下今天的天气和待办事项</text>
    <text x="296" y="40" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.5">12:01</text>
  </g>

  <!-- AI Bubble 2 (left) -->
  <g transform="translate(280, 210)">
    <circle cx="14" cy="14" r="12" fill="#1E2230"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="420" height="100" rx="16" fill="#1E2230"/>
    <rect x="34" y="4" width="2" height="92" rx="1" fill="#3DD68C"/>
    <text x="46" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#E8ECF4">北京今天晴，22°C，微风。</text>
    <text x="46" y="44" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#E8ECF4">待办事项：</text>
    <text x="46" y="66" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B92A8">· 14:00 团队周会</text>
    <text x="46" y="84" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B92A8">· 16:30 提交PRD文档</text>
    <text x="386" y="92" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#6B7280">12:02</text>
  </g>

  <!-- User Bubble 3 (right) -->
  <g transform="translate(850, 330)">
    <rect x="0" y="0" width="300" height="48" rx="16" fill="url(#userBubble)"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#FFFFFF">帮我设置16:25的提前提醒</text>
    <text x="256" y="40" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#FFFFFF" opacity="0.5">12:03</text>
  </g>

  <!-- AI Streaming Indicator -->
  <g transform="translate(280, 400)">
    <circle cx="14" cy="10" r="12" fill="#1E2230"/>
    <text x="14" y="14" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="-4" width="90" height="28" rx="14" fill="#1E2230"/>
    <circle cx="52" cy="10" r="3" fill="#3DD68C">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="10" r="3" fill="#3DD68C">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="10" r="3" fill="#3DD68C">
      <animate attributeName="opacity" values="0.3;0.3;1" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>

  <!-- ===== Input Area ===== -->
  <rect x="246" y="652" width="1204" height="148" fill="#13151E"/>
  <rect x="246" y="652" width="1204" height="1" fill="#3DD68C" opacity="0.04"/>

  <!-- Input Box -->
  <rect x="306" y="668" width="1024" height="96" rx="12" fill="#1A1D27" stroke="#3DD68C" stroke-opacity="0.04" stroke-width="1"/>
  <text x="324" y="720" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#6B7280">输入消息... (Shift+Enter 换行)</text>

  <!-- Attachment Icon -->
  <rect x="316" y="776" width="24" height="24" rx="12" fill="transparent"/>
  <text x="328" y="792" text-anchor="middle" font-size="14" fill="#8B92A8">📎</text>

  <!-- Voice Icon -->
  <rect x="350" y="776" width="24" height="24" rx="12" fill="transparent"/>
  <text x="362" y="792" text-anchor="middle" font-size="14" fill="#8B92A8">🎤</text>

  <!-- Char Count -->
  <text x="1280" y="792" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#6B7280">0/4096</text>

  <!-- Send Button (circle 40px, accent gradient) -->
  <circle cx="1330" cy="788" r="20" fill="url(#sendBtn)"/>
  <text x="1330" y="794" text-anchor="middle" font-size="16" fill="#0F1117">▶</text>

  <!-- ===== Theme Label ===== -->
  <text x="1430" y="795" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B7280" opacity="0.4">Matcha v1 · Chat Mode</text>
</svg>
