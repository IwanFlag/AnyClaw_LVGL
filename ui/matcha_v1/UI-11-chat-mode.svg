  <ellipse cx="46" cy="66" rx="3" ry="1.5" fill="#FF9EB5" opacity="0.7"/>
  <path d="M 33 68 Q 37 72 41 68" stroke="#0F1117" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <rect x="29" y="75" width="16" height="19" rx="6" fill="#3DD68C"/>
  <ellipse cx="37" cy="96" rx="12" ry="4" fill="#000000" opacity="0.2"/>

  <!-- File -->
  <rect x="11" y="116" width="52" height="52" rx="9" fill="transparent"/>
  <text x="37" y="146" text-anchor="middle" font-size="17">📁</text>

  <!-- KB -->
  <rect x="11" y="184" width="52" height="52" rx="9" fill="transparent"/>
