  <path d="M 283 93 Q 280 93 280 90 L 280 88 Q 279 87 280 86 L 283 83 Q 285 82 286 83 L 287 84 Q 288 85 287 86 L 285 88 Q 284 88 284 90 L 284 96 Q 284 98 285 98 L 287 101 Q 288 102 287 103 L 283 100 Q 282 101 282 103 L 282 105 Q 282 106 283 106 Q 284 107 285 106 L 285 105 Q 286 104 285 103 L 283 100 Z" fill="#3DD68C"/>
  <text x="297" y="98" font-family="sans-serif" font-size="10" fill="#3DD68C" font-weight="bold">Voice</text>
