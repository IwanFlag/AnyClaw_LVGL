      <circle cx="17" cy="16" r="7" fill="#3DD68C"/>
      <line x1="12" y1="10" x2="11" y2="7" stroke="#3DD68C" stroke-width="1" stroke-linecap="round"/>
      <line x1="22" y1="10" x2="23" y2="7" stroke="#3DD68C" stroke-width="1" stroke-linecap="round"/>
      <circle cx="11" cy="7" r="1.5" fill="#3DD68C"/>
      <circle cx="23" cy="7" r="1.5" fill="#3DD68C"/>
      <ellipse cx="15" cy="15" rx="1.5" ry="1.8" fill="#0F1117"/>
      <ellipse cx="19" cy="15" rx="1.5" ry="1.8" fill="#0F1117"/>
      <circle cx="15.5" cy="14.5" r="0.7" fill="#FFFFFF"/>
      <circle cx="19.5" cy="14.5" r="0.7" fill="#FFFFFF"/>
