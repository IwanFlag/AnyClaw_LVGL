  <ellipse cx="34" cy="19" rx="3" ry="1.5" fill="#FF9EB5" opacity="0.7"/>
  <path d="M 24 21 Q 27 24 30 21" stroke="#0F1117" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <text x="48" y="24" font-family="sans-serif" font-size="13" fill="#E8ECF4">AnyClaw · Chat</text>
