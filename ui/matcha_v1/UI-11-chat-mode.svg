<svg xmlns="http://www.w3.org/2000/svg" width="1190" height="646" viewBox="0 0 1190 646">
  <defs>
    <style>
      @keyframes eyeBlink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      .ai-eye-l, .ai-eye-r {
        transform-box: fill-box;
        transform-origin: center;
        animation: eyeBlink 4s ease-in-out infinite;
      }
      .ai-eye-r { animation-delay: 0.05s; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .ai-character { animation: float 3s ease-in-out infinite; }
    </style>

    <linearGradient id="sendBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="rightPanelClip">
      <rect x="365" y="41" width="818" height="496"/>
    </clipPath>
    <linearGradient id="thinkingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F1A0A"/>
      <stop offset="100%" stop-color="#141208"/>
    </linearGradient>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

