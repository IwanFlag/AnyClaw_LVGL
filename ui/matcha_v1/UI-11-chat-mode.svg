<svg xmlns="http://www.w3.org/2000/svg" width="1190" height="646" viewBox="0 0 1190 646">
  <defs>
    <style>
      @keyframes eyeBlink {
        0%, 90%, 100% { transform: scaleY(1); }
        95% { transform: scaleY(0.1); }
      }
      .ai-eye-l, .ai-eye-r {
        transform-box: fill-box;
        transform-origin: center;
        animation: eyeBlink 4s ease-in-out infinite;
      }
      .ai-eye-r { animation-delay: 0.05s; }
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
      }
      .ai-character { animation: float 3s ease-in-out infinite; }
    </style>

    <linearGradient id="sendBtn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="rightPanelClip">
      <rect x="365" y="41" width="818" height="605"/>
    </clipPath>
    <linearGradient id="thinkingGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1F1A0A"/>
      <stop offset="100%" stop-color="#141208"/>
    </linearGradient>
    <filter id="bubbleShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1190" height="646" fill="#0F1117"/>

  <!-- ===== 标题栏 ===== -->
  <rect x="0" y="0" width="1190" height="41" rx="0" fill="#0A0C10"/>
  <!-- 标题栏右侧：窗口控制 -->
  <rect x="1070" y="12" width="30" height="17" rx="4" fill="#252A38"/>
  <text x="1085" y="24" text-anchor="middle" font-size="10" fill="#6B7280">─</text>
  <rect x="1106" y="12" width="30" height="17" rx="4" fill="#252A38"/>
  <text x="1121" y="24" text-anchor="middle" font-size="10" fill="#6B7280">□</text>
  <rect x="1142" y="12" width="30" height="17" rx="4" fill="#3DD68C" fill-opacity="0.2"/>
  <text x="1157" y="24" text-anchor="middle" font-size="10" fill="#3DD68C">✕</text>

  <!-- ===== 左 NAV ===== -->
  <rect x="0" y="41" width="82" height="605" rx="0" fill="#0A0C10"/>

  <!-- Bot (高亮) -->
  <rect x="11" y="48" width="52" height="52" rx="9" fill="#252A38"/>
  <text x="37" y="78" text-anchor="middle" font-size="20">🤖</text>

  <!-- File -->
  <rect x="11" y="116" width="52" height="52" rx="9" fill="transparent"/>
  <text x="37" y="146" text-anchor="middle" font-size="17">📁</text>

  <!-- Chat/Work toggle -->
  <rect x="11" y="526" width="52" height="52" rx="9" fill="#252A38"/>
  <text x="37" y="557" text-anchor="middle" font-size="17">💬</text>

  <!-- Settings -->
  <rect x="11" y="594" width="52" height="52" rx="9" fill="transparent"/>
  <text x="37" y="624" text-anchor="middle" font-size="20">⚙️</text>

  <!-- ===== 左面板 ===== -->
  <rect x="82" y="48" width="276" height="598" rx="10" fill="#13151E" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>

  <!-- AI伙伴容器：y=58, h=203，文字布局：顶部人物 + 底部状态 -->
  <rect x="92" y="58" width="256" height="203" rx="10" fill="#1A1D27" stroke="#3DD68C" stroke-width="1.5"/>

  <!-- AI人物：顶部区域 y=70~186 -->
  <!-- 触角 -->
  <line x1="130" y1="82" x2="122" y2="70" stroke="#3DD68C" stroke-width="2" stroke-linecap="round"/>
  <line x1="180" y1="82" x2="188" y2="70" stroke="#3DD68C" stroke-width="2" stroke-linecap="round"/>
  <circle cx="122" cy="70" r="4" fill="#3DD68C"/>
  <circle cx="188" cy="70" r="4" fill="#3DD68C"/>

  <!-- 头 -->
  <circle cx="155" cy="110" r="28" fill="#3DD68C"/>

  <!-- 身体 -->
  <rect x="137" y="132" width="36" height="42" rx="13" fill="#3DD68C"/>
  <ellipse cx="155" cy="176" rx="26" ry="8" fill="#000000" opacity="0.2"/>

  <!-- 眼睛 -->
  <ellipse cx="146" cy="106" rx="5" ry="6" fill="#0F1117"/>
  <ellipse cx="164" cy="106" rx="5" ry="6" fill="#0F1117"/>
  <circle cx="148" cy="104" r="2" fill="#FFFFFF"/>
  <circle cx="166" cy="104" r="2" fill="#FFFFFF"/>

  <!-- 腮红 -->
  <ellipse cx="133" cy="114" rx="6" ry="3" fill="#FF9EB5" opacity="0.7"/>
  <ellipse cx="177" cy="114" rx="6" ry="3" fill="#FF9EB5" opacity="0.7"/>

  <!-- 嘴巴 -->
  <path d="M 149 120 Q 155 126 161 120" stroke="#0F1117" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- 右侧文字：与人物头部同行 -->
  <text x="200" y="102" font-family="sans-serif" font-size="12" fill="#3DD68C" font-weight="bold">AnyClaw</text>
  <text x="200" y="118" font-family="sans-serif" font-size="10" fill="#888">你的 AI 伙伴</text>

  <!-- 底部状态：紧贴容器底部 y=243~261 -->
  <circle cx="108" cy="240" r="5" fill="#3DD68C">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="120" y="244" font-family="sans-serif" font-size="9" fill="#E8ECF4">Agent Status</text>
  <text x="298" y="244" font-family="sans-serif" font-size="9" fill="#3DD68C">Running</text>
  <text x="108" y="258" font-family="sans-serif" font-size="9" fill="#8B92A8">Model: MiniMax-M2.7</text>

  <!-- 任务列表标题：在容器下方，间距缩小 -->
  <line x1="92" y1="272" x2="352" y2="272" stroke="#3DD68C" stroke-opacity="0.04" stroke-width="1"/>
  <text x="92" y="286" font-family="sans-serif" font-size="10" fill="#E8ECF4">任务列表</text>
  <text x="302" y="286" font-family="sans-serif" font-size="9" fill="#6B7280">(0)</text>

  <!-- Session Card：y=298, h=190, bottom=488 -->
  <rect x="92" y="298" width="256" height="190" rx="7" fill="#1A1D27" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>
  <text x="103" y="318" font-family="sans-serif" font-size="9" fill="#E8ECF4">会话</text>
  <text x="302" y="318" font-family="sans-serif" font-size="9" fill="#6B7280">(0)</text>
  <line x1="103" y1="327" x2="352" y2="327" stroke="#3DD68C" stroke-opacity="0.05" stroke-width="1"/>
  <text x="220" y="398" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">暂无会话</text>

  <!-- Cron Card：y=504, h=126, bottom=630，距面板底部16px -->
  <rect x="92" y="504" width="256" height="126" rx="7" fill="#1A1D27" stroke="#3DD68C" stroke-opacity="0.03" stroke-width="1"/>
  <text x="103" y="524" font-family="sans-serif" font-size="9" fill="#E8ECF4">定时任务</text>
  <text x="302" y="524" font-family="sans-serif" font-size="9" fill="#6B7280">(0)</text>
  <line x1="103" y1="533" x2="352" y2="533" stroke="#3DD68C" stroke-opacity="0.05" stroke-width="1"/>
  <text x="220" y="572" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6B7280">暂无定时任务</text>

  <!-- ===== 右面板 ===== -->
  <rect x="365" y="41" width="818" height="605" fill="#0F1117"/>

  <!-- Message 1: User（头像在右面板右边界内） -->
  <!-- 面板右边界=1183，头像右边界=1171，距面板12px，头像左边界=1143，气泡右边界=1155，间距12px -->
  <g transform="translate(980, 71)">
    <!-- 头像：cx=171，右边界=1159，距面板24px -->
    <circle cx="171" cy="22" r="14" fill="#252A38"/>
    <text x="171" y="27" text-anchor="middle" font-size="12">👤</text>
    <!-- 气泡：x=54，宽139，右边界=1119，距头像左边界12px -->
    <rect x="54" y="0" width="139" height="45" rx="16" fill="url(#userBubble)" filter="url(#bubbleShadow)"/>
    <text x="66" y="20" font-family="sans-serif" font-size="11" fill="#FFFFFF">帮我查一下今天的天气</text>
    <text x="172" y="12" font-family="sans-serif" font-size="9" fill="#FFFFFF" opacity="0.6">12:28</text>
  </g>

  <!-- Message 2: AI 完整气泡 -->
  <g transform="translate(365, 129)">
    <circle cx="17" cy="17" r="14" fill="#1E2230"/>
    <text x="17" y="22" text-anchor="middle" font-size="12">🦞</text>

    <rect x="38" y="0" width="431" height="220" rx="12" fill="#1E2230" filter="url(#bubbleShadow)"/>
    <rect x="38" y="3" width="3" height="214" rx="1" fill="#3DD68C"/>

    <text x="52" y="15" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B7280">12:28</text>

    <rect x="52" y="22" width="405" height="21" rx="5" fill="#252A38"/>
    <circle cx="62" cy="33" r="3" fill="#FFBE3D"/>
    <text x="71" y="37" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#FFBE3D">🤖 AI 正在思考...</text>

    <rect x="52" y="50" width="405" height="46" rx="7" fill="url(#thinkingGradient)" stroke="#FFBE3D" stroke-opacity="0.2" stroke-width="1"/>
    <text x="63" y="64" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#FFBE3D">🔍 思考过程</text>
    <text x="444" y="64" text-anchor="end" font-family="HarmonyOS Sans SC, sans-serif" font-size="8" fill="#6B7280">点击折叠</text>
    <text x="63" y="78" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#8B92A8">1. 分析：用户请求查询天气</text>
    <text x="63" y="90" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#8B92A8">2. 调用天气 API...</text>

    <rect x="52" y="104" width="405" height="36" rx="7" fill="#0A0C10" stroke="#3DD68C" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="52" y="104" width="3" height="36" rx="1" fill="#3DD68C"/>
    <text x="62" y="119" font-family="Consolas, monospace" font-size="9" fill="#3DD68C">$ curl weather-api --location=beijing</text>
    <text x="62" y="132" font-family="Consolas, monospace" font-size="9" fill="#6B7280">{"status":"ok","temp":26,"condition":"sunny"}</text>

    <rect x="52" y="148" width="405" height="28" rx="6" fill="#0A0C10" stroke="#3DD68C" stroke-opacity="0.15" stroke-width="1"/>
    <rect x="52" y="148" width="3" height="28" rx="1" fill="#3DD68C"/>
    <text x="63" y="158" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#8B92A8">📄</text>
    <text x="72" y="158" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#6C9FFF" text-decoration="underline">weekly_report_2026_04.pdf</text>
    <text x="63" y="170" font-family="HarmonyOS Sans SC, sans-serif" font-size="8" fill="#6B7280">点击打开文件</text>

    <text x="52" y="204" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#E8ECF4">北京今天天气晴朗，气温 26°C。</text>
  </g>

  <!-- Control Bar (ctrl_bar) -->
  <rect x="365" y="553" width="818" height="31" rx="7" fill="#1A1D27"/>

  <text x="1135" y="572" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#6B7280">0/2000</text>

  <rect x="372" y="558" width="69" height="22" rx="11" fill="#3DD68C" fill-opacity="0.12"/>
  <text x="406" y="572" text-anchor="middle" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#3DD68C">Agent ▼</text>

  <rect x="446" y="558" width="69" height="22" rx="11" fill="#252A38"/>
  <text x="480" y="572" text-anchor="middle" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#E8ECF4">AI行为 ▼</text>

  <rect x="520" y="558" width="69" height="22" rx="11" fill="#252A38"/>
  <text x="554" y="572" text-anchor="middle" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#E8ECF4">AI托管 ▼</text>

  <rect x="594" y="560" width="34" height="17" rx="9" fill="#373C55"/>
  <circle cx="605" cy="569" r="7" fill="#8B92A8"/>
  <text x="633" y="572" font-family="HarmonyOS Sans SC, sans-serif" font-size="9" fill="#8B92A8">Voice</text>

  <!-- Input Area (chat_input) -->
  <rect x="365" y="584" width="818" height="62" rx="7" fill="#1A1D27"/>

  <rect x="372" y="589" width="698" height="47" rx="7" fill="#13151E" stroke="#3DD68C" stroke-opacity="0.06" stroke-width="1"/>
  <text x="383" y="605" font-family="HarmonyOS Sans SC, sans-serif" font-size="10" fill="#6B7280">输入消息... (Shift+Enter 换行)</text>
  <text x="383" y="621" font-family="HarmonyOS Sans SC, sans-serif" font-size="10" fill="#6B7280">第二行</text>
  <text x="383" y="635" font-family="HarmonyOS Sans SC, sans-serif" font-size="10" fill="#6B7280">第三行</text>

  <rect x="1080" y="616" width="21" height="21" rx="5" fill="#252A38"/>
  <text x="1090" y="631" text-anchor="middle" font-size="10">📎</text>

  <circle cx="1130" cy="626" r="18" fill="url(#sendBtn)" filter="url(#bubbleShadow)"/>
  <text x="1130" y="632" text-anchor="middle" font-size="14" fill="#0F1117" font-weight="bold">▶</text>

  <text x="1172" y="656" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="8" fill="#6B7280" opacity="0.4">Matcha v1 · UI-11</text>
</svg>
