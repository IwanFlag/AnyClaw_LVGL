  <text x="298" y="244" font-family="sans-serif" font-size="9" fill="#3DD68C">Running</text>
  <text x="108" y="258" font-family="sans-serif" font-size="9" fill="#8B92A8">Model: MiniMax-M2.7</text>

  <!-- 任务列表标题 -->
  <line x1="92" y1="272" x2="352" y2="272" stroke="#3DD68C" stroke-opacity="0.04" stroke-width="1"/>
  <text x="92" y="286" font-family="sans-serif" font-size="10" fill="#E8ECF4">任务列表</text>
