<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
    <linearGradient id="garlicGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F0E8"/>
      <stop offset="100%" stop-color="#E8DCC8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="300" fill="#0F1117"/>
  <!-- Screen edge representation -->
  <rect x="20" y="20" width="260" height="260" rx="4" fill="#13151E" stroke="#3DD68C0A" stroke-width="1"/>
  <!-- Screen edge line (right edge) -->
  <line x1="278" y1="40" x2="278" y2="260" stroke="#3DD68C" stroke-width="2" stroke-dasharray="4,4"/>
  <!-- Edge indicator label -->
  <text x="285" y="155" font-family="Inter, sans-serif" font-size="9" fill="#3DD68C" transform="rotate(90, 285, 155)" text-anchor="middle">屏幕边缘</text>
  <!-- Garlic body (80x110px, centered) -->
  <g transform="translate(110, 80)" filter="url(#shadow)">
    <!-- Garlic cloves (body) -->
    <!-- Main body - rounded garlic shape -->
    <ellipse cx="40" cy="65" rx="36" ry="42" fill="url(#garlicGrad)" stroke="#D4C8B0" stroke-width="1"/>
    <!-- Clove divisions -->
    <path d="M 40 25 Q 30 50, 28 70" fill="none" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <path d="M 40 25 Q 50 50, 52 70" fill="none" stroke="#D4C8B0" stroke-width="1" opacity="0.6"/>
    <path d="M 40 25 Q 20 55, 18 80" fill="none" stroke="#D4C8B0" stroke-width="0.8" opacity="0.4"/>
    <path d="M 40 25 Q 60 55, 62 80" fill="none" stroke="#D4C8B0" stroke-width="0.8" opacity="0.4"/>
    <!-- Root lines at bottom -->
    <line x1="32" y1="105" x2="30" y2="115" stroke="#C4B89C" stroke-width="1" opacity="0.5"/>
    <line x1="38" y1="106" x2="37" y2="118" stroke="#C4B89C" stroke-width="1" opacity="0.5"/>
    <line x1="44" y1="106" x2="45" y2="118" stroke="#C4B89C" stroke-width="1" opacity="0.5"/>
    <line x1="50" y1="105" x2="52" y2="115" stroke="#C4B89C" stroke-width="1" opacity="0.5"/>
    <!-- Stem / sprout -->
    <rect x="36" y="8" width="8" height="22" rx="4" fill="url(#stemGrad)"/>
    <!-- Leaves -->
    <path d="M 40 8 Q 30 -5, 22 -12" fill="none" stroke="#3DD68C" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 40 8 Q 50 -5, 58 -12" fill="none" stroke="#2BB673" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Leaf tips -->
    <circle cx="22" cy="-12" r="2" fill="#3DD68C"/>
    <circle cx="58" cy="-12" r="2" fill="#2BB673"/>
  </g>
  <!-- Hover animation indicator (dashed circle) -->
  <circle cx="150" cy="145" r="62" fill="none" stroke="#3DD68C20" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#glow)"/>
  <!-- Hover arrow -->
  <path d="M 220 120 Q 230 130, 225 145" fill="none" stroke="#3DD68C60" stroke-width="1.5" marker-end="none"/>
  <text x="232" y="118" font-family="Inter, sans-serif" font-size="9" fill="#3DD68C">悬停展开</text>
  <!-- Size annotation -->
  <!-- Width -->
  <line x1="110" y1="215" x2="190" y2="215" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="110" y1="210" x2="110" y2="220" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="190" y1="210" x2="190" y2="220" stroke="#6B7280" stroke-width="0.8"/>
  <text x="150" y="228" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B7280">80px</text>
  <!-- Height -->
  <line x1="200" y1="80" x2="200" y2="190" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="195" y1="80" x2="205" y2="80" stroke="#6B7280" stroke-width="0.8"/>
  <line x1="195" y1="190" x2="205" y2="190" stroke="#6B7280" stroke-width="0.8"/>
  <text x="212" y="140" font-family="JetBrains Mono, monospace" font-size="9" fill="#6B7280">110px</text>
  <!-- Label -->
  <text x="150" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8B92A8">🧄 AnyClaw Edge Garlic</text>
</svg>