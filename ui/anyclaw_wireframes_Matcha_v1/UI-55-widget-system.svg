<svg xmlns="http://www.w3.org/2000/svg" width="950" height="780" viewBox="0 0 950 780">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .t3{fill:#6B7280} .accent{fill:#3DD68C} .danger{fill:#FF6B6B} .warning{fill:#FFBE3D} .info{fill:#6C9FFF}
    </style>
  </defs>
  <rect width="950" height="780" rx="12" fill="#0F1117"/>
  <text x="24" y="30" font-size="14" font-weight="700">Widget System</text>

  <!-- Row 1: Buttons -->
  <text x="24" y="56" font-size="11" class="t2">Buttons</text>
  <!-- Primary -->
  <rect x="24" y="66" width="100" height="32" rx="6" fill="#3DD68C"/>
  <text x="48" y="87" font-size="12" font-weight="600" fill="#0F1117">Primary</text>
  <!-- Secondary -->
  <rect x="134" y="66" width="100" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="152" y="87" font-size="12" class="t2">Secondary</text>
  <!-- Ghost -->
  <rect x="244" y="66" width="80" height="32" rx="6" fill="transparent"/>
  <text x="260" y="87" font-size="12" class="accent">Ghost</text>
  <!-- Danger -->
  <rect x="334" y="66" width="80" height="32" rx="6" fill="#FF6B6B"/>
  <text x="348" y="87" font-size="12" font-weight="600" fill="#0F1117">Danger</text>
  <!-- Icon Button -->
  <rect x="424" y="66" width="32" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="431" y="87" font-size="14">⚙</text>
  <!-- Send Button -->
  <rect x="466" y="66" width="60" height="32" rx="6" fill="#3DD68C"/>
  <text x="478" y="87" font-size="12" font-weight="600" fill="#0F1117">Send →</text>

  <!-- Row 2: Inputs -->
  <text x="24" y="120" font-size="11" class="t2">Input Fields</text>
  <!-- Single line -->
  <rect x="24" y="130" width="240" height="32" rx="6" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <text x="36" y="151" font-size="12" class="t3">Enter text...</text>
  <!-- Password -->
  <rect x="274" y="130" width="200" height="32" rx="6" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <text x="286" y="151" font-size="12" class="t3">••••••••</text>
  <text x="450" y="151" font-size="12">👁</text>
  <!-- Multiline -->
  <rect x="490" y="130" width="240" height="64" rx="6" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <text x="502" y="151" font-size="12" class="t3">Multi-line input...</text>
  <text x="502" y="171" font-size="12" class="t3">with text area</text>

  <!-- Row 3: Dropdown + Switches + Checkbox -->
  <text x="24" y="216" font-size="11" class="t2">Selection Controls</text>
  <!-- Dropdown -->
  <rect x="24" y="226" width="160" height="32" rx="6" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <text x="36" y="247" font-size="12">mimo-v2-pro ▾</text>
  <!-- Dropdown open -->
  <rect x="24" y="262" width="160" height="72" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <rect x="24" y="262" width="160" height="24" rx="0" fill="#3DD68C20"/>
  <text x="36" y="279" font-size="11" class="accent">● mimo-v2-pro</text>
  <text x="36" y="303" font-size="11" class="t2">gpt-4o</text>
  <text x="36" y="323" font-size="11" class="t2">claude-3.5-sonnet</text>
  <!-- Switch ON -->
  <rect x="210" y="232" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="236" cy="242" r="8" fill="#fff"/>
  <text x="254" y="247" font-size="11" class="t2">ON</text>
  <!-- Switch OFF -->
  <rect x="310" y="232" width="36" height="20" rx="10" fill="#3C3F50"/>
  <circle cx="320" cy="242" r="8" fill="#8B92A8"/>
  <text x="354" y="247" font-size="11" class="t2">OFF</text>
  <!-- Checkbox Checked -->
  <rect x="420" y="228" width="20" height="20" rx="4" fill="#3DD68C"/>
  <text x="424" y="244" font-size="13" fill="#0F1117">✓</text>
  <text x="446" y="247" font-size="11" class="t2">Checked</text>
  <!-- Checkbox Unchecked -->
  <rect x="530" y="228" width="20" height="20" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <text x="556" y="247" font-size="11" class="t2">Unchecked</text>

  <!-- Row 4: Steps + Status + Progress -->
  <text x="24" y="356" font-size="11" class="t2">Progress &amp; Status</text>
  <!-- Step Indicator -->
  <circle cx="40" cy="382" r="12" fill="#3DD68C"/>
  <text x="35" y="387" font-size="11" fill="#0F1117" font-weight="600">1</text>
  <line x1="56" y1="382" x2="80" y2="382" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="96" cy="382" r="12" fill="#3DD68C"/>
  <text x="91" y="387" font-size="11" fill="#0F1117" font-weight="600">2</text>
  <line x1="112" y1="382" x2="136" y2="382" stroke="#3C3F50" stroke-width="2"/>
  <circle cx="152" cy="382" r="12" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="147" y="387" font-size="11" class="t2">3</text>
  <!-- Status Capsules -->
  <rect x="190" y="370" width="56" height="20" rx="10" fill="#3DD68C20"/>
  <text x="200" y="384" font-size="10" class="accent">Ready</text>
  <rect x="256" y="370" width="50" height="20" rx="10" fill="#FFBE3D20"/>
  <text x="264" y="384" font-size="10" class="warning">Busy</text>
  <rect x="316" y="370" width="56" height="20" rx="10" fill="#3DD68C20"/>
  <text x="326" y="384" font-size="10" class="accent">Check</text>
  <rect x="382" y="370" width="46" height="20" rx="10" fill="#FF6B6B20"/>
  <text x="390" y="384" font-size="10" class="danger">Error</text>
  <!-- Progress Bar -->
  <rect x="24" y="406" width="300" height="8" rx="4" fill="#1E2230"/>
  <rect x="24" y="406" width="180" height="8" rx="4" fill="#3DD68C"/>
  <text x="332" y="414" font-size="11" class="accent">60%</text>

  <!-- Row 5: Spinners -->
  <text x="500" y="356" font-size="11" class="t2">Loading Indicators</text>
  <!-- Pulse Dots -->
  <circle cx="520" cy="382" r="5" fill="#3DD68C"/>
  <circle cx="540" cy="382" r="5" fill="#3DD68C80"/>
  <circle cx="560" cy="382" r="5" fill="#3DD68C40"/>
  <!-- Spinning Ring -->
  <circle cx="620" cy="382" r="14" fill="none" stroke="#1E2230" stroke-width="3"/>
  <path d="M620 368 A14 14 0 0 1 634 382" fill="none" stroke="#3DD68C" stroke-width="3" stroke-linecap="round"/>
  <!-- Ring Spinner 2 -->
  <circle cx="670" cy="382" r="10" fill="none" stroke="#1E2230" stroke-width="2"/>
  <path d="M670 372 A10 10 0 0 1 680 382" fill="none" stroke="#6C9FFF" stroke-width="2" stroke-linecap="round"/>

  <!-- Row 6: Card + List + Tooltip -->
  <text x="24" y="448" font-size="11" class="t2">Card &amp; List</text>
  <!-- Card -->
  <rect x="24" y="458" width="200" height="100" rx="8" fill="#1A1D27" stroke="#1E2230" stroke-width="1"/>
  <text x="40" y="482" font-size="13" font-weight="600">Card Title</text>
  <text x="40" y="502" font-size="11" class="t2">Card description with</text>
  <text x="40" y="518" font-size="11" class="t2">supporting text content.</text>
  <text x="40" y="544" font-size="10" class="accent">Learn more →</text>
  <!-- List Items -->
  <rect x="240" y="458" width="260" height="100" rx="8" fill="#1A1D27"/>
  <rect x="248" y="466" width="244" height="28" rx="4" fill="#1E2230"/>
  <circle cx="262" cy="480" r="6" fill="#3DD68C"/>
  <text x="276" y="484" font-size="11">List Item 1</text>
  <text x="460" y="484" font-size="11" class="t3">›</text>
  <rect x="248" y="498" width="244" height="28" rx="4" fill="#13151E"/>
  <circle cx="262" cy="512" r="6" fill="#6C9FFF"/>
  <text x="276" y="516" font-size="11">List Item 2</text>
  <text x="460" y="516" font-size="11" class="t3">›</text>
  <rect x="248" y="530" width="244" height="28" rx="4" fill="#13151E"/>
  <circle cx="262" cy="544" r="6" fill="#FFBE3D"/>
  <text x="276" y="548" font-size="11">List Item 3</text>
  <text x="460" y="548" font-size="11" class="t3">›</text>
  <!-- Tooltip -->
  <rect x="520" y="470" width="160" height="60" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="532" y="492" font-size="11" font-weight="600">Tooltip</text>
  <text x="532" y="510" font-size="10" class="t2">Helpful context info</text>
  <polygon points="590,530 596,542 584,542" fill="#1E2230"/>
  <polygon points="590,530 596,542 584,542" fill="none" stroke="#3C3F50" stroke-width="1"/>

  <!-- Row 7: Tab Switcher -->
  <text x="24" y="580" font-size="11" class="t2">Tab Switcher</text>
  <rect x="24" y="590" width="300" height="32" rx="6" fill="#1A1D27"/>
  <rect x="24" y="590" width="100" height="32" rx="6" fill="#1E2230"/>
  <text x="52" y="611" font-size="12" class="accent">Tab 1</text>
  <text x="130" y="611" font-size="12" class="t2">Tab 2</text>
  <text x="210" y="611" font-size="12" class="t2">Tab 3</text>

  <!-- Divider -->
  <text x="350" y="580" font-size="11" class="t2">Divider</text>
  <line x1="350" y1="596" x2="500" y2="596" stroke="#1E2230" stroke-width="1"/>
  <line x1="350" y1="610" x2="500" y2="610" stroke="#3C3F50" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Context Menu -->
  <text x="540" y="580" font-size="11" class="t2">Context Menu</text>
  <rect x="540" y="590" width="160" height="100" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <rect x="548" y="598" width="144" height="24" rx="4" fill="#3DD68C10"/>
  <text x="558" y="615" font-size="11">📋 Copy</text>
  <text x="670" y="615" font-size="10" class="t3">⌘C</text>
  <rect x="548" y="626" width="144" height="24" rx="4" fill="transparent"/>
  <text x="558" y="643" font-size="11">✏️ Edit</text>
  <text x="670" y="643" font-size="10" class="t3">⌘E</text>
  <rect x="548" y="654" width="144" height="24" rx="4" fill="transparent"/>
  <text x="558" y="671" font-size="11" class="danger">🗑 Delete</text>
  <text x="670" y="671" font-size="10" class="t3">⌘D</text>

  <!-- Bottom row: additional widgets -->
  <text x="24" y="650" font-size="11" class="t2">Badges &amp; Tags</text>
  <rect x="24" y="660" width="42" height="20" rx="10" fill="#3DD68C20"/>
  <text x="32" y="674" font-size="10" class="accent">New</text>
  <rect x="72" y="660" width="46" height="20" rx="10" fill="#FF6B6B20"/>
  <text x="78" y="674" font-size="10" class="danger">Beta</text>
  <rect x="124" y="660" width="52" height="20" rx="10" fill="#FFBE3D20"/>
  <text x="130" y="674" font-size="10" class="warning">Stable</text>
  <rect x="182" y="660" width="60" height="20" rx="10" fill="#6C9FFF20"/>
  <text x="190" y="674" font-size="10" class="info">v2.2.1</text>

  <!-- Scrollbar -->
  <text x="24" y="706" font-size="11" class="t2">Scrollbar</text>
  <rect x="24" y="716" width="8" height="48" rx="4" fill="#1E2230"/>
  <rect x="24" y="722" width="8" height="24" rx="4" fill="#3C3F50"/>

  <!-- Notification Badge -->
  <text x="60" y="706" font-size="11" class="t2">Notification</text>
  <rect x="60" y="716" width="24" height="24" rx="6" fill="#1E2230"/>
  <text x="66" y="733" font-size="12">🔔</text>
  <circle cx="78" cy="718" r="6" fill="#FF6B6B"/>
  <text x="75" y="721" font-size="8" fill="#fff" font-weight="700">3</text>

  <!-- Slider -->
  <text x="120" y="706" font-size="11" class="t2">Slider</text>
  <rect x="120" y="724" width="200" height="4" rx="2" fill="#1E2230"/>
  <rect x="120" y="724" width="120" height="4" rx="2" fill="#3DD68C"/>
  <circle cx="240" cy="726" r="8" fill="#3DD68C"/>
  <text x="330" y="728" font-size="11" class="accent">60%</text>
</svg>