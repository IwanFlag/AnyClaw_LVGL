<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="1280" height="720" fill="#0F1117"/>
  <rect width="1280" height="720" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="0" y="0" width="800" height="580" rx="0" fill="#1E2530"/>
  <!-- Header area (56px) -->
  <rect x="0" y="0" width="800" height="56" fill="#1E2530"/>
  <circle cx="28" cy="28" r="16" fill="#3DD68C"/>
  <text x="28" y="34" text-anchor="middle" font-size="16">🧄</text>
  <text x="60" y="34" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">环境检测 / Environment Check</text>
  <text x="680" y="34" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Step 2/6</text>
  <rect x="700" y="14" width="80" height="28" rx="6" fill="none" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="740" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Exit</text>
  <!-- Step indicator bar -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="250" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="350" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="450" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="550" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="650" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <!-- Content area -->
  <text x="100" y="130" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">Environment Status</text>
  <!-- Status rows -->
  <!-- Node.js row -->
  <rect x="100" y="150" width="600" height="50" rx="8" fill="#1A1D27"/>
  <circle cx="130" cy="175" r="6" fill="#3DD68C"/>
  <text x="150" y="180" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Node.js</text>
  <text x="450" y="180" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">v22.14.0 ✓</text>
  <!-- npm row -->
  <rect x="100" y="210" width="600" height="50" rx="8" fill="#1A1D27"/>
  <circle cx="130" cy="235" r="6" fill="#3DD68C"/>
  <text x="150" y="240" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">npm</text>
  <text x="450" y="240" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">v10.9.2 ✓</text>
  <!-- Network row -->
  <rect x="100" y="270" width="600" height="50" rx="8" fill="#1A1D27"/>
  <circle cx="130" cy="295" r="6" fill="#3DD68C"/>
  <text x="150" y="300" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Network</text>
  <text x="450" y="300" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">Connected ✓</text>
  <!-- OpenClaw row -->
  <rect x="100" y="330" width="600" height="50" rx="8" fill="#1A1D27"/>
  <circle cx="130" cy="355" r="6" fill="#FFBE3D"/>
  <text x="150" y="360" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">OpenClaw</text>
  <text x="450" y="360" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">Not installed</text>
  <!-- Auto Install button -->
  <rect x="315" y="400" width="170" height="44" rx="8" fill="#3DD68C"/>
  <text x="400" y="428" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0F1117">Auto Install</text>
  <!-- Bottom buttons -->
  <rect x="200" y="480" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="250" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#E8ECF4">&lt; Back</text>
  <rect x="500" y="480" width="100" height="36" rx="6" fill="#3DD68C"/>
  <text x="550" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Next &gt;</text>
</svg>