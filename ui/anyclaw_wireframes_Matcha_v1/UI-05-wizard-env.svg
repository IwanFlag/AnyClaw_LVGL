<svg xmlns="http://www.w3.org/2000/svg" width="650" height="420" viewBox="0 0 650 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="650" height="420" fill="#0F1117"/>
  <rect width="650" height="420" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="50" y="30" width="550" height="360" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Step indicator -->
  <circle cx="245" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="275" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="305" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="335" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="365" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="395" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="73" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Step 2/6</text>
  <!-- Title -->
  <text x="325" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E8ECF4">环境检测</text>
  <!-- Environment check list -->
  <!-- Node.js -->
  <rect x="100" y="130" width="450" height="40" rx="8" fill="#1A1D27"/>
  <circle cx="125" cy="150" r="5" fill="#3DD68C"/>
  <text x="145" y="155" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Node.js</text>
  <text x="310" y="155" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">v22.14.0</text>
  <circle cx="510" cy="150" r="5" fill="#3DD68C"/>
  <!-- npm -->
  <rect x="100" y="178" width="450" height="40" rx="8" fill="#1A1D27"/>
  <circle cx="125" cy="198" r="5" fill="#3DD68C"/>
  <text x="145" y="203" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">npm</text>
  <text x="310" y="203" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">v10.9.2</text>
  <circle cx="510" cy="198" r="5" fill="#3DD68C"/>
  <!-- Network -->
  <rect x="100" y="226" width="450" height="40" rx="8" fill="#1A1D27"/>
  <circle cx="125" cy="246" r="5" fill="#3DD68C"/>
  <text x="145" y="251" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Network</text>
  <text x="310" y="251" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">Connected</text>
  <circle cx="510" cy="246" r="5" fill="#3DD68C"/>
  <!-- OpenClaw -->
  <rect x="100" y="274" width="450" height="40" rx="8" fill="#1A1D27"/>
  <circle cx="125" cy="294" r="5" fill="#FFBE3D"/>
  <text x="145" y="299" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">OpenClaw</text>
  <text x="310" y="299" font-family="JetBrains Mono, monospace" font-size="12" fill="#8B92A8">v1.2.8</text>
  <circle cx="510" cy="294" r="5" fill="#FFBE3D"/>
  <!-- Auto Install button -->
  <rect x="240" y="335" width="170" height="36" rx="8" fill="#3DD68C"/>
  <text x="325" y="358" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Auto Install</text>
</svg>