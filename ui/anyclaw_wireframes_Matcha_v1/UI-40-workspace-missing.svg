<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 520x290 -->
  <rect x="140" y="155" width="520" height="290" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Title -->
  <text x="400" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF6B6B">❌ 工作区目录不可达</text>
  <!-- Path info -->
  <rect x="175" y="220" width="450" height="40" rx="8" fill="#13151E"/>
  <text x="400" y="246" text-anchor="middle" font-family="monospace" font-size="13" fill="#E8ECF4">/home/user/.openclaw/workspace</text>
  <text x="400" y="280" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">该目录不存在或无法访问</text>
  <!-- Buttons -->
  <rect x="160" y="315" width="140" height="40" rx="8" fill="#3DD68C" opacity="0.15" stroke="#3DD68C" stroke-width="1"/>
  <text x="230" y="341" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#3DD68C">重新创建目录</text>
  <rect x="315" y="315" width="130" height="40" rx="8" fill="#6C9FFF" opacity="0.15" stroke="#6C9FFF" stroke-width="1"/>
  <text x="380" y="341" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#6C9FFF">选择其他目录</text>
  <rect x="460" y="315" width="130" height="40" rx="8" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="525" y="341" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">创建新工作区</text>
</svg>