<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#6C9FFF"/>
    </linearGradient>
  </defs>
  <!-- Fullscreen overlay -->
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal dialog 700x400 centered -->
  <rect x="50" y="100" width="700" height="400" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Icon + Title -->
  <text x="400" y="155" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#E8ECF4">🔐 AnyClaw 权限确认</text>
  <!-- Description -->
  <text x="400" y="195" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#8B92A8">Agent 请求执行命令</text>
  <!-- Command box -->
  <rect x="130" y="210" width="540" height="44" rx="8" fill="#13151E" stroke="#3DD68C" stroke-width="1.5"/>
  <text x="400" y="238" text-anchor="middle" font-family="monospace" font-size="16" fill="#3DD68C">pip install pandas</text>
  <!-- Permission tag -->
  <rect x="330" y="268" width="140" height="28" rx="14" fill="#FFBE3D" opacity="0.15"/>
  <text x="400" y="287" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFBE3D">EXEC_SHELL</text>
  <!-- Buttons -->
  <rect x="110" y="340" width="150" height="42" rx="8" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1"/>
  <text x="185" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FF6B6B">拒绝</text>
  <rect x="285" y="340" width="150" height="42" rx="8" fill="#6C9FFF" opacity="0.15" stroke="#6C9FFF" stroke-width="1"/>
  <text x="360" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#6C9FFF">此次授权</text>
  <rect x="460" y="340" width="150" height="42" rx="8" fill="#3DD68C" opacity="0.15" stroke="#3DD68C" stroke-width="1"/>
  <text x="535" y="366" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#3DD68C">永久授权</text>
  <!-- 60s timeout progress bar -->
  <rect x="110" y="410" width="580" height="6" rx="3" fill="#13151E"/>
  <rect x="110" y="410" width="420" height="6" rx="3" fill="url(#barGrad)"/>
  <text x="690" y="408" text-anchor="end" font-family="Arial,sans-serif" font-size="11" fill="#6B7280">60s 超时</text>
</svg>