<svg xmlns="http://www.w3.org/2000/svg" width="650" height="420" viewBox="0 0 650 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="650" height="420" fill="#0F1117"/>
  <rect width="650" height="420" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="50" y="30" width="550" height="360" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Step indicator -->
  <circle cx="245" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="275" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="305" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="335" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="365" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="395" cy="68" r="6" fill="#3DD68C"/>
  <text x="460" y="73" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Step 6/6</text>
  <!-- Title -->
  <text x="325" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E8ECF4">个人资料</text>
  <!-- Nickname input -->
  <text x="100" y="145" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">昵称</text>
  <rect x="100" y="152" width="350" height="38" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="115" y="176" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">My Assistant</text>
  <!-- Timezone dropdown -->
  <text x="100" y="215" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">时区</text>
  <rect x="100" y="222" width="200" height="38" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="115" y="246" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">UTC+8 北京</text>
  <text x="285" y="246" font-family="sans-serif" font-size="14" fill="#8B92A8">▾</text>
  <!-- Config summary -->
  <rect x="100" y="280" width="450" height="60" rx="8" fill="#1A1D27"/>
  <text x="115" y="300" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">配置摘要</text>
  <text x="115" y="320" font-family="JetBrains Mono, monospace" font-size="11" fill="#6B7280">语言: 中文 | 模型: gemma-3-4b-it | 渠道: Telegram | Gemma: ✓</text>
  <!-- Get Started button -->
  <rect x="225" y="355" width="200" height="40" rx="8" fill="#3DD68C"/>
  <text x="285" y="380" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#0F1117">🚀</text>
  <text x="325" y="380" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#0F1117">Get Started</text>
</svg>