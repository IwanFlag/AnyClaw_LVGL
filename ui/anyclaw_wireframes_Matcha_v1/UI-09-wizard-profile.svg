<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="800" height="580" fill="#0F1117"/>
  <rect width="800" height="580" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="0" y="0" width="800" height="580" rx="0" fill="#1E2530"/>
  <!-- Header area (56px) -->
  <rect x="0" y="0" width="800" height="56" fill="#1E2530"/>
  <circle cx="28" cy="28" r="16" fill="#3DD68C"/>
  <text x="28" y="34" text-anchor="middle" font-size="16">🧄</text>
  <text x="60" y="34" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">个人资料 / Profile</text>
  <text x="680" y="34" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Step 6/6</text>
  <rect x="700" y="14" width="80" height="28" rx="6" fill="none" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="740" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Exit</text>
  <!-- Step indicator bar -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="250" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="350" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="450" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="550" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="650" cy="80" r="6" fill="#3DD68C"/>
  <!-- Content area -->
  <text x="100" y="130" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Nickname</text>
  <!-- Nickname input -->
  <rect x="100" y="140" width="400" height="44" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="120" y="168" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">My Assistant</text>
  <!-- Timezone -->
  <text x="100" y="215" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Timezone</text>
  <rect x="100" y="225" width="250" height="44" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="120" y="253" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">UTC+8 北京</text>
  <text x="320" y="253" font-family="sans-serif" font-size="14" fill="#8B92A8">▾</text>
  <!-- Config summary -->
  <text x="100" y="310" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Configuration Summary</text>
  <rect x="100" y="320" width="600" height="100" rx="8" fill="#1A1D27"/>
  <text x="120" y="350" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Language: 中文 | Model: gemma-3-4b-it | IM: Telegram ✓</text>
  <text x="120" y="375" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Gemma Local: disabled | Nickname: My Assistant</text>
  <text x="120" y="400" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Workspace: C:\Users\...\.openclaw\workspace</text>
  <!-- Bottom buttons -->
  <rect x="200" y="480" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="250" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#E8ECF4">&lt; Back</text>
  <!-- Get Started button (prominent, green) -->
  <rect x="400" y="475" width="200" height="44" rx="8" fill="#3DD68C"/>
  <text x="500" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#0F1117">🚀 Get Started</text>
</svg>