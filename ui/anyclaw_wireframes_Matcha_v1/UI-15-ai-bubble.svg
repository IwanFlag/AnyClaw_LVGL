<svg xmlns="http://www.w3.org/2000/svg" width="500" height="140" viewBox="0 0 500 140">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="500" height="140" fill="#0F1117" rx="8"/>
  <!-- AI avatar -->
  <circle cx="36" cy="28" r="12" fill="#1E2230" stroke="#3DD68C" stroke-width="1"/>
  <text x="36" y="33" font-family="sans-serif" font-size="13" text-anchor="middle">🦞</text>
  <!-- Green left accent line -->
  <rect x="58" y="10" width="2" height="108" rx="1" fill="#3DD68C"/>
  <!-- AI bubble -->
  <rect x="66" y="10" width="400" height="108" rx="12" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Markdown content: heading -->
  <text x="82" y="32" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8ECF4">架构分析</text>
  <!-- Bold text -->
  <text x="82" y="52" font-family="sans-serif" font-size="12" fill="#E8ECF4">当前项目采用 <tspan font-weight="bold" fill="#3DD68C">MVC 模式</tspan>，建议优化：</text>
  <!-- List items -->
  <text x="82" y="70" font-family="sans-serif" font-size="12" fill="#8B92A8">• 模块化路由层，减少耦合</text>
  <text x="82" y="86" font-family="sans-serif" font-size="12" fill="#8B92A8">• 引入中间件处理鉴权逻辑</text>
  <text x="82" y="102" font-family="sans-serif" font-size="12" fill="#8B92A8">• 数据层抽离为独立服务</text>
  <!-- Timestamp -->
  <text x="448" y="128" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="end">14:33</text>
</svg>