<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
  </defs>
  <!-- Background overlay -->
  <rect width="1280" height="720" fill="#0F1117"/>
  <rect width="1280" height="720" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="0" y="0" width="800" height="580" rx="0" fill="#1E2530"/>
  <!-- Header area (56px) -->
  <rect x="0" y="0" width="800" height="56" fill="#1E2530"/>
  <circle cx="28" cy="28" r="16" fill="#3DD68C"/>
  <text x="28" y="34" text-anchor="middle" font-size="16">🧄</text>
  <text x="60" y="34" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">Gemma 本地推理 / Local Models</text>
  <text x="680" y="34" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Step 4/6</text>
  <rect x="700" y="14" width="80" height="28" rx="6" fill="none" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="740" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Exit</text>
  <!-- Step indicator bar -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="250" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="350" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="450" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="550" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="650" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <!-- Content area -->
  <text x="100" y="130" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Enable Gemma Local Inference (Optional)</text>
  <!-- Switch ON state -->
  <rect x="650" y="118" width="50" height="26" rx="13" fill="#3DD68C"/>
  <circle cx="690" cy="131" r="10" fill="#FFFFFF"/>
  <!-- Model version selection -->
  <text x="100" y="175" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Model Version</text>
  <!-- Checkbox 1: checked -->
  <rect x="100" y="190" width="22" height="22" rx="4" fill="#3DD68C"/>
  <text x="111" y="206" text-anchor="middle" font-size="12" fill="#0F1117">✓</text>
  <text x="130" y="207" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">Gemma E4B (4B, download)</text>
  <!-- Checkbox 2: unchecked -->
  <rect x="100" y="225" width="22" height="22" rx="4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="130" y="242" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">Gemma 26B MoE (download)</text>
  <!-- Checkbox 3: unchecked -->
  <rect x="400" y="225" width="22" height="22" rx="4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="430" y="242" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">Gemma 27B (download)</text>
  <!-- Progress section (hidden by default) -->
  <text x="100" y="290" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Download Progress</text>
  <rect x="100" y="300" width="500" height="12" rx="6" fill="#1A1D27"/>
  <rect x="100" y="300" width="310" height="12" rx="6" fill="url(#progressGrad)"/>
  <text x="615" y="311" font-family="JetBrains Mono, monospace" font-size="12" fill="#3DD68C">62%</text>
  <text x="100" y="335" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">Downloading gemma-3-4b-it-Q4_0.gguf ... (1.2GB / 2.0GB)</text>
  <!-- Start Download button -->
  <rect x="100" y="360" width="200" height="40" rx="8" fill="#3DD68C"/>
  <text x="200" y="386" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0F1117">Start Download</text>
  <!-- Skip button -->
  <rect x="660" y="480" width="80" height="36" rx="6" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="700" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Skip</text>
  <!-- Bottom buttons -->
  <rect x="200" y="480" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="250" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#E8ECF4">&lt; Back</text>
  <rect x="500" y="480" width="100" height="36" rx="6" fill="#3DD68C"/>
  <text x="550" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Next &gt;</text>
</svg>