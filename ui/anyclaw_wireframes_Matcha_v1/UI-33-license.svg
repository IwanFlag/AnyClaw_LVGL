<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 620x360 centered -->
  <rect x="90" y="120" width="620" height="360" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Warning icon + title -->
  <text x="400" y="170" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#FF6B6B">⚠ Trial Period Ended</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#8B92A8">Your trial has expired. Please enter a license key to continue.</text>
  <!-- License key input -->
  <text x="130" y="238" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">License Key:</text>
  <rect x="130" y="248" width="360" height="40" rx="8" fill="#13151E" stroke="#6B7280" stroke-width="1.2"/>
  <text x="310" y="274" text-anchor="middle" font-family="monospace" font-size="16" fill="#E8ECF4">XXXXX-XXXXX-XXXXX</text>
  <!-- Serial info -->
  <text x="130" y="316" font-family="Arial,sans-serif" font-size="12" fill="#6B7280">序列号: AC-2026-0412-XXXX</text>
  <text x="130" y="336" font-family="Arial,sans-serif" font-size="12" fill="#6B7280">状态: 未激活</text>
  <!-- Buttons -->
  <rect x="130" y="370" width="140" height="42" rx="8" fill="#3DD68C"/>
  <text x="200" y="397" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#fff">Activate</text>
  <rect x="290" y="370" width="100" height="42" rx="8" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="340" y="397" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" fill="#8B92A8">Close</text>
</svg>