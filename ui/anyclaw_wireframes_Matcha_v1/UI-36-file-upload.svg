<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background surface -->
  <rect width="800" height="600" fill="#0F1117"/>
  <!-- Some context: a button area -->
  <rect x="340" y="280" width="120" height="40" rx="8" fill="#1A1D27" stroke="#6B7280" stroke-width="1"/>
  <text x="400" y="306" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#8B92A8">上传</text>
  <!-- Popup menu 200x80 positioned near button -->
  <rect x="300" y="325" width="200" height="80" rx="10" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Option 1 -->
  <text x="320" y="355" font-family="Arial,sans-serif" font-size="14" fill="#E8ECF4">📄 选择文件</text>
  <!-- Divider -->
  <line x1="310" y1="368" x2="490" y2="368" stroke="#1E2230" stroke-width="1"/>
  <!-- Option 2 -->
  <text x="320" y="390" font-family="Arial,sans-serif" font-size="14" fill="#E8ECF4">📁 选择目录</text>
</svg>