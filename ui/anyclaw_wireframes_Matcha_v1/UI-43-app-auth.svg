<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 700x420 -->
  <rect x="50" y="90" width="700" height="420" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Title -->
  <text x="400" y="135" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#E8ECF4">📱 应用授权</text>
  <!-- App Card 1: Outlook CLI -->
  <rect x="80" y="155" width="640" height="70" rx="10" fill="#13151E"/>
  <text x="108" y="185" font-family="Arial,sans-serif" font-size="24" fill="#E8ECF4">📧</text>
  <text x="145" y="182" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#E8ECF4">Outlook CLI</text>
  <text x="145" y="202" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">邮件读取与发送权限</text>
  <rect x="570" y="170" width="70" height="32" rx="6" fill="#3DD68C"/>
  <text x="605" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff">授权</text>
  <rect x="650" y="170" width="55" height="32" rx="6" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="677" y="192" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">拒绝</text>
  <!-- App Card 2: Google Calendar MCP -->
  <rect x="80" y="235" width="640" height="70" rx="10" fill="#13151E"/>
  <text x="108" y="265" font-family="Arial,sans-serif" font-size="24" fill="#E8ECF4">📅</text>
  <text x="145" y="262" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#E8ECF4">Google Calendar MCP</text>
  <text x="145" y="282" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">日历事件读写权限</text>
  <rect x="570" y="250" width="70" height="32" rx="6" fill="#3DD68C"/>
  <text x="605" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff">授权</text>
  <rect x="650" y="250" width="55" height="32" rx="6" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="677" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">拒绝</text>
  <!-- App Card 3: VS Code COM/API -->
  <rect x="80" y="315" width="640" height="70" rx="10" fill="#13151E"/>
  <text x="108" y="345" font-family="Arial,sans-serif" font-size="24" fill="#E8ECF4">✏️</text>
  <text x="145" y="342" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#E8ECF4">VS Code COM / API</text>
  <text x="145" y="362" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">编辑器集成与文件操作权限</text>
  <rect x="570" y="330" width="70" height="32" rx="6" fill="#3DD68C"/>
  <text x="605" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff">授权</text>
  <rect x="650" y="330" width="55" height="32" rx="6" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="677" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" fill="#8B92A8">拒绝</text>
  <!-- Footer note -->
  <text x="400" y="420" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6B7280">授权后可随时在设置中撤销</text>
</svg>