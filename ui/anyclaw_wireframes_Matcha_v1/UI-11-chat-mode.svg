<svg xmlns="http://www.w3.org/2000/svg" width="1450" height="800" viewBox="0 0 1450 800">
  <defs>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2B5C3E"/>
      <stop offset="100%" stop-color="#1F4A30"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1450" height="800" fill="#0F1117"/>
  <!-- Title bar -->
  <rect width="1450" height="48" fill="#13151E"/>
  <text x="20" y="30" font-family="sans-serif" font-size="18">🧄</text>
  <text x="48" y="31" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#E8ECF4">AnyClaw</text>
  <!-- Mode switcher -->
  <rect x="160" y="10" width="180" height="28" rx="14" fill="#1A1D27"/>
  <rect x="162" y="12" width="88" height="24" rx="12" fill="#3DD68C"/>
  <text x="206" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#0F1117">Chat</text>
  <text x="298" y="28" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Work</text>
  <!-- Window controls -->
  <text x="1390" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B92A8">─ □ ✕</text>
  <!-- Left panel -->
  <rect x="0" y="48" width="240" height="752" fill="#13151E"/>
  <!-- Status card -->
  <rect x="12" y="60" width="216" height="80" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="24" y="84" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">状态</text>
  <circle cx="24" cy="105" r="4" fill="#3DD68C"/>
  <text x="36" y="109" font-family="Inter, sans-serif" font-size="13" fill="#3DD68C">在线</text>
  <text x="120" y="109" font-family="JetBrains Mono, monospace" font-size="11" fill="#6B7280">gemma-3-4b</text>
  <text x="24" y="128" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">今日: 47 次对话</text>
  <!-- Session 1 -->
  <rect x="12" y="152" width="216" height="56" rx="8" fill="#1E2230" stroke="#3DD68C40" stroke-width="1"/>
  <text x="24" y="175" font-family="Inter, sans-serif" font-size="13" fill="#E8ECF4">Chat #12</text>
  <text x="24" y="195" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">2分钟前 · 8条消息</text>
  <!-- Session 2 -->
  <rect x="12" y="216" width="216" height="56" rx="8" fill="#1A1D27"/>
  <text x="24" y="239" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Chat #11</text>
  <text x="24" y="259" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">1小时前 · 15条消息</text>
  <!-- Cron section -->
  <text x="12" y="300" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">Cron 任务</text>
  <rect x="12" y="310" width="216" height="40" rx="8" fill="#1A1D27"/>
  <text x="24" y="335" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">⏰ 每日摘要 09:00</text>
  <rect x="12" y="356" width="216" height="40" rx="8" fill="#1A1D27"/>
  <text x="24" y="381" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">📧 邮件检查 */30min</text>
  <!-- Divider -->
  <rect x="240" y="48" width="6" height="752" fill="#3DD68C08"/>
  <!-- Right chat area -->
  <rect x="246" y="48" width="1204" height="680" fill="#0F1117"/>
  <!-- Chat messages -->
  <!-- User bubble 1 -->
  <rect x="800" y="70" width="380" height="44" rx="12" fill="url(#userBubble)"/>
  <text x="815" y="97" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">帮我写一个Python快速排序</text>
  <!-- AI bubble 1 -->
  <rect x="270" y="130" width="520" height="100" rx="12" fill="#1E2230" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="285" y="155" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">好的，这是一个简洁的快速排序实现：</text>
  <!-- Code block -->
  <rect x="285" y="165" width="490" height="50" rx="6" fill="#1A1D27"/>
  <text x="295" y="185" font-family="JetBrains Mono, monospace" font-size="11" fill="#3DD68C">def quicksort(arr):</text>
  <text x="295" y="200" font-family="JetBrains Mono, monospace" font-size="11" fill="#8B92A8">    if len(arr) &lt;= 1: return arr</text>
  <!-- User bubble 2 -->
  <rect x="850" y="250" width="330" height="44" rx="12" fill="url(#userBubble)"/>
  <text x="865" y="277" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">能解释一下时间复杂度吗？</text>
  <!-- AI bubble 2 -->
  <rect x="270" y="310" width="520" height="80" rx="12" fill="#1E2230" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="285" y="335" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">快速排序的平均时间复杂度是 O(n log n)，</text>
  <text x="285" y="358" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">最坏情况是 O(n²)。空间复杂度为 O(log n)。</text>
  <text x="285" y="378" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">这是因为递归调用栈的深度平均为 log n。</text>
  <!-- Typing indicator -->
  <rect x="270" y="410" width="60" height="30" rx="12" fill="#1E2230"/>
  <circle cx="288" cy="425" r="3" fill="#6B7280"/>
  <circle cx="300" cy="425" r="3" fill="#8B92A8"/>
  <circle cx="312" cy="425" r="3" fill="#6B7280"/>
  <!-- Input area -->
  <rect x="246" y="728" width="1204" height="72" fill="#13151E" stroke="#3DD68C08" stroke-width="1"/>
  <!-- Mic button -->
  <circle cx="280" cy="764" r="16" fill="#1A1D27"/>
  <text x="280" y="770" text-anchor="middle" font-size="16">🎤</text>
  <!-- Attach button -->
  <circle cx="320" cy="764" r="16" fill="#1A1D27"/>
  <text x="320" y="770" text-anchor="middle" font-size="14">📎</text>
  <!-- Input field -->
  <rect x="350" y="742" width="1050" height="44" rx="22" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="370" y="769" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">输入消息...</text>
  <!-- Send button -->
  <circle cx="1370" cy="764" r="20" fill="#3DD68C"/>
  <text x="1370" y="771" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#0F1117">➤</text>
</svg>