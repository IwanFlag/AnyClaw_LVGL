<svg xmlns="http://www.w3.org/2000/svg" width="950" height="620" viewBox="0 0 950 620">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .t3{fill:#6B7280} .accent{fill:#3DD68C} .info{fill:#6C9FFF}
    </style>
  </defs>
  <rect width="950" height="620" rx="12" fill="#0F1117"/>
  <!-- Tab Bar -->
  <rect x="0" y="0" width="950" height="44" rx="12" fill="#13151E"/>
  <rect x="0" y="32" width="950" height="12" fill="#13151E"/>
  <text x="30" y="28" font-size="13" fill="#8B92A8">General</text>
  <text x="100" y="28" font-size="13" fill="#8B92A8">Permissions</text>
  <text x="200" y="28" font-size="13" font-weight="600" class="accent">Model</text>
  <rect x="196" y="40" width="44" height="2" rx="1" fill="#3DD68C"/>
  <text x="275" y="28" font-size="13" fill="#8B92A8">Feature</text>
  <text x="355" y="28" font-size="13" fill="#8B92A8">Tracing</text>
  <text x="435" y="28" font-size="13" fill="#8B92A8">Log</text>
  <text x="485" y="28" font-size="13" fill="#8B92A8">KB</text>
  <text x="525" y="28" font-size="13" fill="#8B92A8">About</text>
  <line x1="0" y1="44" x2="950" y2="44" stroke="#1E2230" stroke-width="1"/>

  <!-- Current Model -->
  <rect x="24" y="60" width="902" height="56" rx="8" fill="#1A1D27"/>
  <text x="40" y="82" font-size="11" class="t2">Current Model</text>
  <rect x="40" y="90" width="300" height="20" rx="4" fill="#3DD68C20"/>
  <text x="50" y="105" font-size="13" font-weight="600" class="accent">xiaomi/mimo-v2-pro</text>

  <!-- Model Selector -->
  <rect x="24" y="130" width="902" height="180" rx="8" fill="#1A1D27"/>
  <text x="40" y="155" font-size="13" font-weight="600">Model Selection</text>
  <rect x="40" y="166" width="400" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="52" y="187" font-size="12">mimo-v2-pro ▾</text>
  <!-- Model List -->
  <rect x="40" y="202" width="400" height="96" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <rect x="40" y="202" width="400" height="24" rx="0" fill="#3DD68C20"/>
  <text x="52" y="219" font-size="11" class="accent">● mimo-v2-pro</text>
  <text x="52" y="243" font-size="11" class="t2">mimo-v2-flash</text>
  <text x="52" y="263" font-size="11" class="t2">gpt-4o</text>
  <text x="52" y="283" font-size="11" class="t2">claude-3.5-sonnet</text>

  <!-- Provider -->
  <text x="480" y="155" font-size="12" class="t2">Provider</text>
  <text x="480" y="175" font-size="13" class="info">Auto-detected: Xiaomi</text>

  <!-- API Key -->
  <text x="480" y="210" font-size="12" class="t2">API Key</text>
  <rect x="480" y="218" width="400" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="492" y="239" font-size="12" class="t3">••••••••••••••••••••</text>
  <text x="856" y="239" font-size="14">👁</text>
  <!-- Eye open state -->
  <rect x="480" y="260" width="400" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="492" y="281" font-size="11" font-family="monospace">sk-mi-xxxxxxxxxxxxxxxxxxxx</text>
  <text x="856" y="281" font-size="14">👁</text>

  <!-- Add Custom Model Button -->
  <rect x="24" y="330" width="200" height="36" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="40" y="353" font-size="13" class="accent">+ Add Custom Model</text>

  <!-- Model Info Card -->
  <rect x="24" y="386" width="902" height="200" rx="8" fill="#1A1D27"/>
  <text x="40" y="412" font-size="13" font-weight="600">Model Info</text>
  <text x="40" y="438" font-size="12" class="t2">Name:</text>
  <text x="120" y="438" font-size="12">mimo-v2-pro</text>
  <text x="40" y="462" font-size="12" class="t2">Provider:</text>
  <text x="120" y="462" font-size="12">Xiaomi</text>
  <text x="40" y="486" font-size="12" class="t2">Context:</text>
  <text x="120" y="486" font-size="12">128K tokens</text>
  <text x="40" y="510" font-size="12" class="t2">Max Output:</text>
  <text x="140" y="510" font-size="12">16K tokens</text>
  <text x="40" y="534" font-size="12" class="t2">Status:</text>
  <circle cx="116" cy="531" r="4" fill="#3DD68C"/>
  <text x="126" y="534" font-size="12" class="accent">Available</text>
</svg>