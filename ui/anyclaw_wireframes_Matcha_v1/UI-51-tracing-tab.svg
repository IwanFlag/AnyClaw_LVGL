<svg xmlns="http://www.w3.org/2000/svg" width="950" height="620" viewBox="0 0 950 620">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .t3{fill:#6B7280} .accent{fill:#3DD68C} .danger{fill:#FF6B6B} .warning{fill:#FFBE3D} .info{fill:#6C9FFF}
    </style>
  </defs>
  <rect width="950" height="620" rx="12" fill="#0F1117"/>
  <!-- Tab Bar -->
  <rect x="0" y="0" width="950" height="44" rx="12" fill="#13151E"/>
  <rect x="0" y="32" width="950" height="12" fill="#13151E"/>
  <text x="30" y="28" font-size="13" fill="#8B92A8">General</text>
  <text x="100" y="28" font-size="13" fill="#8B92A8">Permissions</text>
  <text x="200" y="28" font-size="13" fill="#8B92A8">Model</text>
  <text x="275" y="28" font-size="13" fill="#8B92A8">Feature</text>
  <text x="355" y="28" font-size="13" font-weight="600" class="accent">Tracing</text>
  <rect x="351" y="40" width="52" height="2" rx="1" fill="#3DD68C"/>
  <text x="435" y="28" font-size="13" fill="#8B92A8">Log</text>
  <text x="485" y="28" font-size="13" fill="#8B92A8">KB</text>
  <text x="525" y="28" font-size="13" fill="#8B92A8">About</text>
  <line x1="0" y1="44" x2="950" y2="44" stroke="#1E2230" stroke-width="1"/>

  <!-- Filters -->
  <rect x="24" y="56" width="902" height="48" rx="8" fill="#1A1D27"/>
  <text x="40" y="82" font-size="12" class="t2">Action:</text>
  <rect x="100" y="64" width="120" height="28" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="112" y="83" font-size="11">All ▾</text>
  <text x="240" y="82" font-size="12" class="t2">Outcome:</text>
  <rect x="310" y="64" width="120" height="28" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="322" y="83" font-size="11">All ▾</text>

  <!-- Trace Table Header -->
  <rect x="24" y="114" width="902" height="30" rx="4" fill="#1E2230"/>
  <text x="40" y="134" font-size="11" font-weight="600" class="t2">Time</text>
  <text x="140" y="134" font-size="11" font-weight="600" class="t2">Action</text>
  <text x="300" y="134" font-size="11" font-weight="600" class="t2">Target</text>
  <text x="500" y="134" font-size="11" font-weight="600" class="t2">Duration</text>
  <text x="620" y="134" font-size="11" font-weight="600" class="t2">Result</text>

  <!-- 1 - success -->
  <rect x="24" y="148" width="902" height="36" rx="4" fill="#1A1D27"/>
  <text x="40" y="171" font-size="11" font-family="monospace" class="t3">02:45:01</text>
  <text x="140" y="171" font-size="11">model_call</text>
  <text x="300" y="171" font-size="11" class="t2">mimo-v2-pro</text>
  <text x="500" y="171" font-size="11">1.23s</text>
  <rect x="620" y="158" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="171" font-size="10" class="accent">success</text>
  <!-- 2 - success -->
  <rect x="24" y="188" width="902" height="36" rx="4" fill="#13151E"/>
  <text x="40" y="211" font-size="11" font-family="monospace" class="t3">02:45:03</text>
  <text x="140" y="211" font-size="11">tool_call</text>
  <text x="300" y="211" font-size="11" class="t2">read_file</text>
  <text x="500" y="211" font-size="11">0.12s</text>
  <rect x="620" y="198" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="211" font-size="10" class="accent">success</text>
  <!-- 3 - timeout -->
  <rect x="24" y="228" width="902" height="36" rx="4" fill="#1A1D27"/>
  <text x="40" y="251" font-size="11" font-family="monospace" class="t3">02:45:08</text>
  <text x="140" y="251" font-size="11">model_call</text>
  <text x="300" y="251" font-size="11" class="t2">gpt-4o</text>
  <text x="500" y="251" font-size="11">30.0s</text>
  <rect x="620" y="238" width="58" height="18" rx="9" fill="#FFBE3D20"/>
  <text x="628" y="251" font-size="10" class="warning">timeout</text>
  <!-- 4 - success -->
  <rect x="24" y="268" width="902" height="36" rx="4" fill="#13151E"/>
  <text x="40" y="291" font-size="11" font-family="monospace" class="t3">02:45:12</text>
  <text x="140" y="291" font-size="11">exec</text>
  <text x="300" y="291" font-size="11" class="t2">git status</text>
  <text x="500" y="291" font-size="11">0.45s</text>
  <rect x="620" y="278" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="291" font-size="10" class="accent">success</text>
  <!-- 5 - error -->
  <rect x="24" y="308" width="902" height="36" rx="4" fill="#1A1D27"/>
  <text x="40" y="331" font-size="11" font-family="monospace" class="t3">02:45:15</text>
  <text x="140" y="331" font-size="11">api_request</text>
  <text x="300" y="331" font-size="11" class="t2">kb_search</text>
  <text x="500" y="331" font-size="11">2.1s</text>
  <rect x="620" y="318" width="48" height="18" rx="9" fill="#FF6B6B20"/>
  <text x="628" y="331" font-size="10" class="danger">error</text>
  <!-- 6 - success -->
  <rect x="24" y="348" width="902" height="36" rx="4" fill="#13151E"/>
  <text x="40" y="371" font-size="11" font-family="monospace" class="t3">02:45:18</text>
  <text x="140" y="371" font-size="11">model_call</text>
  <text x="300" y="371" font-size="11" class="t2">mimo-v2-pro</text>
  <text x="500" y="371" font-size="11">0.89s</text>
  <rect x="620" y="358" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="371" font-size="10" class="accent">success</text>
  <!-- 7 - success -->
  <rect x="24" y="388" width="902" height="36" rx="4" fill="#1A1D27"/>
  <text x="40" y="411" font-size="11" font-family="monospace" class="t3">02:45:20</text>
  <text x="140" y="411" font-size="11">tool_call</text>
  <text x="300" y="411" font-size="11" class="t2">web_search</text>
  <text x="500" y="411" font-size="11">1.5s</text>
  <rect x="620" y="398" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="411" font-size="10" class="accent">success</text>
  <!-- 8 - timeout -->
  <rect x="24" y="428" width="902" height="36" rx="4" fill="#13151E"/>
  <text x="40" y="451" font-size="11" font-family="monospace" class="t3">02:45:25</text>
  <text x="140" y="451" font-size="11">model_call</text>
  <text x="300" y="451" font-size="11" class="t2">mimo-v2-pro</text>
  <text x="500" y="451" font-size="11">30.0s</text>
  <rect x="620" y="438" width="58" height="18" rx="9" fill="#FFBE3D20"/>
  <text x="628" y="451" font-size="10" class="warning">timeout</text>
  <!-- 9 - success -->
  <rect x="24" y="468" width="902" height="36" rx="4" fill="#1A1D27"/>
  <text x="40" y="491" font-size="11" font-family="monospace" class="t3">02:45:30</text>
  <text x="140" y="491" font-size="11">exec</text>
  <text x="300" y="491" font-size="11" class="t2">ls -la</text>
  <text x="500" y="491" font-size="11">0.08s</text>
  <rect x="620" y="478" width="56" height="18" rx="9" fill="#3DD68C20"/>
  <text x="630" y="491" font-size="10" class="accent">success</text>
  <!-- 10 - error -->
  <rect x="24" y="508" width="902" height="36" rx="4" fill="#13151E"/>
  <text x="40" y="531" font-size="11" font-family="monospace" class="t3">02:45:35</text>
  <text x="140" y="531" font-size="11">model_call</text>
  <text x="300" y="531" font-size="11" class="t2">claude-3.5</text>
  <text x="500" y="531" font-size="11">5.2s</text>
  <rect x="620" y="518" width="48" height="18" rx="9" fill="#FF6B6B20"/>
  <text x="628" y="531" font-size="10" class="danger">error</text>

  <!-- Buttons -->
  <rect x="24" y="568" width="120" height="32" rx="6" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="36" y="589" font-size="12">Export JSONL</text>
  <rect x="154" y="568" width="100" height="32" rx="6" fill="#1E2230" stroke="#FF6B6B40" stroke-width="1"/>
  <text x="180" y="589" font-size="12" class="danger">Clear</text>
</svg>