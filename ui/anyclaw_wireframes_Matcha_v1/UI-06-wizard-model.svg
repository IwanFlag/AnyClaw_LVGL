<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="1280" height="720" fill="#0F1117"/>
  <rect width="1280" height="720" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="0" y="0" width="800" height="580" rx="0" fill="#1E2530"/>
  <!-- Header area (56px) -->
  <rect x="0" y="0" width="800" height="56" fill="#1E2530"/>
  <circle cx="28" cy="28" r="16" fill="#3DD68C"/>
  <text x="28" y="34" text-anchor="middle" font-size="16">🧄</text>
  <text x="60" y="34" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">模型配置 / Model Configuration</text>
  <text x="680" y="34" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Step 3/6</text>
  <rect x="700" y="14" width="80" height="28" rx="6" fill="none" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="740" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Exit</text>
  <!-- Step indicator bar -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="250" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="350" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="450" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="550" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="650" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <!-- Content area -->
  <text x="100" y="130" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Select Model</text>
  <!-- Model dropdown -->
  <rect x="100" y="140" width="600" height="44" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="120" y="168" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">gemma-3-4b-it:free</text>
  <text x="660" y="168" font-family="sans-serif" font-size="14" fill="#8B92A8">▾</text>
  <!-- Provider hint -->
  <text x="100" y="205" font-family="Inter, sans-serif" font-size="12" fill="#3DD68C">Provider: openrouter  |  Get API key at openrouter.ai</text>
  <!-- Divider -->
  <line x1="100" y1="220" x2="700" y2="220" stroke="#3DD68C08" stroke-width="1"/>
  <!-- API Key section -->
  <text x="100" y="250" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">API Key (Optional - free models work without it)</text>
  <rect x="100" y="260" width="600" height="44" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="120" y="288" font-family="JetBrains Mono, monospace" font-size="13" fill="#6B7280">••••••••••••••••••••</text>
  <!-- Eye toggle icon -->
  <rect x="620" y="260" width="44" height="44" rx="8" fill="#252A38" stroke="#3DD68C20" stroke-width="1"/>
  <text x="642" y="288" text-anchor="middle" font-size="16" fill="#8B92A8">👁</text>
  <!-- API Key Warning -->
  <text x="100" y="340" font-family="Inter, sans-serif" font-size="12" fill="#FFBE3D">⚠ No API Key: Only free models will work. Get one at openrouter.ai</text>
  <!-- Recommended models -->
  <text x="100" y="380" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">Recommended free models:</text>
  <rect x="100" y="395" width="150" height="32" rx="16" fill="#3DD68C1A" stroke="#3DD68C40" stroke-width="1"/>
  <text x="175" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3DD68C">claude-sonnet-4</text>
  <rect x="260" y="395" width="150" height="32" rx="16" fill="#3DD68C1A" stroke="#3DD68C40" stroke-width="1"/>
  <text x="335" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3DD68C">gpt-4o-mini</text>
  <rect x="420" y="395" width="150" height="32" rx="16" fill="#3DD68C1A" stroke="#3DD68C40" stroke-width="1"/>
  <text x="495" y="416" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" fill="#3DD68C">deepseek-v3</text>
  <!-- Bottom buttons -->
  <rect x="200" y="480" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="250" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#E8ECF4">&lt; Back</text>
  <rect x="500" y="480" width="100" height="36" rx="6" fill="#3DD68C"/>
  <text x="550" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Next &gt;</text>
</svg>