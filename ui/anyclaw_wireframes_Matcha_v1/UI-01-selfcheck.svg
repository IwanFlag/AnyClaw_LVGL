<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="400" fill="#0F1117"/>
  <!-- Center logo area -->
  <text x="300" y="100" text-anchor="middle" font-size="48" fill="#E8ECF4">🧄</text>
  <text x="300" y="140" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#E8ECF4">AnyClaw LVGL</text>
  <!-- Check items -->
  <!-- Item 1: Node.js -->
  <circle cx="180" cy="195" r="5" fill="#3DD68C"/>
  <text x="195" y="200" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">Node.js</text>
  <text x="340" y="200" font-family="JetBrains Mono, monospace" font-size="13" fill="#8B92A8">v22.14.0</text>
  <text x="520" y="200" font-family="sans-serif" font-size="16" fill="#3DD68C">✓</text>
  <!-- Item 2: npm -->
  <circle cx="180" cy="230" r="5" fill="#3DD68C"/>
  <text x="195" y="235" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">npm</text>
  <text x="340" y="235" font-family="JetBrains Mono, monospace" font-size="13" fill="#8B92A8">v10.9.2</text>
  <text x="520" y="235" font-family="sans-serif" font-size="16" fill="#3DD68C">✓</text>
  <!-- Item 3: OpenClaw -->
  <circle cx="180" cy="265" r="5" fill="#3DD68C"/>
  <text x="195" y="270" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">OpenClaw</text>
  <text x="340" y="270" font-family="JetBrains Mono, monospace" font-size="13" fill="#8B92A8">v1.2.8</text>
  <text x="520" y="270" font-family="sans-serif" font-size="16" fill="#3DD68C">✓</text>
  <!-- Item 4: LVGL Runtime -->
  <circle cx="180" cy="300" r="5" fill="#FFBE3D"/>
  <text x="195" y="305" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">LVGL Runtime</text>
  <text x="340" y="305" font-family="JetBrains Mono, monospace" font-size="13" fill="#8B92A8">checking...</text>
  <text x="520" y="305" font-family="sans-serif" font-size="16" fill="#FFBE3D">⟳</text>
  <!-- Bottom text -->
  <text x="300" y="370" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#6B7280">启动中...</text>
</svg>