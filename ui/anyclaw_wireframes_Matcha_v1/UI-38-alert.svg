<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 520x300 -->
  <rect x="140" y="150" width="520" height="300" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Title -->
  <text x="400" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#FF6B6B">🚨 警报</text>
  <!-- Alert message -->
  <text x="400" y="235" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" fill="#E8ECF4">磁盘空间不足 100MB</text>
  <text x="400" y="262" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">系统存储即将耗尽，可能导致数据丢失。</text>
  <text x="400" y="282" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">请立即清理磁盘空间以确保正常运行。</text>
  <!-- Sound annotation -->
  <text x="400" y="315" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#6B7280">🔊 正在播放系统警报音</text>
  <!-- Buttons -->
  <rect x="210" y="345" width="130" height="42" rx="8" fill="#FF6B6B"/>
  <text x="275" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#fff">立即处理</text>
  <rect x="360" y="345" width="130" height="42" rx="8" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="425" y="372" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#8B92A8">稍后提醒</text>
</svg>