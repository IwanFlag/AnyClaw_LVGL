<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <style>
      .bg { fill: #0F1117; }
      .panel { fill: #1A1D27; }
      .raised { fill: #1E2230; }
      .surface { fill: #13151E; }
      .text { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
      .text2 { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text3 { fill: #6B7280; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .title { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 18px; font-weight: 600; }
      .accent { fill: #3DD68C; }
      .btn-primary-text { fill: #0F1117; font-family: 'Segoe UI', sans-serif; font-size: 13px; font-weight: 600; }
      .btn-secondary-text { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
    </style>
    <linearGradient id="btnPrimary" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB876"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <!-- Background -->
  <rect class="bg" width="500" height="300" rx="12"/>
  <!-- Dialog card -->
  <rect class="panel" x="60" y="40" width="380" height="220" rx="12" filter="url(#shadow)"/>
  <!-- Icon + Title -->
  <text x="185" y="80" font-size="28" text-anchor="middle">📦</text>
  <text class="title" x="250" y="80" text-anchor="middle">有新版本啦！</text>
  <!-- Version -->
  <text class="text2" x="250" y="108" text-anchor="middle">v2.2.0 → v2.2.1</text>
  <!-- Changelog -->
  <rect class="surface" x="85" y="120" width="330" height="70" rx="8"/>
  <text class="text2" x="100" y="142">• 修复了 Gateway 连接断开后无法自动重连的问题</text>
  <text class="text2" x="100" y="162">• 新增知识库全文搜索功能，支持正则表达式</text>
  <text class="text3" x="100" y="180">+3 项其他改进</text>
  <!-- Buttons -->
  <rect x="85" y="204" width="155" height="36" rx="8" fill="url(#btnPrimary)"/>
  <text class="btn-primary-text" x="162" y="227" text-anchor="middle">立即更新</text>
  <rect x="260" y="204" width="155" height="36" rx="8" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text class="btn-secondary-text" x="337" y="227" text-anchor="middle">稍后</text>
</svg>