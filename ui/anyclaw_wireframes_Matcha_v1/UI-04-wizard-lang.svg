<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay (2/3 of typical 1920x1080 screen) -->
  <rect width="1280" height="720" fill="#0F1117"/>
  <rect width="1280" height="720" fill="#000000" opacity="0.6"/>
  <!-- Dialog (800x580 = ~62% x 80%) -->
  <rect x="0" y="0" width="800" height="580" rx="0" fill="#1E2530"/>
  <!-- Header area (56px) -->
  <rect x="0" y="0" width="800" height="56" fill="#1E2530"/>
  <!-- Brand icon -->
  <circle cx="28" cy="28" r="16" fill="#3DD68C"/>
  <text x="28" y="34" text-anchor="middle" font-size="16">🧄</text>
  <!-- Title -->
  <text x="60" y="34" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#E8ECF4">选择语言 / Select Language</text>
  <!-- Step counter -->
  <text x="680" y="34" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Step 1/6</text>
  <!-- Exit button -->
  <rect x="700" y="14" width="80" height="28" rx="6" fill="none" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="740" y="33" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#8B92A8">Exit</text>
  <!-- Step indicator bar (48px below header) -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#3DD68C" stroke-width="2"/>
  <circle cx="150" cy="80" r="6" fill="#3DD68C"/>
  <circle cx="250" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="350" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="450" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="550" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="650" cy="80" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <!-- Content area -->
  <text x="400" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#8B92A8">Please select your language:</text>
  <!-- Language buttons -->
  <!-- Chinese button (selected) -->
  <rect x="230" y="210" width="160" height="50" rx="8" fill="#3DD68C"/>
  <text x="310" y="243" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0F1117">中文</text>
  <!-- English button (unselected) -->
  <rect x="410" y="210" width="160" height="50" rx="8" fill="#1A1D27" stroke="#3DD68C20" stroke-width="1"/>
  <text x="490" y="243" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#E8ECF4">English</text>
  <!-- Hint -->
  <text x="400" y="300" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">AnyClaw 界面语言 / Interface language</text>
  <!-- Bottom buttons -->
  <!-- Back (disabled on step 1) -->
  <rect x="200" y="480" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="250" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">&lt; Back</text>
  <!-- Next button -->
  <rect x="500" y="480" width="100" height="36" rx="6" fill="#3DD68C"/>
  <text x="550" y="503" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Next &gt;</text>
  <!-- Size annotation -->
  <text x="400" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Dialog: 800×580px | Screen coverage: 66%</text>
</svg>