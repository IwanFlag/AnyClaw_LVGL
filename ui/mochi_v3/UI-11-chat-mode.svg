<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 800" width="1450" height="800">
  <defs>
    <linearGradient id="sendBtn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A67B5B"/>
      <stop offset="100%" stop-color="#A67B5B"/>
    </linearGradient>
  </defs>

  <!-- ===== Window Frame ===== -->
  <rect width="1450" height="800" rx="0" fill="#FAF6F0"/>

  <!-- ===== Title Bar (48px) ===== -->
  <rect width="1450" height="48" fill="#FAF6F0"/>
  <rect x="0" y="47" width="1450" height="1" fill="#E8E2D8"/>

  <!-- Brand -->
  <circle cx="28" cy="24" r="14" fill="#A67B5B" opacity="0.1"/>
  <text x="28" y="29" text-anchor="middle" font-size="16">🧄</text>
  <text x="50" y="29" font-family="Plus Jakarta Sans, sans-serif" font-size="15" font-weight="700" fill="#3D3226">AnyClaw</text>

  <!-- Mode Switcher -->
  <rect x="220" y="10" width="150" height="28" rx="14" fill="#F3EDE4"/>
  <rect x="224" y="12" width="70" height="24" rx="12" fill="#A67B5B"/>
  <text x="259" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" font-weight="600" fill="#FFFDF9">Chat</text>
  <text x="339" y="28" text-anchor="middle" font-family="Plus Jakarta Sans, sans-serif" font-size="12" fill="#8B7D6B">Work</text>

  <!-- Window Controls -->
  <text x="1373" y="30" text-anchor="middle" font-size="14" fill="#8B7D6B">⚙</text>
  <text x="1419" y="30" text-anchor="middle" font-size="14" fill="#8B7D6B">—</text>
  <text x="1465" y="30" text-anchor="middle" font-size="14" fill="#8B7D6B">□</text>
  <text x="1423" y="30" text-anchor="middle" font-size="14" fill="#8B7D6B">✕</text>

  <!-- ===== Left Panel (240px) ===== -->
  <rect x="0" y="48" width="240" height="752" fill="#F3EDE4"/>

  <!-- Gateway Status Card -->
  <rect x="12" y="58" width="216" height="44" rx="10" fill="#FFFDF9"/>
  <circle cx="28" cy="80" r="5" fill="#7EA87A"/>
  <rect x="26" y="78" width="4" height="4" rx="2" fill="#7EA87A">
    <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text x="40" y="77" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#7EA87A" font-weight="600">READY</text>
  <text x="40" y="90" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B7D6B">Gateway</text>

  <!-- Workspace Name -->
  <rect x="12" y="110" width="216" height="32" rx="10" fill="#FFFDF9"/>
  <text x="24" y="131" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#3D3226">📁 茶室</text>

  <!-- Sessions Header -->
  <text x="16" y="168" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#B0A394" letter-spacing="1">SESSIONS</text>
  <rect x="210" y="156" width="20" height="20" rx="10" fill="#EDE7DC"/>
  <text x="220" y="170" text-anchor="middle" font-size="12" fill="#A67B5B">+</text>

  <!-- Session: Chat (active) -->
  <rect x="12" y="178" width="216" height="32" rx="10" fill="#A67B5B" opacity="0.08"/>
  <rect x="12" y="178" width="3" height="32" rx="1.5" fill="#A67B5B"/>
  <text x="22" y="199" font-size="12" fill="#3D3226">🍡 Chat</text>
  <circle cx="210" cy="194" r="4" fill="#7EA87A">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="170" y="199" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#A67B5B" font-weight="600">ACTIVE</text>

  <!-- Session: Work (idle) -->
  <rect x="12" y="216" width="216" height="32" rx="10" fill="transparent"/>
  <text x="22" y="237" font-size="12" fill="#8B7D6B">⚡ Work</text>
  <circle cx="210" cy="232" r="4" fill="#D6CFC4" opacity="0.3"/>

  <!-- Cron Header -->
  <rect x="12" y="264" width="216" height="1" fill="#E8E2D8"/>
  <text x="16" y="286" font-family="Plus Jakarta Sans, sans-serif" font-size="10" font-weight="600" fill="#B0A394" letter-spacing="1">CRON TASKS</text>
  <rect x="210" y="274" width="20" height="20" rx="10" fill="#EDE7DC"/>
  <text x="220" y="288" text-anchor="middle" font-size="12" fill="#A67B5B">+</text>

  <!-- ===== Splitter ===== -->
  <rect x="240" y="48" width="6" height="752" fill="#F3EDE4"/>

  <!-- ===== Chat Content Area ===== -->
  <rect x="246" y="48" width="1204" height="604" fill="#FAF6F0"/>

  <!-- System Message -->
  <g transform="translate(280, 70)">
    <circle cx="14" cy="14" r="12" fill="#FFFDF9"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="380" height="48" rx="14" fill="#FFFDF9"/>
    <rect x="34" y="4" width="2" height="40" rx="1" fill="#A67B5B"/>
    <text x="44" y="18" font-family="思源宋体 SC, Lora, serif" font-size="12" fill="#3D3226">龙虾要吃蒜蓉的。</text>
    <text x="44" y="36" font-family="HarmonyOS Sans SC, sans-serif" font-size="11" fill="#8B7D6B">你的AI助手已就位。</text>
    <text x="380" y="42" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#B0A394">12:00</text>
  </g>

  <!-- User Bubble 1 (right) -->
  <g transform="translate(850, 136)">
    <rect x="0" y="0" width="300" height="44" rx="14" fill="#E8DFD0"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#3D3226">帮我查一下今天的天气和待办事项。</text>
    <text x="260" y="38" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#8B7D6B" opacity="0.6">12:01</text>
  </g>

  <!-- AI Bubble 2 (left) -->
  <g transform="translate(280, 200)">
    <circle cx="14" cy="14" r="12" fill="#FFFDF9"/>
    <text x="14" y="18" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="0" width="420" height="100" rx="14" fill="#FFFDF9"/>
    <rect x="34" y="4" width="2" height="92" rx="1" fill="#A67B5B"/>
    <text x="46" y="22" font-family="思源宋体 SC, Lora, serif" font-size="13" fill="#3D3226">北京今天晴，22°C，微风。</text>
    <text x="46" y="44" font-family="思源宋体 SC, Lora, serif" font-size="13" fill="#3D3226">待办事项：</text>
    <text x="46" y="66" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B7D6B">· 14:00 团队周会</text>
    <text x="46" y="84" font-family="HarmonyOS Sans SC, sans-serif" font-size="12" fill="#8B7D6B">· 16:30 提交PRD文档</text>
    <text x="386" y="92" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#B0A394">12:02</text>
  </g>

  <!-- AI Quote/Response style -->
  <g transform="translate(310, 320)">
    <rect x="0" y="0" width="3" height="36" rx="1.5" fill="#A67B5B" opacity="0.3"/>
    <text x="12" y="22" font-family="思源宋体 SC, Lora, serif" font-size="13" fill="#8B7D6B" font-style="italic">「好的，已设置提醒。」</text>
  </g>

  <!-- User Bubble 3 (right) -->
  <g transform="translate(890, 378)">
    <rect x="0" y="0" width="260" height="44" rx="14" fill="#E8DFD0"/>
    <text x="14" y="22" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#3D3226">帮我设置16:25的提前提醒。</text>
    <text x="220" y="38" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#8B7D6B" opacity="0.6">12:03</text>
  </g>

  <!-- AI Streaming Indicator -->
  <g transform="translate(280, 444)">
    <circle cx="14" cy="10" r="12" fill="#FFFDF9"/>
    <text x="14" y="14" text-anchor="middle" font-size="12">🦞</text>
    <rect x="34" y="-4" width="90" height="28" rx="14" fill="#FFFDF9"/>
    <circle cx="52" cy="10" r="3" fill="#A67B5B">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="66" cy="10" r="3" fill="#A67B5B">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="80" cy="10" r="3" fill="#A67B5B">
      <animate attributeName="opacity" values="0.3;0.3;1" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
  </g>

  <!-- ===== Input Area ===== -->
  <rect x="246" y="652" width="1204" height="148" fill="#F3EDE4"/>
  <rect x="246" y="652" width="1204" height="1" fill="#E8E2D8"/>

  <!-- Input Box -->
  <rect x="306" y="668" width="1024" height="96" rx="10" fill="#FFFDF9" stroke="#D6CFC4" stroke-width="1"/>
  <text x="324" y="720" font-family="HarmonyOS Sans SC, sans-serif" font-size="13" fill="#B0A394">输入消息... (Shift+Enter 换行)</text>

  <!-- Attachment Icon -->
  <text x="328" y="792" text-anchor="middle" font-size="14" fill="#8B7D6B">📎</text>

  <!-- Voice Icon -->
  <text x="362" y="792" text-anchor="middle" font-size="14" fill="#8B7D6B">🎤</text>

  <!-- Char Count -->
  <text x="1280" y="792" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="10" fill="#B0A394">0/4096</text>

  <!-- Send Button (circle 40px, pure accent) -->
  <circle cx="1330" cy="788" r="20" fill="#A67B5B"/>
  <text x="1330" y="794" text-anchor="middle" font-size="16" fill="#FFFDF9">▶</text>

  <!-- ===== Theme Label ===== -->
  <text x="1430" y="795" text-anchor="end" font-family="Plus Jakarta Sans, sans-serif" font-size="9" fill="#B0A394" opacity="0.4">Mochi v3 · Chat Mode</text>
</svg>
