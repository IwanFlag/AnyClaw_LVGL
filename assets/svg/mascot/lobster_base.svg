<!-- Kawaii Lobster AI Avatar
     Coral red theme, not per-theme colored -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="bodyGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FF6B6B"/>
      <stop offset="100%" stop-color="#E84545"/>
    </linearGradient>
    <linearGradient id="bellyGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFE0E0"/>
      <stop offset="100%" stop-color="#FFC8C8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#00000020"/>
    </filter>
    <radialGradient id="highlight" cx="0.35" cy="0.3" r="0.35">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Shadow -->
  <ellipse cx="48" cy="90" rx="20" ry="3" fill="#00000015"/>

  <!-- Tail fan -->
  <g filter="url(#shadow)">
    <path d="M38 76 C34 84, 30 90, 28 88 C26 86, 32 80, 36 74Z" fill="#FF5C5C" opacity="0.8"/>
    <path d="M44 78 C42 86, 40 92, 38 90 C36 88, 40 82, 42 76Z" fill="#FF5C5C" opacity="0.8"/>
    <path d="M52 78 C54 86, 56 92, 58 90 C60 88, 56 82, 54 76Z" fill="#FF5C5C" opacity="0.8"/>
    <path d="M58 76 C62 84, 66 90, 68 88 C70 86, 64 80, 60 74Z" fill="#FF5C5C" opacity="0.8"/>
  </g>

  <!-- Body segments -->
  <g filter="url(#shadow)">
    <!-- Main body -->
    <ellipse cx="48" cy="52" rx="22" ry="26" fill="url(#bodyGrad)"/>
    <!-- Belly -->
    <ellipse cx="48" cy="56" rx="14" ry="18" fill="url(#bellyGrad)"/>
    <!-- Segment lines -->
    <path d="M30 44 C38 42, 58 42, 66 44" stroke="#E84545" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M28 52 C38 50, 58 50, 68 52" stroke="#E84545" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M30 60 C38 58, 58 58, 66 60" stroke="#E84545" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Highlight -->
    <ellipse cx="42" cy="42" rx="10" ry="12" fill="url(#highlight)"/>
  </g>

  <!-- Left claw -->
  <g filter="url(#shadow)">
    <path d="M16 38 C10 32, 6 36, 8 42 C10 46, 18 44, 22 42 L26 44"
          fill="#FF4757" stroke="#E84545" stroke-width="1"/>
    <path d="M10 38 C8 34, 6 36, 8 38" stroke="#FFE0E0" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Right claw -->
  <g filter="url(#shadow)">
    <path d="M80 38 C86 32, 90 36, 88 42 C86 46, 78 44, 74 42 L70 44"
          fill="#FF4757" stroke="#E84545" stroke-width="1"/>
    <path d="M86 38 C88 34, 90 36, 88 38" stroke="#FFE0E0" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Antennae -->
  <path d="M40 28 C36 14, 28 8, 24 10" stroke="#FF8787" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M56 28 C60 14, 68 8, 72 10" stroke="#FF8787" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Antenna tips -->
  <circle cx="24" cy="10" r="2" fill="#FF8787"/>
  <circle cx="72" cy="10" r="2" fill="#FF8787"/>

  <!-- Eyes -->
  <ellipse cx="40" cy="44" rx="3.5" ry="4" fill="#2D3748"/>
  <ellipse cx="38.5" cy="42.5" rx="1.5" ry="1.8" fill="#FFFFFF"/>
  <ellipse cx="56" cy="44" rx="3.5" ry="4" fill="#2D3748"/>
  <ellipse cx="54.5" cy="42.5" rx="1.5" ry="1.8" fill="#FFFFFF"/>

  <!-- Smile -->
  <path d="M42 52 Q48 58, 54 52" stroke="#2D3748" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <ellipse cx="34" cy="50" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.4"/>
  <ellipse cx="62" cy="50" rx="4" ry="2.5" fill="#FFB3B3" opacity="0.4"/>
</svg>
