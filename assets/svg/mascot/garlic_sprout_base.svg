<!-- Garlic Sprout (Leaves) - Desktop Pet Top Layer
     Separate from body for independent animation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="stemGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="__STEM_HI__"/>
      <stop offset="100%" stop-color="__STEM__"/>
    </linearGradient>
  </defs>

  <!-- Main stem -->
  <rect x="44" y="6" width="8" height="28" rx="4" fill="url(#stemGrad)"/>

  <!-- Left big leaf -->
  <path d="M48 18 C34 4, 18 12, 26 26 C30 32, 40 28, 48 22Z"
        fill="url(#stemGrad)" stroke="__STEM__" stroke-width="0.8"/>
  <!-- Left leaf vein -->
  <path d="M46 18 C38 10, 28 14, 30 22" stroke="__STEM_HI__" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- Right big leaf -->
  <path d="M48 18 C62 4, 78 12, 70 26 C66 32, 56 28, 48 22Z"
        fill="url(#stemGrad)" stroke="__STEM__" stroke-width="0.8"/>
  <!-- Right leaf vein -->
  <path d="M50 18 C58 10, 68 14, 66 22" stroke="__STEM_HI__" stroke-width="0.6" fill="none" opacity="0.5"/>

  <!-- Small center bud -->
  <ellipse cx="48" cy="10" rx="4" ry="5" fill="__STEM_HI__" opacity="0.7"/>

  <!-- Leaf highlights -->
  <path d="M44 16 C36 8, 24 10, 28 20 C30 24, 38 22, 44 18Z"
        fill="__STEM_HI__" opacity="0.3"/>
  <path d="M52 16 C60 8, 72 10, 68 20 C66 24, 58 22, 52 18Z"
        fill="__STEM_HI__" opacity="0.3"/>
</svg>
