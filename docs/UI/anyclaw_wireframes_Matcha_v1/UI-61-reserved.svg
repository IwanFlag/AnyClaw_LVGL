<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <style>
      .bg { fill: #0F1117; }
      .text2 { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 16px; }
      .text3 { fill: #6B7280; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
    </style>
  </defs>
  <!-- Background -->
  <rect class="bg" width="400" height="200" rx="12"/>
  <!-- Dashed border -->
  <rect x="16" y="16" width="368" height="168" rx="10" fill="none" stroke="#8B92A8" stroke-width="1.5" stroke-dasharray="8,6" opacity="0.5"/>
  <!-- Centered text -->
  <text class="text2" x="200" y="92" text-anchor="middle">UI-61 Reserved</text>
  <text class="text3" x="200" y="116" text-anchor="middle">Reserved for future use</text>
</svg>