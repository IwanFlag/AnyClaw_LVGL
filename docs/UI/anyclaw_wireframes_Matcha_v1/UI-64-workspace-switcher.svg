<svg xmlns="http://www.w3.org/2000/svg" width="420" height="310" viewBox="0 0 420 310">
  <defs>
    <style>
      .bg { fill: #0F1117; }
      .panel { fill: #1A1D27; }
      .raised { fill: #1E2230; }
      .text { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
      .text2 { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text3 { fill: #6B7280; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .title { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; }
      .accent { fill: #3DD68C; }
      .accent-border { stroke: #3DD68C; stroke-width: 2; fill: none; }
    </style>
    <linearGradient id="btnAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB876"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect class="bg" width="420" height="310" rx="12"/>
  <!-- Header -->
  <text class="title" x="20" y="36">工作区</text>
  <rect x="330" y="18" width="70" height="30" rx="6" fill="url(#btnAccent)"/>
  <text fill="#0F1117" font-family="Segoe UI, sans-serif" font-size="12px" font-weight="600" x="343" y="38">＋ 新建</text>
  <!-- Workspace 1 - Current (active) -->
  <rect x="20" y="56" width="380" height="70" rx="10" fill="#1A1D27" class="accent-border"/>
  <text class="text" x="36" y="80">🏠 Home Project</text>
  <rect x="170" y="68" width="36" height="18" rx="9" fill="#3DD68C"/>
  <text fill="#0F1117" font-family="Segoe UI, sans-serif" font-size="10px" font-weight="600" x="176" y="81">当前</text>
  <text class="text3" x="36" y="100">/home/user/projects/home</text>
  <text class="text3" x="36" y="116">磁盘: 2.4 GB · 状态: 运行中</text>
  <text class="accent" x="380" y="80" text-anchor="end" font-size="12px">●</text>
  <!-- Workspace 2 -->
  <rect class="panel" x="20" y="136" width="380" height="70" rx="10" stroke="#2A2D3A" stroke-width="1"/>
  <text class="text" x="36" y="160">🔬 Research Lab</text>
  <text class="text3" x="36" y="180">/home/user/projects/research</text>
  <text class="text3" x="36" y="196">磁盘: 1.1 GB · 状态: 已停止</text>
  <text class="text3" x="380" y="160" text-anchor="end" font-size="12px">○</text>
  <!-- Workspace 3 -->
  <rect class="panel" x="20" y="216" width="380" height="70" rx="10" stroke="#2A2D3A" stroke-width="1"/>
  <text class="text" x="36" y="240">🚀 Deploy Bot</text>
  <text class="text3" x="36" y="260">/home/user/projects/deploy</text>
  <text class="text3" x="36" y="276">磁盘: 512 MB · 状态: 已停止</text>
  <text class="text3" x="380" y="240" text-anchor="end" font-size="12px">○</text>
</svg>