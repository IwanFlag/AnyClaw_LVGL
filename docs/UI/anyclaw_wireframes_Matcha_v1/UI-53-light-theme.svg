<svg xmlns="http://www.w3.org/2000/svg" width="620" height="420" viewBox="0 0 620 420">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#1A1D27}
      .t2{fill:#6B7280} .accent{fill:#2BB673} .danger{fill:#E54545} .warning{fill:#E5A00D} .info{fill:#4A7FDC}
    </style>
  </defs>
  <rect width="620" height="420" rx="12" fill="#F5F7FA"/>
  <!-- Title -->
  <text x="24" y="32" font-size="14" font-weight="600" fill="#1A1D27">Light Theme Preview</text>

  <!-- Mini Chat Interface -->
  <rect x="24" y="48" width="360" height="350" rx="8" fill="#EBEEF2"/>
  <rect x="24" y="48" width="360" height="36" rx="8" fill="#FFFFFF"/>
  <rect x="24" y="76" width="360" height="8" fill="#FFFFFF"/>
  <text x="40" y="72" font-size="12" font-weight="600" fill="#1A1D27">Chat</text>
  <!-- User message -->
  <rect x="200" y="96" width="170" height="32" rx="8" fill="#FFFFFF"/>
  <text x="212" y="117" font-size="11" fill="#1A1D27">Hello, AnyClaw!</text>
  <!-- Bot message -->
  <rect x="36" y="140" width="200" height="40" rx="8" fill="#2BB67315" stroke="#2BB67330" stroke-width="1"/>
  <text x="48" y="165" font-size="11" fill="#1A1D27">Hi! How can I help?</text>
  <!-- Input -->
  <rect x="36" y="352" width="336" height="32" rx="6" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1"/>
  <text x="48" y="373" font-size="11" fill="#8B92A8">Type a message...</text>
  <rect x="340" y="358" width="24" height="20" rx="4" fill="#2BB673"/>
  <text x="345" y="373" font-size="11" fill="#FFFFFF">→</text>

  <!-- Color Palette -->
  <text x="400" y="72" font-size="12" font-weight="600" fill="#1A1D27">Color Palette</text>
  <!-- bg -->
  <rect x="400" y="86" width="28" height="28" rx="4" fill="#F5F7FA" stroke="#D0D5DD" stroke-width="1"/>
  <text x="436" y="105" font-size="10" fill="#6B7280">#F5F7FA</text>
  <!-- surface -->
  <rect x="400" y="120" width="28" height="28" rx="4" fill="#EBEEF2" stroke="#D0D5DD" stroke-width="1"/>
  <text x="436" y="139" font-size="10" fill="#6B7280">#EBEEF2</text>
  <!-- panel -->
  <rect x="400" y="154" width="28" height="28" rx="4" fill="#FFFFFF" stroke="#D0D5DD" stroke-width="1"/>
  <text x="436" y="173" font-size="10" fill="#6B7280">#FFFFFF</text>
  <!-- text -->
  <rect x="400" y="188" width="28" height="28" rx="4" fill="#1A1D27"/>
  <text x="436" y="207" font-size="10" fill="#6B7280">#1A1D27</text>
  <!-- accent -->
  <rect x="400" y="222" width="28" height="28" rx="4" fill="#2BB673"/>
  <text x="436" y="241" font-size="10" class="accent">#2BB673</text>
  <!-- danger -->
  <rect x="400" y="256" width="28" height="28" rx="4" fill="#E54545"/>
  <text x="436" y="275" font-size="10" class="danger">#E54545</text>
  <!-- warning -->
  <rect x="400" y="290" width="28" height="28" rx="4" fill="#E5A00D"/>
  <text x="436" y="309" font-size="10" class="warning">#E5A00D</text>
  <!-- info -->
  <rect x="400" y="324" width="28" height="28" rx="4" fill="#4A7FDC"/>
  <text x="436" y="343" font-size="10" class="info">#4A7FDC</text>
</svg>