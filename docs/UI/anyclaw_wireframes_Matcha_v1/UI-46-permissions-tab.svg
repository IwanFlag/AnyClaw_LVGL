  <text x="24" y="460" font-size="12" font-weight="600">Device Access (6)</text>
  <line x1="24" y1="468" x2="926" y2="468" stroke="#1E2230" stroke-width="1"/>
  <text x="40" y="490" font-size="12" class="t2">camera</text>
  <rect x="260" y="476" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="476" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="493" font-size="10" fill="#000">?</text>
  <text x="296" y="493" font-size="11" class="warning">ask</text>
  <text x="40" y="520" font-size="12" class="t2">microphone</text>
  <rect x="260" y="506" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="506" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="523" font-size="10" fill="#000">?</text>
  <text x="296" y="523" font-size="11" class="warning">ask</text>
  <text x="40" y="550" font-size="12" class="t2">display</text>
  <rect x="260" y="536" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="536" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="553" font-size="10" fill="#fff">✓</text>
  <text x="296" y="553" font-size="11">allow</text>
