  <rect x="260" y="416" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="416" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="433" font-size="10" fill="#000">?</text>
  <text x="296" y="433" font-size="11" class="warning">ask</text>

