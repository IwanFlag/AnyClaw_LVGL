<svg xmlns="http://www.w3.org/2000/svg" width="950" height="720" viewBox="0 0 950 720">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .t3{fill:#6B7280} .accent{fill:#3DD68C} .danger{fill:#FF6B6B} .warning{fill:#FFBE3D}
    </style>
  </defs>
  <rect width="950" height="720" rx="12" fill="#0F1117"/>
  <!-- Tab Bar -->
  <rect x="0" y="0" width="950" height="44" rx="12" fill="#13151E"/>
  <rect x="0" y="32" width="950" height="12" fill="#13151E"/>
  <text x="30" y="28" font-size="13" fill="#8B92A8">General</text>
  <text x="100" y="28" font-size="13" font-weight="600" class="accent">Permissions</text>
  <rect x="96" y="40" width="72" height="2" rx="1" fill="#3DD68C"/>
  <text x="200" y="28" font-size="13" fill="#8B92A8">Model</text>
  <text x="275" y="28" font-size="13" fill="#8B92A8">Feature</text>
  <text x="355" y="28" font-size="13" fill="#8B92A8">Tracing</text>
  <text x="435" y="28" font-size="13" fill="#8B92A8">Log</text>
  <text x="485" y="28" font-size="13" fill="#8B92A8">KB</text>
  <text x="525" y="28" font-size="13" fill="#8B92A8">About</text>
  <line x1="0" y1="44" x2="950" y2="44" stroke="#1E2230" stroke-width="1"/>

  <!-- Group 1: File System -->
  <text x="24" y="70" font-size="12" font-weight="600">File System (4)</text>
  <line x1="24" y1="78" x2="926" y2="78" stroke="#1E2230" stroke-width="1"/>
  <!-- 1 -->
  <text x="40" y="100" font-size="12" class="t2">read_files</text>
  <rect x="260" y="86" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="86" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="103" font-size="10" fill="#fff">✓</text>
  <text x="296" y="103" font-size="11">allow</text>
  <!-- 2 -->
  <text x="40" y="130" font-size="12" class="t2">write_files</text>
  <rect x="260" y="116" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="116" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="133" font-size="10" fill="#fff">✓</text>
  <text x="296" y="133" font-size="11">allow</text>
  <!-- 3 -->
  <text x="40" y="160" font-size="12" class="danger">delete_files</text>
  <rect x="260" y="146" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="146" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="163" font-size="10" fill="#000">?</text>
  <text x="296" y="163" font-size="11" class="warning">ask</text>
  <!-- 4 -->
  <text x="40" y="190" font-size="12" class="t2">move_files</text>
  <rect x="260" y="176" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="176" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="193" font-size="10" fill="#fff">✓</text>
  <text x="296" y="193" font-size="11">allow</text>

