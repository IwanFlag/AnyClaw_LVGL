  <line x1="24" y1="348" x2="926" y2="348" stroke="#1E2230" stroke-width="1"/>
  <text x="40" y="370" font-size="12" class="t2">http_requests</text>
  <rect x="260" y="356" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="356" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="373" font-size="10" fill="#fff">✓</text>
  <text x="296" y="373" font-size="11">allow</text>
  <text x="40" y="400" font-size="12" class="t2">websocket</text>
  <rect x="260" y="386" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="386" width="30" height="24" rx="4" fill="#3DD68C"/>
  <text x="265" y="403" font-size="10" fill="#fff">✓</text>
  <text x="296" y="403" font-size="11">allow</text>
