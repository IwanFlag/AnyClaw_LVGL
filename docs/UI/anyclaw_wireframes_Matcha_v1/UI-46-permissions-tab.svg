  <rect x="260" y="566" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="566" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="583" font-size="10" fill="#000">?</text>
  <text x="296" y="583" font-size="11" class="warning">ask</text>
  <text x="40" y="610" font-size="12" class="danger">gpio</text>
  <rect x="260" y="596" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="596" width="30" height="24" rx="4" fill="#FFBE3D"/>
  <text x="265" y="613" font-size="10" fill="#000">?</text>
  <text x="296" y="613" font-size="11" class="warning">ask</text>
  <text x="40" y="640" font-size="12" class="t2">bluetooth</text>
  <rect x="260" y="626" width="90" height="24" rx="4" fill="#1A1D27" stroke="#3C3F50" stroke-width="1"/>
  <rect x="260" y="626" width="30" height="24" rx="4" fill="#FF6B6B"/>
  <text x="265" y="643" font-size="10" fill="#fff">✕</text>
  <text x="296" y="643" font-size="11" class="danger">deny</text>

  <!-- Save Button -->
  <rect x="24" y="668" width="160" height="36" rx="6" fill="#3DD68C"/>
  <text x="50" y="691" font-size="13" font-weight="600" fill="#0F1117">Save Permissions</text>
  <circle cx="190" cy="686" r="4" fill="#3DD68C"/>
  <text x="200" y="691" font-size="11" class="accent">Saved ✓</text>
</svg>