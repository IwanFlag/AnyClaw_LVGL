<svg xmlns="http://www.w3.org/2000/svg" width="950" height="620" viewBox="0 0 950 620">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .t3{fill:#6B7280} .accent{fill:#3DD68C} .warning{fill:#FFBE3D}
    </style>
  </defs>
  <rect width="950" height="620" rx="12" fill="#0F1117"/>
  <!-- Tab Bar -->
  <rect x="0" y="0" width="950" height="44" rx="12" fill="#13151E"/>
  <rect x="0" y="32" width="950" height="12" fill="#13151E"/>
  <text x="30" y="28" font-size="13" fill="#8B92A8">General</text>
  <text x="100" y="28" font-size="13" fill="#8B92A8">Permissions</text>
  <text x="200" y="28" font-size="13" fill="#8B92A8">Model</text>
  <text x="275" y="28" font-size="13" font-weight="600" class="accent">Feature</text>
  <rect x="271" y="40" width="52" height="2" rx="1" fill="#3DD68C"/>
  <text x="355" y="28" font-size="13" fill="#8B92A8">Tracing</text>
  <text x="435" y="28" font-size="13" fill="#8B92A8">Log</text>
  <text x="485" y="28" font-size="13" fill="#8B92A8">KB</text>
  <text x="525" y="28" font-size="13" fill="#8B92A8">About</text>
  <line x1="0" y1="44" x2="950" y2="44" stroke="#1E2230" stroke-width="1"/>

  <!-- Feature 1 -->
  <rect x="24" y="60" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="84" font-size="14" font-weight="600">Auto-completion</text>
  <text x="40" y="104" font-size="12" class="t2">Enable inline code suggestions and auto-complete</text>
  <rect x="800" y="76" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="826" cy="86" r="8" fill="#fff"/>
  <text x="600" y="124" font-size="11" class="warning">⚠ requires restart</text>

  <!-- Feature 2 -->
  <rect x="24" y="152" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="176" font-size="14" font-weight="600">Streaming Response</text>
  <text x="40" y="196" font-size="12" class="t2">Stream tokens in real-time as model generates output</text>
  <rect x="800" y="168" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="826" cy="178" r="8" fill="#fff"/>
  <text x="600" y="216" font-size="11" class="warning">⚠ requires restart</text>

  <!-- Feature 3 -->
  <rect x="24" y="244" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="268" font-size="14" font-weight="600">Tool Calling</text>
  <text x="40" y="288" font-size="12" class="t2">Allow model to invoke external tools and functions</text>
  <rect x="800" y="260" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="826" cy="270" r="8" fill="#fff"/>

  <!-- Feature 4 -->
  <rect x="24" y="336" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="360" font-size="14" font-weight="600">Voice Input</text>
  <text x="40" y="380" font-size="12" class="t2">Enable microphone input for voice commands</text>
  <rect x="800" y="352" width="36" height="20" rx="10" fill="#3C3F50"/>
  <circle cx="810" cy="362" r="8" fill="#8B92A8"/>

  <!-- Feature 5 -->
  <rect x="24" y="428" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="452" font-size="14" font-weight="600">Multi-model Fallback</text>
  <text x="40" y="472" font-size="12" class="t2">Automatically switch to backup model on failure</text>
  <rect x="800" y="444" width="36" height="20" rx="10" fill="#3C3F50"/>
  <circle cx="810" cy="454" r="8" fill="#8B92A8"/>
  <text x="600" y="492" font-size="11" class="warning">⚠ requires restart</text>

  <!-- Feature 6 -->
  <rect x="24" y="520" width="902" height="80" rx="8" fill="#1A1D27"/>
  <text x="40" y="544" font-size="14" font-weight="600">Knowledge Base Sync</text>
  <text x="40" y="564" font-size="12" class="t2">Auto-sync knowledge base documents on startup</text>
  <rect x="800" y="536" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="826" cy="546" r="8" fill="#fff"/>
  <text x="600" y="584" font-size="11" class="warning">⚠ requires restart</text>
</svg>