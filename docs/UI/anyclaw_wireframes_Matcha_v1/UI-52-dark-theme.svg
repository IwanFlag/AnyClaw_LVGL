<svg xmlns="http://www.w3.org/2000/svg" width="620" height="420" viewBox="0 0 620 420">
  <defs>
    <style>
      text{font-family:'Inter','Segoe UI',sans-serif;fill:#E8ECF4}
      .t2{fill:#8B92A8} .accent{fill:#3DD68C} .danger{fill:#FF6B6B} .warning{fill:#FFBE3D} .info{fill:#6C9FFF}
    </style>
  </defs>
  <rect width="620" height="420" rx="12" fill="#0F1117"/>
  <!-- Title -->
  <text x="24" y="32" font-size="14" font-weight="600">Dark Theme Preview</text>

  <!-- Mini Chat Interface -->
  <rect x="24" y="48" width="360" height="350" rx="8" fill="#13151E"/>
  <rect x="24" y="48" width="360" height="36" rx="8" fill="#1A1D27"/>
  <rect x="24" y="76" width="360" height="8" fill="#1A1D27"/>
  <text x="40" y="72" font-size="12" font-weight="600">Chat</text>
  <!-- User message -->
  <rect x="200" y="96" width="170" height="32" rx="8" fill="#1E2230"/>
  <text x="212" y="117" font-size="11">Hello, AnyClaw!</text>
  <!-- Bot message -->
  <rect x="36" y="140" width="200" height="40" rx="8" fill="#3DD68C15" stroke="#3DD68C30" stroke-width="1"/>
  <text x="48" y="165" font-size="11">Hi! How can I help?</text>
  <!-- Input -->
  <rect x="36" y="352" width="336" height="32" rx="6" fill="#1A1D27" stroke="#1E2230" stroke-width="1"/>
  <text x="48" y="373" font-size="11" fill="#6B7280">Type a message...</text>
  <rect x="340" y="358" width="24" height="20" rx="4" fill="#3DD68C"/>
  <text x="345" y="373" font-size="11" fill="#0F1117">→</text>

  <!-- Color Palette -->
  <text x="400" y="72" font-size="12" font-weight="600">Color Palette</text>
  <!-- bg -->
  <rect x="400" y="86" width="28" height="28" rx="4" fill="#0F1117" stroke="#1E2230" stroke-width="1"/>
  <text x="436" y="105" font-size="10" class="t2">#0F1117</text>
  <!-- surface -->
  <rect x="400" y="120" width="28" height="28" rx="4" fill="#13151E" stroke="#1E2230" stroke-width="1"/>
  <text x="436" y="139" font-size="10" class="t2">#13151E</text>
  <!-- panel -->
  <rect x="400" y="154" width="28" height="28" rx="4" fill="#1A1D27" stroke="#1E2230" stroke-width="1"/>
  <text x="436" y="173" font-size="10" class="t2">#1A1D27</text>
  <!-- raised -->
  <rect x="400" y="188" width="28" height="28" rx="4" fill="#1E2230" stroke="#3C3F50" stroke-width="1"/>
  <text x="436" y="207" font-size="10" class="t2">#1E2230</text>
  <!-- accent -->
  <rect x="400" y="222" width="28" height="28" rx="4" fill="#3DD68C"/>
  <text x="436" y="241" font-size="10" class="accent">#3DD68C</text>
  <!-- text -->
  <rect x="400" y="256" width="28" height="28" rx="4" fill="#E8ECF4"/>
  <text x="436" y="275" font-size="10" fill="#E8ECF4">#E8ECF4</text>
  <!-- danger -->
  <rect x="400" y="290" width="28" height="28" rx="4" fill="#FF6B6B"/>
  <text x="436" y="309" font-size="10" class="danger">#FF6B6B</text>
  <!-- warning -->
  <rect x="400" y="324" width="28" height="28" rx="4" fill="#FFBE3D"/>
  <text x="436" y="343" font-size="10" class="warning">#FFBE3D</text>
  <!-- info -->
  <rect x="400" y="358" width="28" height="28" rx="4" fill="#6C9FFF"/>
  <text x="436" y="377" font-size="10" class="info">#6C9FFF</text>
</svg>