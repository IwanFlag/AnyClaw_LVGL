<svg xmlns="http://www.w3.org/2000/svg" width="400" height="160" viewBox="0 0 400 160">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="160" fill="#0F1117" rx="8"/>
  <!-- PDF Card -->
  <rect x="16" y="16" width="170" height="56" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <text x="30" y="40" font-family="sans-serif" font-size="16">📎</text>
  <text x="52" y="38" font-family="sans-serif" font-size="12" fill="#E8ECF4">report.pdf</text>
  <text x="52" y="54" font-family="sans-serif" font-size="10" fill="#6B7280">2.4 MB</text>
  <!-- Folder Card -->
  <rect x="210" y="16" width="174" height="56" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <text x="224" y="40" font-family="sans-serif" font-size="16">📁</text>
  <text x="246" y="38" font-family="sans-serif" font-size="12" fill="#E8ECF4">project-folder/</text>
  <text x="246" y="54" font-family="sans-serif" font-size="10" fill="#6B7280">12 个文件</text>
  <!-- Image Card -->
  <rect x="16" y="88" width="368" height="56" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <text x="30" y="112" font-family="sans-serif" font-size="16">🖼️</text>
  <rect x="52" y="96" width="40" height="40" rx="6" fill="#2A2D3A"/>
  <text x="64" y="122" font-family="sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">img</text>
  <text x="104" y="116" font-family="sans-serif" font-size="12" fill="#E8ECF4">screenshot.png</text>
</svg>