<svg xmlns="http://www.w3.org/2000/svg" width="520" height="140" viewBox="0 0 520 140">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="520" height="140" fill="#0F1117" rx="8"/>
  <!-- StepCard with danger border -->
  <rect x="16" y="12" width="488" height="116" rx="10" fill="#1E2230" stroke="#FF6B6B" stroke-width="1" filter="url(#shadow)"/>
  <!-- Header row -->
  <text x="30" y="36" font-family="sans-serif" font-size="14">⚡</text>
  <text x="52" y="36" font-family="sans-serif" font-size="13" fill="#E8ECF4">npm install</text>
  <!-- Failed badge -->
  <rect x="160" y="24" width="56" height="20" rx="10" fill="#FF6B6B" opacity="0.15"/>
  <text x="174" y="38" font-family="sans-serif" font-size="10" fill="#FF6B6B">✗ 失败</text>
  <!-- Error output area -->
  <rect x="30" y="48" width="460" height="48" rx="6" fill="#13151E"/>
  <text x="44" y="64" font-family="monospace" font-size="10" fill="#FF6B6B">npm ERR! code ERESOLVE</text>
  <text x="44" y="78" font-family="monospace" font-size="10" fill="#FF6B6B">npm ERR! ERESOLVE unable to resolve</text>
  <text x="44" y="92" font-family="monospace" font-size="10" fill="#8B92A8">dependency tree</text>
  <!-- Retry button -->
  <rect x="30" y="106" width="80" height="28" rx="14" fill="#6C9FFF" opacity="0.15"/>
  <text x="52" y="125" font-family="sans-serif" font-size="11" fill="#6C9FFF">↻ 重试</text>
</svg>