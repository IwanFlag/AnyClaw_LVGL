<svg xmlns="http://www.w3.org/2000/svg" width="650" height="420" viewBox="0 0 650 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="progressGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB673"/>
    </linearGradient>
  </defs>
  <!-- Background overlay -->
  <rect width="650" height="420" fill="#0F1117"/>
  <rect width="650" height="420" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="50" y="30" width="550" height="360" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Step indicator -->
  <circle cx="245" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="275" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="305" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="335" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="365" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="395" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="73" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Step 4/6</text>
  <!-- Title -->
  <text x="325" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E8ECF4">Gemma 本地推理</text>
  <!-- Switch toggle -->
  <text x="100" y="150" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">启用 Gemma 本地推理</text>
  <!-- Switch ON state -->
  <rect x="460" y="138" width="48" height="26" rx="13" fill="#3DD68C"/>
  <circle cx="498" cy="151" r="10" fill="#FFFFFF"/>
  <!-- Checkboxes -->
  <text x="100" y="195" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">模型版本</text>
  <!-- Checkbox 1: checked -->
  <rect x="100" y="208" width="20" height="20" rx="4" fill="#3DD68C"/>
  <text x="110" y="223" text-anchor="middle" font-size="12" fill="#0F1117">✓</text>
  <text x="130" y="224" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">E4B (4B)</text>
  <!-- Checkbox 2: unchecked -->
  <rect x="260" y="208" width="20" height="20" rx="4" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="290" y="224" font-family="JetBrains Mono, monospace" font-size="13" fill="#E8ECF4">26B MoE</text>
  <!-- Progress bar -->
  <text x="100" y="265" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">下载进度</text>
  <rect x="100" y="275" width="400" height="10" rx="5" fill="#1A1D27"/>
  <rect x="100" y="275" width="248" height="10" rx="5" fill="url(#progressGrad)"/>
  <text x="515" y="284" font-family="JetBrains Mono, monospace" font-size="12" fill="#3DD68C">62%</text>
  <!-- Status text -->
  <text x="100" y="310" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">正在下载 gemma-3-4b-it-Q4_0.gguf ... (1.2GB / 2.0GB)</text>
  <!-- Skip button -->
  <rect x="500" y="340" width="80" height="36" rx="6" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="540" y="363" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Skip</text>
</svg>