<svg xmlns="http://www.w3.org/2000/svg" width="280" height="340" viewBox="0 0 280 340">
  <defs>
    <style>
      .bg { fill: #0F1117; }
      .panel { fill: #1A1D27; }
      .text { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 13px; }
      .text2 { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text3 { fill: #6B7280; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .accent { fill: #3DD68C; }
      .danger { fill: #FF6B6B; }
      .separator { stroke: #2A2D3A; stroke-width: 1; }
    </style>
    <filter id="shadow"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/></filter>
  </defs>
  <!-- Background -->
  <rect class="bg" width="280" height="340" rx="12"/>
  <!-- Menu card -->
  <rect class="panel" x="8" y="8" width="264" height="324" rx="10" filter="url(#shadow)"/>
  <!-- Status line -->
  <circle cx="28" cy="36" r="5" fill="#3DD68C"/>
  <text class="text" x="40" y="40">Gateway: Ready</text>
  <text class="text3" x="240" y="40" text-anchor="end">v2.2.0</text>
  <!-- Separator -->
  <line x1="20" y1="56" x2="260" y2="56" class="separator"/>
  <!-- Menu items -->
  <text class="text" x="28" y="84">▶ Start</text>
  <text class="text" x="28" y="112">■ Stop</text>
  <text class="text" x="28" y="140">↻ Restart</text>
  <text class="text" x="28" y="168">🔄 Refresh</text>
  <!-- Separator -->
  <line x1="20" y1="184" x2="260" y2="184" class="separator"/>
  <!-- Boot start toggle -->
  <text class="text" x="28" y="212">☑ Boot Start</text>
  <rect x="210" y="200" width="36" height="20" rx="10" fill="#3DD68C"/>
  <circle cx="236" cy="210" r="8" fill="#E8ECF4"/>
  <!-- Separator -->
  <line x1="20" y1="228" x2="260" y2="228" class="separator"/>
  <!-- Settings & About -->
  <text class="text" x="28" y="256">⚙ Open Settings</text>
  <text class="text" x="28" y="284">ℹ About</text>
  <!-- Separator -->
  <line x1="20" y1="300" x2="260" y2="300" class="separator"/>
  <!-- Exit -->
  <text class="danger" x="28" y="324" font-family="Segoe UI, sans-serif" font-size="13px">✕ Exit</text>
</svg>