<svg xmlns="http://www.w3.org/2000/svg" width="650" height="420" viewBox="0 0 650 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="650" height="420" fill="#0F1117"/>
  <rect width="650" height="420" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="50" y="30" width="550" height="360" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Step indicator -->
  <circle cx="245" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="275" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="305" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="335" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="365" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <circle cx="395" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="73" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Step 1/6</text>
  <!-- Title -->
  <text x="325" y="120" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E8ECF4">选择语言 / Select Language</text>
  <!-- Chinese button (selected) -->
  <rect x="160" y="155" width="140" height="44" rx="8" fill="#3B82F6"/>
  <text x="230" y="183" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF">中文</text>
  <!-- English button (unselected) -->
  <rect x="350" y="155" width="140" height="44" rx="8" fill="#32374B" stroke="#6B7280" stroke-width="1"/>
  <text x="420" y="183" text-anchor="middle" font-family="Inter, sans-serif" font-size="15" fill="#E8ECF4">English</text>
  <!-- Subtitle -->
  <text x="325" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">AnyClaw 界面语言 / Interface language</text>
  <!-- Bottom buttons -->
  <!-- Exit wizard -->
  <rect x="70" y="330" width="110" height="36" rx="6" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="125" y="353" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">退出向导</text>
  <!-- Back (disabled) -->
  <rect x="250" y="330" width="100" height="36" rx="6" fill="#1A1D27" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="300" y="353" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6B7280">&lt; Back</text>
  <!-- Next -->
  <rect x="470" y="330" width="100" height="36" rx="6" fill="#3DD68C"/>
  <text x="520" y="353" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">Next &gt;</text>
</svg>