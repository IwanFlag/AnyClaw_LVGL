<svg xmlns="http://www.w3.org/2000/svg" width="650" height="420" viewBox="0 0 650 420">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background overlay -->
  <rect width="650" height="420" fill="#0F1117"/>
  <rect width="650" height="420" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="50" y="30" width="550" height="360" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Step indicator -->
  <circle cx="245" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="275" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="305" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="335" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="365" cy="68" r="6" fill="#3DD68C"/>
  <circle cx="395" cy="68" r="6" fill="#252A38" stroke="#6B7280" stroke-width="1"/>
  <text x="460" y="73" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Step 5/6</text>
  <!-- Title -->
  <text x="325" y="110" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#E8ECF4">消息渠道配置</text>
  <!-- Cards row -->
  <!-- Telegram card -->
  <rect x="80" y="135" width="150" height="160" rx="10" fill="#1A1D27" stroke="#3DD68C40" stroke-width="1"/>
  <text x="155" y="175" text-anchor="middle" font-size="36">✈</text>
  <text x="155" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#E8ECF4">Telegram</text>
  <circle cx="135" cy="240" r="5" fill="#3DD68C"/>
  <text x="155" y="244" font-family="Inter, sans-serif" font-size="12" fill="#3DD68C">已连接</text>
  <!-- Discord card -->
  <rect x="250" y="135" width="150" height="160" rx="10" fill="#1A1D27" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="325" y="175" text-anchor="middle" font-size="36">🎮</text>
  <text x="325" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#E8ECF4">Discord</text>
  <circle cx="305" cy="240" r="5" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="325" y="244" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">未配置</text>
  <!-- WhatsApp card -->
  <rect x="420" y="135" width="150" height="160" rx="10" fill="#1A1D27" stroke="#3DD68C0A" stroke-width="1"/>
  <text x="495" y="175" text-anchor="middle" font-size="36">💬</text>
  <text x="495" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#E8ECF4">WhatsApp</text>
  <circle cx="475" cy="240" r="5" fill="none" stroke="#6B7280" stroke-width="1.5"/>
  <text x="495" y="244" font-family="Inter, sans-serif" font-size="12" fill="#6B7280">未配置</text>
  <!-- Skip button -->
  <rect x="500" y="340" width="80" height="36" rx="6" fill="none" stroke="#6B7280" stroke-width="1"/>
  <text x="540" y="363" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">Skip</text>
</svg>