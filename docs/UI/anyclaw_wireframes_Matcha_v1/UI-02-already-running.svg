<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Dialog box -->
  <rect x="40" y="20" width="320" height="160" rx="6" fill="#1E2230" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Title bar -->
  <rect x="40" y="20" width="320" height="32" rx="6" fill="#252A38"/>
  <rect x="40" y="46" width="320" height="6" fill="#252A38"/>
  <text x="56" y="42" font-family="sans-serif" font-size="13" fill="#FFBE3D">⚠ AnyClaw</text>
  <!-- Close button -->
  <rect x="330" y="24" width="24" height="24" rx="3" fill="none"/>
  <text x="342" y="41" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B92A8">✕</text>
  <!-- Content -->
  <text x="200" y="95" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">已有一个实例正在运行。</text>
  <text x="200" y="118" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">请勿重复启动。</text>
  <!-- OK Button -->
  <rect x="158" y="142" width="84" height="30" rx="6" fill="#3DD68C"/>
  <text x="200" y="162" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0F1117">确 定</text>
</svg>