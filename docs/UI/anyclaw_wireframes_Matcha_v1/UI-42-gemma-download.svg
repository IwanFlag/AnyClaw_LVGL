      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="progress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#6C9FFF"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 520x290 -->
  <rect x="140" y="155" width="520" height="290" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Title -->
  <text x="400" y="198" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#E8ECF4">📦 下载 Gemma 3 E4B</text>
  <!-- Progress bar -->
  <rect x="175" y="220" width="450" height="10" rx="5" fill="#13151E"/>
  <rect x="175" y="220" width="279" height="10" rx="5" fill="url(#progress)"/>
  <!-- Progress text -->
  <text x="175" y="252" font-family="Arial,sans-serif" font-size="14" fill="#E8ECF4">62%</text>
  <text x="625" y="252" text-anchor="end" font-family="Arial,sans-serif" font-size="14" fill="#8B92A8">1.2 GB / 2.0 GB</text>
  <!-- Details -->
  <rect x="175" y="265" width="450" height="70" rx="8" fill="#13151E"/>
  <text x="195" y="288" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">来源: <tspan fill="#E8ECF4">HuggingFace</tspan></text>
  <text x="195" y="308" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">速度: <tspan fill="#3DD68C">12.5 MB/s</tspan>  ·  预计: <tspan fill="#E8ECF4">约 1 分钟</tspan></text>
  <!-- Cancel button -->
  <rect x="350" y="355" width="120" height="40" rx="8" fill="#FF6B6B" opacity="0.15" stroke="#FF6B6B" stroke-width="1"/>
  <text x="410" y="381" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#FF6B6B">取消下载</text>
</svg>