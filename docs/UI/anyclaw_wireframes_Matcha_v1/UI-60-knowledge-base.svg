<svg xmlns="http://www.w3.org/2000/svg" width="620" height="420" viewBox="0 0 620 420">
  <defs>
    <style>
      .bg { fill: #0F1117; }
      .panel { fill: #1A1D27; }
      .surface { fill: #13151E; }
      .raised { fill: #1E2230; }
      .text { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 14px; }
      .text2 { fill: #8B92A8; font-family: 'Segoe UI', sans-serif; font-size: 12px; }
      .text3 { fill: #6B7280; font-family: 'Segoe UI', sans-serif; font-size: 11px; }
      .title { fill: #E8ECF4; font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 600; }
      .accent { fill: #3DD68C; }
      .info { fill: #6C9FFF; }
      .highlight { fill: #3DD68C; font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; }
    </style>
    <linearGradient id="btnAccent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB876"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect class="bg" width="620" height="420" rx="12"/>
  <!-- Header -->
  <text class="title" x="20" y="36">知识库</text>
  <rect x="500" y="18" width="100" height="30" rx="6" fill="url(#btnAccent)"/>
  <text fill="#0F1117" font-family="Segoe UI, sans-serif" font-size="12px" font-weight="600" x="520" y="38">＋ 添加文件</text>
  <!-- Stats -->
  <text class="text2" x="20" y="68">已索引 <tspan class="highlight">12</tspan> 个文档 · <tspan class="highlight">3,847</tspan> 条向量</text>
  <!-- Search box -->
  <rect class="surface" x="20" y="82" width="580" height="38" rx="8" stroke="#2A2D3A" stroke-width="1"/>
  <text class="text3" x="38" y="106">🔍 搜索知识库内容...</text>
  <!-- Document list header -->
  <text class="text2" x="20" y="144">已索引文档</text>
  <!-- Doc 1 -->
  <rect class="panel" x="20" y="154" width="580" height="48" rx="8"/>
  <text class="text" x="36" y="176">📄 OpenClaw-用户手册-v3.pdf</text>
  <text class="text3" x="36" y="192">2.4 MB</text>
  <text class="text3" x="520" y="176" text-anchor="end">本地上传</text>
  <text class="accent" x="584" y="176" text-anchor="end" font-size="11">✓</text>
  <!-- Doc 2 -->
  <rect class="panel" x="20" y="210" width="580" height="48" rx="8"/>
  <text class="text" x="36" y="232">📄 API-Reference-2024.md</text>
  <text class="text3" x="36" y="248">1.1 MB</text>
  <text class="text3" x="520" y="232" text-anchor="end">GitHub 同步</text>
  <text class="accent" x="584" y="232" text-anchor="end" font-size="11">✓</text>
  <!-- Doc 3 -->
  <rect class="panel" x="20" y="266" width="580" height="48" rx="8"/>
  <text class="text" x="36" y="288">📄 部署指南-Linux.docx</text>
  <text class="text3" x="36" y="304">856 KB</text>
  <text class="text3" x="520" y="288" text-anchor="end">本地上传</text>
  <text class="accent" x="584" y="288" text-anchor="end" font-size="11">✓</text>
  <!-- Search results section -->
  <text class="text2" x="20" y="340">搜索结果</text>
  <rect class="surface" x="20" y="350" width="580" height="26" rx="6"/>
  <text class="text" x="36" y="368" font-size="12px">
    <tspan class="highlight">Gateway</tspan> 配置完成后需重启服务 — </text>
  <text class="text3" x="290" y="368">API-Reference-2024.md §3.2</text>
  <rect class="surface" x="20" y="382" width="580" height="26" rx="6"/>
  <text class="text" x="36" y="400" font-size="12px">
    <tspan class="highlight">Gateway</tspan> 监听端口默认为 8080 — </text>
  <text class="text3" x="290" y="400">部署指南-Linux.docx §2.1</text>
</svg>