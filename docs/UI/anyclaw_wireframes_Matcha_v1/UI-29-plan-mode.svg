<svg xmlns="http://www.w3.org/2000/svg" width="520" height="300" viewBox="0 0 520 300">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="520" height="300" fill="#0F1117" rx="8"/>
  <!-- Plan card -->
  <rect x="16" y="12" width="488" height="276" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Header -->
  <text x="30" y="40" font-family="sans-serif" font-size="16">📋</text>
  <text x="56" y="40" font-family="sans-serif" font-size="14" font-weight="bold" fill="#E8ECF4">执行方案</text>
  <!-- Steps list -->
  <!-- Step 1 -->
  <rect x="30" y="56" width="24" height="24" rx="12" fill="#3DD68C" opacity="0.15"/>
  <text x="42" y="73" font-family="sans-serif" font-size="11" fill="#3DD68C" text-anchor="middle">1</text>
  <text x="64" y="73" font-family="sans-serif" font-size="12" fill="#E8ECF4">分析项目依赖结构</text>
  <!-- Step 2 -->
  <rect x="30" y="88" width="24" height="24" rx="12" fill="#3DD68C" opacity="0.15"/>
  <text x="42" y="105" font-family="sans-serif" font-size="11" fill="#3DD68C" text-anchor="middle">2</text>
  <text x="64" y="105" font-family="sans-serif" font-size="12" fill="#E8ECF4">检测循环引用和版本冲突</text>
  <!-- Step 3 -->
  <rect x="30" y="120" width="24" height="24" rx="12" fill="#3DD68C" opacity="0.15"/>
  <text x="42" y="137" font-family="sans-serif" font-size="11" fill="#3DD68C" text-anchor="middle">3</text>
  <text x="64" y="137" font-family="sans-serif" font-size="12" fill="#E8ECF4">生成优化建议报告</text>
  <!-- Step 4 -->
  <rect x="30" y="152" width="24" height="24" rx="12" fill="#3DD68C" opacity="0.15"/>
  <text x="42" y="169" font-family="sans-serif" font-size="11" fill="#3DD68C" text-anchor="middle">4</text>
  <text x="64" y="169" font-family="sans-serif" font-size="12" fill="#E8ECF4">自动应用安全的版本更新</text>
  <!-- Divider -->
  <line x1="30" y1="192" x2="490" y2="192" stroke="#2A2D3A" stroke-width="1"/>
  <!-- Risk & time info -->
  <text x="30" y="216" font-family="sans-serif" font-size="11" fill="#8B92A8">风险: <tspan fill="#3DD68C">低</tspan> · 预计耗时: <tspan fill="#FFBE3D">~30s</tspan></text>
  <!-- Action buttons -->
  <!-- Confirm -->
  <rect x="30" y="240" width="110" height="32" rx="16" fill="#3DD68C" opacity="0.15"/>
  <text x="62" y="261" font-family="sans-serif" font-size="12" fill="#3DD68C">✓ 确认执行</text>
  <!-- Modify -->
  <rect x="152" y="240" width="110" height="32" rx="16" fill="#FFBE3D" opacity="0.15"/>
  <text x="180" y="261" font-family="sans-serif" font-size="12" fill="#FFBE3D">✏ 修改方案</text>
  <!-- Cancel -->
  <rect x="274" y="240" width="80" height="32" rx="16" fill="#FF6B6B" opacity="0.15"/>
  <text x="296" y="261" font-family="sans-serif" font-size="12" fill="#FF6B6B">✗ 取消</text>
</svg>