<svg xmlns="http://www.w3.org/2000/svg" width="520" height="320" viewBox="0 0 520 320">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="520" height="320" fill="#0F1117" rx="8"/>

  <!-- Terminal Panel -->
  <rect x="8" y="8" width="164" height="304" rx="8" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Terminal title bar -->
  <rect x="8" y="8" width="164" height="24" rx="8" fill="#1A1D27"/>
  <rect x="8" y="20" width="164" height="12" fill="#1A1D27"/>
  <circle cx="22" cy="20" r="4" fill="#FF6B6B"/>
  <circle cx="36" cy="20" r="4" fill="#FFBE3D"/>
  <circle cx="50" cy="20" r="4" fill="#3DD68C"/>
  <!-- Terminal output -->
  <rect x="12" y="32" width="156" height="276" rx="0" fill="#13151E"/>
  <text x="20" y="50" font-family="monospace" font-size="9" fill="#3DD68C">$ npm run build</text>
  <text x="20" y="64" font-family="monospace" font-size="9" fill="#8B92A8">Building...</text>
  <text x="20" y="78" font-family="monospace" font-size="9" fill="#E8ECF4">✓ Compiled in 2.3s</text>
  <text x="20" y="92" font-family="monospace" font-size="9" fill="#3DD68C">$ ls dist/</text>
  <text x="20" y="106" font-family="monospace" font-size="9" fill="#8B92A8">index.html</text>
  <text x="20" y="120" font-family="monospace" font-size="9" fill="#8B92A8">bundle.js</text>
  <text x="20" y="134" font-family="monospace" font-size="9" fill="#8B92A8">style.css</text>

  <!-- Preview Panel -->
  <rect x="180" y="8" width="164" height="304" rx="8" fill="#1E2230" filter="url(#shadow)"/>
  <rect x="180" y="8" width="164" height="24" rx="8" fill="#1A1D27"/>
  <rect x="180" y="20" width="164" height="12" fill="#1A1D27"/>
  <text x="262" y="22" font-family="sans-serif" font-size="10" fill="#8B92A8" text-anchor="middle">Preview</text>
  <!-- Preview content (Markdown rendered) -->
  <rect x="184" y="32" width="156" height="276" rx="0" fill="#13151E"/>
  <text x="196" y="52" font-family="sans-serif" font-size="12" font-weight="bold" fill="#E8ECF4">项目概览</text>
  <line x1="196" y1="58" x2="328" y2="58" stroke="#2A2D3A" stroke-width="1"/>
  <text x="196" y="74" font-family="sans-serif" font-size="10" fill="#8B92A8">这是一个基于</text>
  <text x="196" y="90" font-family="sans-serif" font-size="10" fill="#3DD68C">LVGL</text>
  <text x="220" y="90" font-family="sans-serif" font-size="10" fill="#8B92A8">的嵌入式UI</text>
  <text x="196" y="110" font-family="sans-serif" font-size="10" fill="#E8ECF4">特性：</text>
  <text x="196" y="126" font-family="sans-serif" font-size="10" fill="#8B92A8">• 低资源占用</text>
  <text x="196" y="142" font-family="sans-serif" font-size="10" fill="#8B92A8">• 跨平台支持</text>
  <text x="196" y="158" font-family="sans-serif" font-size="10" fill="#8B92A8">• 丰富的控件</text>

  <!-- Table Panel -->
  <rect x="352" y="8" width="160" height="304" rx="8" fill="#1E2230" filter="url(#shadow)"/>
  <rect x="352" y="8" width="160" height="24" rx="8" fill="#1A1D27"/>
  <rect x="352" y="20" width="160" height="12" fill="#1A1D27"/>
  <text x="432" y="22" font-family="sans-serif" font-size="10" fill="#8B92A8" text-anchor="middle">Table</text>
  <rect x="356" y="32" width="152" height="276" rx="0" fill="#13151E"/>
  <!-- Table header -->
  <rect x="360" y="36" width="144" height="22" rx="4" fill="#1A1D27"/>
  <text x="370" y="51" font-family="sans-serif" font-size="9" fill="#8B92A8">Name</text>
  <text x="430" y="51" font-family="sans-serif" font-size="9" fill="#8B92A8">Status</text>
  <text x="478" y="51" font-family="sans-serif" font-size="9" fill="#8B92A8">Time</text>
  <!-- Table rows -->
  <line x1="360" y1="62" x2="504" y2="62" stroke="#2A2D3A" stroke-width="0.5"/>
  <text x="370" y="76" font-family="sans-serif" font-size="9" fill="#E8ECF4">build</text>
  <circle cx="440" cy="73" r="3" fill="#3DD68C"/>
  <text x="480" y="76" font-family="sans-serif" font-size="9" fill="#8B92A8">2.3s</text>
  <line x1="360" y1="84" x2="504" y2="84" stroke="#2A2D3A" stroke-width="0.5"/>
  <text x="370" y="98" font-family="sans-serif" font-size="9" fill="#E8ECF4">test</text>
  <circle cx="440" cy="95" r="3" fill="#3DD68C"/>
  <text x="480" y="98" font-family="sans-serif" font-size="9" fill="#8B92A8">5.1s</text>
  <line x1="360" y1="106" x2="504" y2="106" stroke="#2A2D3A" stroke-width="0.5"/>
  <text x="370" y="120" font-family="sans-serif" font-size="9" fill="#E8ECF4">lint</text>
  <circle cx="440" cy="117" r="3" fill="#FF6B6B"/>
  <text x="480" y="120" font-family="sans-serif" font-size="9" fill="#8B92A8">0.8s</text>
</svg>