<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="800" height="600" fill="#000" opacity="0.6"/>
  <!-- Modal 500x280 centered -->
  <rect x="150" y="160" width="500" height="280" rx="14" fill="#1A1D27" filter="url(#shadow)"/>
  <!-- Title -->
  <text x="400" y="210" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#E8ECF4">确认退出 AnyClaw？</text>
  <!-- Description -->
  <text x="400" y="248" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#8B92A8">Gateway 将继续在后台运行。</text>
  <!-- Buttons -->
  <rect x="175" y="290" width="140" height="42" rx="8" fill="#6C9FFF" opacity="0.15" stroke="#6C9FFF" stroke-width="1"/>
  <text x="245" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#6C9FFF">📌 最小化到托盘</text>
  <rect x="330" y="290" width="120" height="42" rx="8" fill="#FFBE3D" opacity="0.15" stroke="#FFBE3D" stroke-width="1"/>
  <text x="390" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" font-weight="bold" fill="#FFBE3D">⚠️ 退出程序</text>
  <rect x="465" y="290" width="80" height="42" rx="8" fill="#1E2230" stroke="#6B7280" stroke-width="1"/>
  <text x="505" y="317" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#8B92A8">取消</text>
</svg>