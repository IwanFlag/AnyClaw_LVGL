<svg xmlns="http://www.w3.org/2000/svg" width="520" height="160" viewBox="0 0 520 160">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="520" height="160" fill="#0F1117" rx="8"/>
  <!-- StepCard -->
  <rect x="16" y="12" width="488" height="136" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Header row -->
  <text x="30" y="36" font-family="sans-serif" font-size="14">✏️</text>
  <text x="52" y="36" font-family="sans-serif" font-size="13" fill="#E8ECF4">写入 settings.json</text>
  <!-- Status badge -->
  <rect x="196" y="24" width="56" height="20" rx="10" fill="#3DD68C" opacity="0.15"/>
  <text x="208" y="38" font-family="sans-serif" font-size="10" fill="#3DD68C">✓ 完成</text>
  <!-- Changes count -->
  <text x="270" y="36" font-family="sans-serif" font-size="11" fill="#FFBE3D">3 处变更</text>
  <!-- Diff preview area -->
  <rect x="30" y="48" width="460" height="48" rx="6" fill="#13151E"/>
  <text x="44" y="64" font-family="monospace" font-size="10" fill="#FF6B6B">- "theme": "light"</text>
  <text x="44" y="78" font-family="monospace" font-size="10" fill="#3DD68C">+ "theme": "dark"</text>
  <text x="44" y="92" font-family="monospace" font-size="10" fill="#3DD68C">+ "fontSize": 14</text>
  <!-- Action buttons -->
  <!-- Accept -->
  <rect x="30" y="108" width="80" height="28" rx="14" fill="#3DD68C" opacity="0.15"/>
  <text x="54" y="127" font-family="sans-serif" font-size="11" fill="#3DD68C">✓ 接受</text>
  <!-- Reject -->
  <rect x="120" y="108" width="80" height="28" rx="14" fill="#FF6B6B" opacity="0.15"/>
  <text x="144" y="127" font-family="sans-serif" font-size="11" fill="#FF6B6B">✗ 拒绝</text>
  <!-- Revert -->
  <rect x="210" y="108" width="80" height="28" rx="14" fill="#6C9FFF" opacity="0.15"/>
  <text x="232" y="127" font-family="sans-serif" font-size="11" fill="#6C9FFF">↩ 回退</text>
</svg>