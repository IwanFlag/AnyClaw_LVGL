<svg xmlns="http://www.w3.org/2000/svg" width="280" height="80" viewBox="0 0 280 80">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="280" height="80" fill="#0F1117" rx="8"/>
  <!-- Label -->
  <text x="16" y="24" font-family="sans-serif" font-size="12" fill="#8B92A8">AI模式:</text>
  <!-- Dropdown trigger -->
  <rect x="80" y="10" width="100" height="26" rx="8" fill="#1E2230" stroke="#2A2D3A" stroke-width="1"/>
  <text x="96" y="28" font-family="sans-serif" font-size="12" fill="#E8ECF4">自主</text>
  <text x="168" y="28" font-family="sans-serif" font-size="12" fill="#8B92A8">▾</text>
  <!-- Dropdown menu -->
  <rect x="80" y="40" width="180" height="36" rx="8" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Option 1 - selected -->
  <rect x="84" y="42" width="172" height="12" rx="2" fill="#3DD68C" opacity="0.1"/>
  <circle cx="94" cy="48" r="3" fill="#3DD68C"/>
  <text x="104" y="52" font-family="sans-serif" font-size="10" fill="#E8ECF4">自主</text>
  <text x="140" y="52" font-family="sans-serif" font-size="9" fill="#6B7280">自动决策执行</text>
  <!-- Option 2 -->
  <circle cx="94" cy="62" r="3" fill="#2A2D3A"/>
  <text x="104" y="66" font-family="sans-serif" font-size="10" fill="#8B92A8">Ask</text>
  <text x="132" y="66" font-family="sans-serif" font-size="9" fill="#6B7280">每次确认后执行</text>
  <!-- Option 3 would be cut off, showing indicator -->
  <text x="230" y="74" font-family="sans-serif" font-size="9" fill="#6B7280">+1 more</text>
</svg>