<svg xmlns="http://www.w3.org/2000/svg" width="180" height="60" viewBox="0 0 180 60">
  <defs>
    <style>
      @keyframes pulse1 { 0%,100%{opacity:0.3;r:4} 50%{opacity:1;r:5} }
      @keyframes pulse2 { 0%,100%{opacity:0.3;r:4} 33%{opacity:1;r:5} 66%{opacity:0.3;r:4} }
      @keyframes pulse3 { 0%,100%{opacity:0.3;r:4} 66%{opacity:1;r:5} }
      .dot1 { animation: pulse1 1.4s infinite; }
      .dot2 { animation: pulse2 1.4s infinite; }
      .dot3 { animation: pulse3 1.4s infinite; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="180" height="60" fill="#0F1117" rx="8"/>
  <!-- AI avatar -->
  <circle cx="20" cy="30" r="10" fill="#1E2230" stroke="#3DD68C" stroke-width="1"/>
  <text x="20" y="34" font-family="sans-serif" font-size="11" text-anchor="middle">🦞</text>
  <!-- Typing bubble -->
  <rect x="38" y="14" width="120" height="32" rx="16" fill="#1E2230"/>
  <!-- Three pulsing dots -->
  <circle cx="72" cy="30" r="4" fill="#3DD68C" class="dot1"/>
  <circle cx="90" cy="30" r="4" fill="#3DD68C" class="dot2"/>
  <circle cx="108" cy="30" r="4" fill="#3DD68C" class="dot3"/>
</svg>