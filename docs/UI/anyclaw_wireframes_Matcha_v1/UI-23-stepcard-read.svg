<svg xmlns="http://www.w3.org/2000/svg" width="520" height="120" viewBox="0 0 520 120">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="520" height="120" fill="#0F1117" rx="8"/>
  <!-- StepCard -->
  <rect x="16" y="12" width="488" height="96" rx="10" fill="#1E2230" filter="url(#shadow)"/>
  <!-- Header row -->
  <text x="30" y="36" font-family="sans-serif" font-size="14">📄</text>
  <text x="52" y="36" font-family="sans-serif" font-size="13" fill="#E8ECF4">读取 config.json</text>
  <!-- Status badge -->
  <rect x="180" y="24" width="72" height="20" rx="10" fill="#3DD68C" opacity="0.15"/>
  <text x="196" y="38" font-family="sans-serif" font-size="10" fill="#3DD68C">✓ 已完成</text>
  <!-- Collapsible output area -->
  <rect x="30" y="48" width="460" height="48" rx="6" fill="#13151E"/>
  <text x="44" y="64" font-family="monospace" font-size="11" fill="#8B92A8">{</text>
  <text x="56" y="78" font-family="monospace" font-size="11" fill="#3DD68C">  "name": "anyclaw",</text>
  <text x="56" y="92" font-family="monospace" font-size="11" fill="#3DD68C">  "version": "1.0.0"</text>
  <!-- Chevron indicator -->
  <text x="480" y="76" font-family="sans-serif" font-size="12" fill="#6B7280">▾</text>
</svg>