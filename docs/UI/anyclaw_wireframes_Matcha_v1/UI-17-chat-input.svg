<svg xmlns="http://www.w3.org/2000/svg" width="600" height="120" viewBox="0 0 600 120">
  <defs>
    <linearGradient id="sendGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD68C"/>
      <stop offset="100%" stop-color="#2BB67A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="120" fill="#0F1117" rx="8"/>
  <!-- Input box -->
  <rect x="16" y="16" width="480" height="72" rx="12" fill="#1A1D27" stroke="#2A2D3A" stroke-width="1"/>
  <!-- Placeholder text -->
  <text x="32" y="50" font-family="sans-serif" font-size="13" fill="#6B7280">输入消息...(Shift+Enter换行)</text>
  <!-- Bottom toolbar -->
  <!-- Microphone icon -->
  <circle cx="36" cy="100" r="12" fill="#1E2230"/>
  <text x="36" y="105" font-family="sans-serif" font-size="14" text-anchor="middle">🎤</text>
  <!-- Attachment icon -->
  <circle cx="72" cy="100" r="12" fill="#1E2230"/>
  <text x="72" y="105" font-family="sans-serif" font-size="14" text-anchor="middle">📎</text>
  <!-- Send button -->
  <circle cx="552" cy="56" r="20" fill="url(#sendGrad)"/>
  <polygon points="546,48 546,64 562,56" fill="#0F1117"/>
</svg>