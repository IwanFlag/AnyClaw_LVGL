<svg xmlns="http://www.w3.org/2000/svg" width="600" height="380" viewBox="0 0 600 380">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Full screen overlay -->
  <rect width="600" height="380" fill="#0F1117"/>
  <rect width="600" height="380" fill="#000000" opacity="0.6"/>
  <!-- Dialog -->
  <rect x="100" y="50" width="400" height="280" rx="12" fill="#1E2530" stroke="#3DD68C20" stroke-width="1" filter="url(#shadow)"/>
  <!-- Error icon -->
  <circle cx="300" cy="105" r="24" fill="#FF6B6B" opacity="0.15"/>
  <text x="300" y="114" text-anchor="middle" font-size="28" fill="#FF6B6B">❌</text>
  <!-- Title -->
  <text x="300" y="150" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FF6B6B">启动环境异常</text>
  <!-- Description -->
  <text x="300" y="185" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#E8ECF4">未检测到 Node.js</text>
  <text x="300" y="210" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#8B92A8">AnyClaw 需要 Node.js >= 22.14</text>
  <!-- Download link -->
  <text x="300" y="240" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#6C9FFF" text-decoration="underline">https://nodejs.org/en/download</text>
  <!-- Retry button -->
  <rect x="225" y="268" width="150" height="38" rx="8" fill="#3DD68C"/>
  <text x="300" y="292" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#0F1117">重新检测</text>
</svg>