<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#0F1117"/>
  <!-- Toast 1 - Green success (top) -->
  <rect x="140" y="300" width="620" height="52" rx="8" fill="#1A1D27" filter="url(#shadow)"/>
  <rect x="140" y="300" width="4" height="52" rx="2" fill="#3DD68C"/>
  <text x="164" y="332" font-family="Arial,sans-serif" font-size="14" fill="#3DD68C">✅ Gateway 已启动</text>
  <!-- Toast 2 - Yellow warning (middle) -->
  <rect x="140" y="362" width="620" height="52" rx="8" fill="#1A1D27" filter="url(#shadow)"/>
  <rect x="140" y="362" width="4" height="52" rx="2" fill="#FFBE3D"/>
  <text x="164" y="394" font-family="Arial,sans-serif" font-size="14" fill="#FFBE3D">⚠️ 磁盘空间不足</text>
  <!-- Toast 3 - Red error (bottom) -->
  <rect x="140" y="424" width="620" height="52" rx="8" fill="#1A1D27" filter="url(#shadow)"/>
  <rect x="140" y="424" width="4" height="52" rx="2" fill="#FF6B6B"/>
  <text x="164" y="456" font-family="Arial,sans-serif" font-size="14" fill="#FF6B6B">❌ 模型连接失败</text>
</svg>