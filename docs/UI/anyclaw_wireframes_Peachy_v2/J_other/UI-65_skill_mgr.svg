<text x="40" y="60" text-anchor="start" class="t" font-size="18">🧩 Skill 管理</text><rect x="40" y="80" width="400" height="36" rx="18" fill="#FFF1E8" stroke="#F0E0D0" stroke-width="1"/><text x="55" y="104" text-anchor="start" class="dim" font-size="12">🔍 搜索 Skill...</text><text x="40" y="135" text-anchor="start" class="s">内置 (Built-in)</text><rect x="40" y="148" width="500" height="90" rx="14" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><text x="60" y="175" text-anchor="start" class="l2">✅ healthcheck     v1.0</text><text x="380" y="175" text-anchor="start" class="s">安全检查</text><text x="60" y="200" text-anchor="start" class="l2">✅ summarize       v1.2</text><text x="380" y="200" text-anchor="start" class="s">内容摘要</text><text x="60" y="225" text-anchor="start" class="l2">✅ weather         v1.0</text><text x="380" y="225" text-anchor="start" class="s">天气查询</text><text x="40" y="260" text-anchor="start" class="s">第三方 (ClawHub)</text><rect x="40" y="273" width="500" height="115" rx="14" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><text x="60" y="300" text-anchor="start" class="l2">✅ github          v2.1</text><text x="380" y="300" text-anchor="start" class="s">GitHub 集成</text><text x="60" y="325" text-anchor="start" class="l2">⬜ excel-xlsx      v1.0</text><text x="380" y="325" text-anchor="start" class="s">Excel 操作</text><rect x="480" y="312" width="55" height="26" rx="13" fill="#FF7F50"/><text x="507" y="329" text-anchor="middle" fill="#FFF" font-size="11">安装</text><text x="60" y="355" text-anchor="start" class="l2">✅ chart-image     v1.1</text><text x="380" y="355" text-anchor="start" class="s">图表生成</text><rect x="40" y="405" width="160" height="36" rx="17" fill="url(#ag)"/><text x="120" y="428" text-anchor="middle" class="w" font-size="13">🔄 检查版本更新</text><rect x="220" y="405" width="200" height="36" rx="17" fill="url(#mg)"/><text x="320" y="428" text-anchor="middle" fill="#2D1B14" font-size="13">🌐 从 ClawHub 浏览</text></sv