<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}
.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}
.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}
.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}
.a{fill:#FF7F50}.g{fill:#7ECFB3}.w{fill:#FFF}.dim{fill:#C4A882}</style><defs>
  <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/></filter>
  <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter>
  <linearGradient id="ag"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
  <linearGradient id="pg"><stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/></linearGradient>
  <linearGradient id="mg"><stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/></linearGradient>
  <linearGradient id="pk"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="500" fill="#FFF8F3"/>
<text x="100" y="60" text-anchor="start" class="t" font-size="18">Work 输入框</text>
<rect x="100" y="120" width="500" height="50" rx="16" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<text x="120" y="150" text-anchor="start" class="dim" font-size="13">输入任务描述...</text>
<rect x="100" y="190" width="150" height="36" rx="18" fill="url(#mg)"/><text x="175" y="213" text-anchor="middle" fill="#2D1B14" font-size="13">🔧 Boot Check</text>
<rect x="560" y="130" width="40" height="40" rx="20" fill="url(#ag)"/>
<text x="575" y="157" text-anchor="middle" class="w" font-size="14">▶</text>
</svg>