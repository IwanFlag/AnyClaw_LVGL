<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}.a{fill:#FF7F50}.g{fill:#7ECFB3}.w{fill:#FFF}.dim{fill:#C4A882}</style><defs>
  <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/></filter>
  <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter>
  <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
  <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/></linearGradient>
  <linearGradient id="mg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/></linearGradient>
  <linearGradient id="pk" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="620" fill="#FFF8F3"/>
<text x="100" y="80" text-anchor="start" class="t" font-size="18">流式打字指示器 ✨</text>
<rect x="80" y="140" width="44" height="44" rx="22" fill="url(#pk)"/>
<text x="95" y="170" text-anchor="20" class="start">🦞</text>
<rect x="140" y="148" width="160" height="40" rx="20" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/>
<circle cx="175" cy="168" r="7" fill="#FF7F50"><animate attributeName="r" values="5;8;5" dur="1s" repeatCount="indefinite"/></circle>
<circle cx="205" cy="168" r="7" fill="#FFB347"><animate attributeName="r" values="5;8;5" dur="1s" begin="0.2s" repeatCount="indefinite"/></circle>
<circle cx="235" cy="168" r="7" fill="#FF6B8A"><animate attributeName="r" values="5;8;5" dur="1s" begin="0.4s" repeatCount="indefinite"/></circle>
<text x="100" y="230" text-anchor="start" class="t2" font-size="14">三个彩色脉冲圆点</text>
<text x="100" y="255" text-anchor="start" class="s">· 1.2s 循环</text>
<text x="100" y="280" text-anchor="start" class="s">· 50ms 刷新间隔, 每次 3 字符</text>
<text x="100" y="305" text-anchor="start" class="s">· 超时: 30s idle / 45s total</text>
<text x="100" y="330" text-anchor="start" class="s">· 超时后显示 ⚠️ 请重试</text>
</svg>