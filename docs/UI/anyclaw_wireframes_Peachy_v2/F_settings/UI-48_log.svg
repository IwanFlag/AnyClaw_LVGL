<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}
.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}
.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}
.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}
.a{fill:#FF7F50}.g{fill:#7ECFB3}.w{fill:#FFF}.dim{fill:#C4A882}</style><defs>
  <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/></filter>
  <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter>
  <linearGradient id="ag"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
  <linearGradient id="pg"><stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/></linearGradient>
  <linearGradient id="mg"><stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/></linearGradient>
  <linearGradient id="pk"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="500" fill="#FFF8F3"/><rect x="0" y="0" width="900" height="52" rx="0" fill="#FFF1E8"/><text x="16" y="34" text-anchor="start" class="t2" font-size="16">⚙️ Settings</text><line x1="0" y1="52" x2="900" y2="52" stroke="#F0E0D0" stroke-width="1"/>
<text x="70" y="34" text-anchor="middle" class="s" font-size="12">General</text><text x="165" y="34" text-anchor="middle" class="s" font-size="12">Permissions</text><text x="260" y="34" text-anchor="middle" class="s" font-size="12">Model</text><text x="355" y="34" text-anchor="middle" class="t2" font-size="12">Log</text><rect x="325" y="42" width="60" height="3" rx="1.5" fill="#FF7F50"/><text x="450" y="34" text-anchor="middle" class="s" font-size="12">About</text>
<text x="30" y="75" text-anchor="start" class="l2">日志系统</text><rect x="580" y="63" width="48" height="26" rx="13" fill="#FF7F50"/><circle cx="615" cy="76" r="10" fill="white"/>
<text x="30" y="105" text-anchor="start" class="l2">日志级别</text><rect x="150" y="93" width="100" height="32" rx="12" fill="#FFF1E8" stroke="#F0E0D0" stroke-width="1"/><text x="165" y="115" text-anchor="start" class="l2" font-size="12">Debug</text>
<rect x="30" y="135" width="660" height="220" rx="16" fill="#FFF1E8"/>
<text x="45" y="160" text-anchor="start" class="g" font-size="11">[12:30:01 INFO] Gateway health check OK</text>
<text x="45" y="182" text-anchor="start" class="a" font-size="11">[12:30:02 WARN] Session timeout</text>
<text x="45" y="204" text-anchor="start" class="a" font-size="11">[12:30:03 ERROR] Failed to connect</text>
<text x="45" y="226" text-anchor="start" class="dim" font-size="11">[12:30:04 DEBUG] Retry attempt 2/3</text>
<text x="45" y="248" text-anchor="start" class="g" font-size="11">[12:30:05 INFO] Retry successful</text>
<text x="45" y="270" text-anchor="start" class="g" font-size="11">[12:30:06 INFO] Model connected ✅</text>
<text x="45" y="320" text-anchor="start" class="dim" font-size="10">● DEBUG</text><text x="120" y="320" text-anchor="start" class="g" font-size="10">● INFO</text>
<text x="185" y="320" text-anchor="start" class="a" font-size="10">● WARN</text><text x="250" y="320" text-anchor="start" class="a" font-size="10">● ERROR</text>
<rect x="400" y="312" width="80" height="30" rx="15" fill="url(#ag)"/><text x="440" y="332" text-anchor="middle" class="w" font-size="13">Export</text><rect x="490" y="312" width="70" height="30" rx="15" fill="#FF5C5C"/><text x="525" y="332" text-anchor="middle" fill="#FFF" font-size="13">Clear</text>
</svg>