  <linearGradient id="pk"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="510" fill="#FFF8F3"/><rect x="0" y="0" width="900" height="52" rx="0" fill="#FFF1E8"/><text x="16" y="34" text-anchor="start" class="t2" font-size="16">⚙️ Settings</text><line x1="0" y1="52" x2="900" y2="52" stroke="#F0E0D0" stroke-width="1"/>
<text x="70" y="34" text-anchor="middle" class="s" font-size="12">General</text><text x="165" y="34" text-anchor="middle" class="t2" font-size="12">Permissions</text><rect x="135" y="42" width="60" height="3" rx="1.5" fill="#FF7F50"/><text x="260" y="34" text-anchor="middle" class="s" font-size="12">Model</text><text x="355" y="34" text-anchor="middle" class="s" font-size="12">Log</text><text x="450" y="34" text-anchor="middle" class="s" font-size="12">About</text>
<text x="30" y="75" text-anchor="start" class="t" font-size="16">权限策略 (19 项)</text>
