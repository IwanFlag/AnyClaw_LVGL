<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520"><style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}
.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}
.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}
.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}
.a{fill:#FF7F50}.g{fill:#7ECFB3}.w{fill:#FFF}.dim{fill:#C4A882}</style><defs>
  <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/></filter>
  <filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter>
  <linearGradient id="ag"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
  <linearGradient id="pg"><stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/></linearGradient>
  <linearGradient id="mg"><stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/></linearGradient>
  <linearGradient id="pk"><stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/></linearGradient>
</defs><rect width="900" height="520" fill="#FFF8F3"/>
<text x="40" y="50" text-anchor="start" class="t" font-size="20">主题系统 🎨</text>
<text x="40" y="80" text-anchor="start" class="s" font-size="14">暖色系 · 苹果风 · 年轻人</text>
<text x="40" y="120" text-anchor="start" class="t2" font-size="14">暖色主色</text>
<rect x="40" y="135" width="100" height="50" rx="12" fill="#FF7F50"/><text x="55" y="166" text-anchor="start" class="w" font-size="11">#FF7F50</text>
<rect x="150" y="135" width="100" height="50" rx="12" fill="#FFB347"/><text x="165" y="166" text-anchor="start" class="w" font-size="11">#FFB347</text>
<rect x="260" y="135" width="100" height="50" rx="12" fill="#FF6B8A"/><text x="275" y="166" text-anchor="start" class="w" font-size="11">#FF6B8A</text>
<rect x="370" y="135" width="100" height="50" rx="12" fill="#7ECFB3"/><text x="385" y="166" text-anchor="start" class="w" font-size="11">#7ECFB3</text>
<rect x="480" y="135" width="100" height="50" rx="12" fill="#B8A9E8"/><text x="490" y="166" text-anchor="start" class="dim" font-size="11">#B8A9E8</text>
<text x="40" y="210" text-anchor="start" class="t2" font-size="14">背景色阶</text>
<rect x="40" y="225" width="140" height="50" rx="12" fill="#FFF8F3"/><text x="55" y="256" text-anchor="start" class="dim" font-size="11">#FFF8F3</text>
<rect x="190" y="225" width="140" height="50" rx="12" fill="#FFF1E8"/><text x="205" y="256" text-anchor="start" class="dim" font-size="11">#FFF1E8</text>
<rect x="340" y="225" width="140" height="50" rx="12" fill="#F0E0D0"/><text x="355" y="256" text-anchor="start" class="dim" font-size="11">#F0E0D0</text>
<text x="40" y="300" text-anchor="start" class="t2" font-size="14">聊天气泡效果</text>
<rect x="40" y="320" width="200" height="50" rx="24" fill="url(#ag)"/> <text x="55" y="352" text-anchor="start" class="w" font-size="12">用户消息 (渐变橘)</text>
<rect x="260" y="320" width="280" height="50" rx="20" fill="#FFFFFF" filter="url(#s2)" stroke="#F0E0D0" stroke-width="1"/><rect x="260" y="335" width="4" height="20" rx="2" fill="#FF7F50"/><text x="280" y="352" text-anchor="start" class="l2" font-size="12">AI 回复 (白卡+竖线)</text>
<text x="40" y="410" text-anchor="start" class="t2" font-size="14">设计原则:</text>
<text x="40" y="435" text-anchor="start" class="s">· 暖色不伤眼 · 长时间使用友好</text>
<text x="40" y="460" text-anchor="start" class="s">· 萌系点缀 · 不死板</text>
<text x="40" y="485" text-anchor="start" class="s">· Apple 风圆角 + 柔和阴影</text>
</svg>