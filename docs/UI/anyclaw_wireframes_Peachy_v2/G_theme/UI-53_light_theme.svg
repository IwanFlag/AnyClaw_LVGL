<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400">
<style>text{font-family:"Noto Sans SC","PingFang SC",sans-serif}.t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}.s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}.l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}.dim{fill:#C4A882}</style><defs><filter id="s2"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/></filter><linearGradient id="ag"><stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/></linearGradient></defs>
<rect width="900" height="400" fill="#FFF8F3"/>
<text x="40" y="50" class="t" font-size="18">亮色主题 ☀️</text>
<rect x="40" y="70" width="100" height="50" rx="12" fill="#F5F7FA" stroke="#E2E5EA"/><text x="55" y="101" class="dim" font-size="11">#F5F7FA</text>
<rect x="150" y="70" width="100" height="50" rx="12" fill="#EBEEF2" stroke="#E2E5EA"/><text x="165" y="101" class="dim" font-size="11">#EBEEF2</text>
<rect x="260" y="70" width="100" height="50" rx="12" fill="#FFFFFF" stroke="#E2E5EA"/><text x="275" y="101" class="dim" font-size="11">#FFFFFF</text>
<text x="40" y="150" class="s">文字色</text>
<rect x="40" y="160" width="100" height="30" rx="8" fill="#1A1D27"/><text x="55" y="180" fill="white" font-size="11">text_primary</text>
<rect x="150" y="160" width="100" height="30" rx="8" fill="#6B7280"/><text x="165" y="180" fill="white" font-size="11">text_secondary</text>
<text x="40" y="220" class="s">强调色</text>
<rect x="40" y="230" width="80" height="30" rx="8" fill="#2BB673"/><text x="55" y="250" fill="white" font-size="11">#2BB673</text>
<rect x="130" y="230" width="80" height="30" rx="8" fill="#DC2626"/><text x="145" y="250" fill="white" font-size="11">#DC2626</text>
<text x="40" y="290" class="s">状态: ❌ 未实现 · 适合日间/高亮环境</text>
