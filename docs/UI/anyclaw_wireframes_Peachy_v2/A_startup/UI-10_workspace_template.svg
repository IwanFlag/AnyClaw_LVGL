<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
  t{font-family:'Noto Sans SC','SF Pro Display','PingFang SC',sans-serif}
  .t{fill:#2D1B14;font-weight:700}.t2{fill:#2D1B14;font-weight:600}
  .s{fill:#8B7355;font-size:12px}.s2{fill:#C4A882;font-size:11px}
  .l{fill:#2D1B14;font-size:14px}.l2{fill:#2D1B14;font-size:13px}
  .a{fill:#FF7F50}.a2{fill:#FFB347}.p{fill:#FF6B8A}
  .g{fill:#7ECFB3}.lv{fill:#B8A9E8}
  .w{fill:#FFFFFF}.dim{fill:#C4A882}
</style>
<defs>
  <filter id="shadow" x="-8%" y="-8%" width="116%" height="120%">
    <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#D4A574" flood-opacity="0.15"/>
  </filter>
  <filter id="shadow2" x="-5%" y="-5%" width="110%" height="115%">
    <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#D4A574" flood-opacity="0.12"/>
  </filter>
  <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF7F50"/><stop offset="100%" stop-color="#FFB347"/>
  </linearGradient>
  <linearGradient id="peachGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFF8F3"/><stop offset="100%" stop-color="#FFE8D6"/>
  </linearGradient>
  <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"/><stop offset="100%" stop-color="#FFF8F3"/>
  </linearGradient>
  <linearGradient id="pinkGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FF6B8A"/><stop offset="100%" stop-color="#FFB347"/>
  </linearGradient>
  <linearGradient id="mintGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#7ECFB3"/><stop offset="100%" stop-color="#B8E8D0"/>
  </linearGradient>
</defs>
<rect width="900" height="600" fill="#FFF8F3"/>

<rect width="900" height="600" fill="url(#peachGrad)"/>
<rect x="180" y="50" width="540" height="500" rx="28" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F0E0D0" stroke-width="1"/>
<text x="450" y="95" text-anchor="middle" class="t" font-size="20">选择工作区模板 📂</text>

<!-- 模板卡片 -->
<rect x="230" y="120" width="440" height="55" rx="14" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F0E0D0" stroke-width="1"/><text x="255" y="153" text-anchor="20" class="start">🤖</text><text x="285" y="148" text-anchor="start" class="l2">通用助手</text><text x="285" y="168" text-anchor="start" class="s">友好通用，适合日常问答</text>
<rect x="590" y="138" width="50" height="24" rx="12" fill="#FF7F50"/><text x="615.0" y="154.0" text-anchor="middle" fill="#FFF" font-size="11">推荐</text>

<rect x="230" y="185" width="440" height="55" rx="14" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F0E0D0" stroke-width="1"/><text x="255" y="218" text-anchor="20" class="start">💻</text><text x="285" y="213" text-anchor="start" class="l2">开发者</text><text x="285" y="233" text-anchor="start" class="s">技术导向，含编译工具配置</text>

<rect x="230" y="250" width="440" height="55" rx="14" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F0E0D0" stroke-width="1"/><text x="255" y="283" text-anchor="20" class="start">✍️</text><text x="285" y="278" text-anchor="start" class="l2">写作者</text><text x="285" y="298" text-anchor="start" class="s">文学风格，含素材目录</text>

<rect x="230" y="315" width="440" height="55" rx="14" fill="#FFFFFF" filter="url(#shadow2)" stroke="#F0E0D0" stroke-width="1"/><text x="255" y="348" text-anchor="20" class="start">📊</text><text x="285" y="343" text-anchor="start" class="l2">数据分析</text><text x="285" y="363" text-anchor="start" class="s">严谨数据导向，含 Python 配置</text>

